<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAP FLAGS - Opção A (Simplificado)</title>
    
    <!-- MAPAS (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- QR CODE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* --- ESTILOS GERAIS --- */
        body { 
            margin: 0; padding: 0; font-family: 'Courier New', monospace; background: #000; color: #0f0; overflow: hidden; user-select: none;
        }
        .hidden { display: none !important; }
        
        /* Botões Gerais */
        button { 
            background: #000; color: #0f0; border: 2px solid #0f0; padding: 12px 20px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 5px #0f0; transition: all 0.2s; margin: 5px; width: 100%;
        }
        button:active { background: #0f0; color: #000; }
        button.secondary { border-color: #555; color: #aaa; box-shadow: none; }
        button.secondary:active { background: #555; color: #fff; }

        /* Botões Miniatura (HUD) */
        .mini-btn {
            padding: 4px 8px !important;
            font-size: 10px !important;
            width: auto !important;
            margin: 2px !important;
            display: inline-block;
        }

        input { 
            background: #111; color: #0f0; border: 1px solid #0f0; padding: 15px; width: 80%; margin-bottom: 15px; font-family: inherit; font-size: 16px;
        }

        /* --- ECRÃ DE LOGIN --- */
        #login-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px; box-sizing: border-box;
        }
        #login-screen h1 { font-size: 3rem; text-shadow: 0 0 15px #0f0; margin-bottom: 30px; text-align: center; }

        /* --- MAPA --- */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #111; }
        
        /* --- HUD (MINIATURIZADO NO TOPO) --- */
        #hud { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.6); padding: 5px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; pointer-events: none;
        }
        .hud-content { pointer-events: auto; display: flex; align-items: center; gap: 10px; width: 100%; justify-content: space-between; }
        .hud-left { display: flex; align-items: center; gap: 5px; }
        .hud-center { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .hud-right { display: flex; align-items: center; }

        /* Barra de Energia Miniatura */
        .mini-bar-container { width: 60px; height: 8px; background: #333; border: 1px solid #0f0; position: relative; }
        #energy-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.5s; }
        #energy-fill.low { background: #f00; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .stat-text { font-size: 10px; font-weight: bold; color: #fff; text-shadow: 1px 1px 0 #000; }

        /* --- MENUS FLUTUANTES (DRAGGABLE) --- */
        .modal { 
            position: absolute; top: 15%; left: 15%; width: 70%; max-width: 350px; max-height: 80vh; background: #000; border: 3px solid #0f0; z-index: 2000; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { background: #0f0; color: #000; padding: 5px 10px; font-weight: bold; cursor: move; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .close-btn { background: none; border: none; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; padding: 0; margin: 0; width: auto; box-shadow: none; line-height: 1; }
        .modal-body { padding: 15px; overflow-y: auto; flex-grow: 1; }
        
        /* --- LISTA DE BANDEIRAS --- */
        #flag-list { max-height: 200px; overflow-y: auto; text-align: left; margin: 10px 0; border: 1px solid #0f0; padding: 5px; background: #050505; }
        .flag-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; align-items: center; }
        .flag-item button { padding: 5px 10px; font-size: 12px; width: auto; margin: 0; }

        /* --- PR DASHBOARD (SIMPLIFICADO) --- */
        #pr-dashboard { width: 80%; height: 80%; top: 10%; left: 10%; }
        #pr-campaigns { text-align: left; font-size: 12px; margin-bottom: 20px; }
        .pr-item { border: 1px solid #0f0; padding: 5px; margin: 5px 0; background: #050505; }

        /* --- QR STYLES --- */
        .qr-container { border: 1px solid #fff; padding: 10px; display: inline-block; background: #fff; margin: 10px auto; }

        /* --- ZOOM BOX (A+ / A-) --- */
        .custom-zoom-box {
            background: #000; border: 2px solid #0f0; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            display: flex; flex-direction: column; overflow: hidden; margin-bottom: 10px;
            position: absolute; bottom: 20px; right: 10px; width: 60px; z-index: 1000;
        }
        .zoom-btn-custom {
            background: #000; color: #0f0; border: none; border-bottom: 1px solid #0f0;
            padding: 10px 0; font-family: 'Courier New', monospace; font-weight: bold; font-size: 16px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; width: 100%; margin: 0; box-shadow: none;
        }
        .zoom-btn-custom:last-child { border-bottom: none; }
        .zoom-btn-custom:active { background: #0f0; color: #000; }

    </style>
</head>
<body>

    <!-- 1. ECRÃ DE LOGIN -->
    <div id="login-screen">
        <h1>ZAP FLAGS</h1>
        <input type="text" id="player-name" placeholder="Nome do Agente">
        <input type="email" id="player-email" placeholder="Email (ID da Conta)">
        <button onclick="startGame()">INICIAR MISSÃO</button>
        <button class="secondary" onclick="showPRDashboard()">MODO LOJISTA (PR)</button>
    </div>

    <!-- 2. MAPA -->
    <div id="map"></div>

    <!-- 3. HUD (MINIATURIZADO NO TOPO) -->
    <div id="hud" class="hidden">
        <div class="hud-content">
            <!-- Esquerda: Energia e Stats -->
            <div class="hud-left">
                <div class="mini-bar-container">
                    <div id="energy-fill"></div>
                </div>
                <span class="stat-text">⚡<span id="energy-text">100</span>%</span>
            </div>

            <!-- Centro: Botões de Ação -->
            <div class="hud-center">
                <button class="mini-btn" onclick="toggleTrade()">🔄 Mercado</button>
                <button class="mini-btn" onclick="showMyQR()">🎫 QRs</button>
                <button class="mini-btn" onclick="toggleStats()">📊 Skills</button>
                <button class="mini-btn" style="border-color: #f00; color: #f00;" onclick="confirmExit()">🚪 Sair</button>
            </div>

            <!-- Direita: Contador de Passos -->
            <div class="hud-right">
                <span class="stat-text">👣 <span id="step-count">0</span></span>
            </div>
        </div>
    </div>

    <!-- 4. JANELA DE TROCA (DRAGGABLE) -->
    <div id="trade-modal" class="modal hidden">
        <div class="modal-header" onmousedown="dragStart(event, 'trade-modal')">
            <span>MERCADO NEGRO</span>
            <button class="close-btn" onclick="toggleTrade()">X</button>
        </div>
        <div class="modal-body">
            <p style="font-size: 12px; color: #aaa;">Listar custa 5% Energia. Dura 5 dias.</p>
            <div id="flag-list"></div>
            <div class="btn-group">
                <button onclick="listFlagForTrade()">VENDER (-5% E)</button>
                <button class="secondary" onclick="toggleTrade()">FECHAR</button>
            </div>
        </div>
    </div>

    <!-- 5. JANELA MEUS QRs (DRAGGABLE) -->
    <div id="qr-modal" class="modal hidden">
        <div class="modal-header" onmousedown="dragStart(event, 'qr-modal')">
            <span>SEUS QRS</span>
            <button class="close-btn" onclick="toggleQR()">X</button>
        </div>
        <div class="modal-body">
            <div id="my-qrs"></div>
            <button class="secondary" onclick="toggleQR()">FECHAR</button>
        </div>
    </div>

    <!-- 6. JANELA SKILLS/STATS (DRAGGABLE) -->
    <div id="stats-modal" class="modal hidden">
        <div class="modal-header" onmousedown="dragStart(event, 'stats-modal')">
            <span>PERFIL DO AGENTE</span>
            <button class="close-btn" onclick="toggleStats()">X</button>
        </div>
        <div class="modal-body">
            <div style="text-align: left; margin-bottom: 15px;">
                <p>Nível: <span id="stat-level" style="color:#fff">1</span></p>
                <p>Visão: <span id="stat-vision" style="color:#fff">5m</span></p>
                <p>Bandeiras: <span id="stat-flags" style="color:#fff">0</span></p>
                <hr style="border-color: #333">
                <p>Passos Totais: <span id="stat-steps" style="color:#fff">0</span></p>
                <p>Tempo de Jogo: <span id="stat-time" style="color:#fff">00:00</span></p>
                <p>Skill Bonus: <span id="stat-skill" style="color:#0f0">0%</span></p>
            </div>
            <button class="secondary" onclick="toggleStats()">FECHAR</button>
        </div>
    </div>

    <!-- 7. PAINEL DO PR (SIMPLIFICADO - DRAGGABLE) -->
    <div id="pr-dashboard" class="modal hidden">
        <div class="modal-header" onmousedown="dragStart(event, 'pr-dashboard')">
            <span>PAINEL DO LOJISTA</span>
            <button class="close-btn" onclick="location.reload()">X</button>
        </div>
        <div class="modal-body">
            <button class="secondary" onclick="location.reload()">VOLTAR AO JOGO</button>
            
            <h3>Comprar Campanhas</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="buyPack('BRONZE', 5)" style="width: 45%;">🥉 BRONZE (5€)</button>
                <button onclick="buyPack('PRATA', 15)" style="width: 45%;">🥈 PRATA (15€)</button>
                <button onclick="buyPack('OURO', 50)" style="width: 45%;">🥇 OURO (50€)</button>
                <button onclick="buyPack('PLATINA', 100)" style="width: 45%;">💎 PLATINA (100€)</button>
            </div>
            
            <h3>Minhas Campanhas</h3>
            <div id="pr-campaigns"></div>
            <button onclick="openScanner()">📸 ESCANEAR QR CLIENTE</button>
            <div id="scanner-result"></div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 🧠 CÉREBRO DO JOGO (LÓGICA)
        // =========================================================================

        // --- 1. DADOS INICIAIS ---
        let player = {
            name: "",
            email: "",
            lat: 0,
            lng: 0,
            energy: 100,
            flags: 0,
            qrs: [], 
            skill: 1,
            vision: 5, // metros
            inventory: [], // IDs de bandeiras
            steps: 0,
            startTime: 0
        };

        // PRs Fictícios Iniciais
        let prs = [
            { id: 1, name: "Café Central (Porto)", lat: 41.1496, lng: -8.6109, pack: "BRONZE", radius: 5000, flagsLeft: 50000, color: "orange" },
            { id: 2, name: "Ginásio Fit (Lisboa)", lat: 38.7223, lng: -9.1393, pack: "PRATA", radius: 20000, flagsLeft: 150000, color: "orange" },
        ];

        let map, playerMarker, watchId;
        let allMarkers = [];
        let lastPos = null; // Para calcular passos

        // --- 2. INICIALIZAÇÃO ---
        function startGame() {
            const name = document.getElementById('player-name').value;
            const email = document.getElementById('player-email').value;
            if(!name || !email) { alert("Identificação necessária!"); return; }

            player.name = name;
            player.email = email;
            player.startTime = Date.now();

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');

            initMap();
        }

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        player.lat = pos.coords.latitude;
                        player.lng = pos.coords.longitude;
                        lastPos = { lat: player.lat, lng: player.lng };
                        map.setView([player.lat, player.lng], 16);
                        createPlayerMarker();
                    },
                    () => {
                        map.setView([38.7223, -9.1393], 13);
                        alert("GPS desligado. Usando localização simulada.");
                    }
                );
            }

            map = L.map('map', { zoomControl: false, attributionControl: false });
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Controlo de Zoom Personalizado (A+ / A-)
            var ZoomControl = L.Control.extend({
                onAdd: function(map) {
                    var container = L.DomUtil.create('div', 'custom-zoom-box');
                    var btnIn = L.DomUtil.create('button', 'zoom-btn-custom', container);
                    btnIn.innerHTML = 'A+ <span class="zoom-symbol">+</span>'; 
                    btnIn.onclick = function() { map.zoomIn(); };
                    var btnOut = L.DomUtil.create('button', 'zoom-btn-custom', container);
                    btnOut.innerHTML = 'A- <span class="zoom-symbol">-</span>';
                    btnOut.onclick = function() { map.zoomOut(); };
                    return container;
                }
            });
            map.addControl(new ZoomControl());

            // Loop de GPS
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(updatePosition, handleError, { 
                    enableHighAccuracy: true, maximumAge: 0, timeout: 5000
                });
            }

            setInterval(gameLoop, 3000); 
            
            // Regeneração de Energia
            setInterval(() => {
                if(player.energy < 100) {
                    player.energy = Math.min(100, player.energy + 1);
                    updateHUD();
                }
            }, 60000); 

            // Atualizar tempo de jogo
            setInterval(updateGameTime, 1000);
        }

        function createPlayerMarker() {
            if (!playerMarker) {
                playerMarker = L.marker([player.lat, player.lng], {
                    icon: L.divIcon({
                        className: 'player-icon',
                        html: `<div style="background:#0f0; width:15px; height:15px; border-radius:50%; border:3px solid #fff; box-shadow: 0 0 10px #0f0;"></div>`
                    })
                }).addTo(map);
            } else {
                playerMarker.setLatLng([player.lat, player.lng]);
            }
            map.panTo([player.lat, player.lng]);
        }

        function updatePosition(position) {
            const newLat = position.coords.latitude;
            const newLng = position.coords.longitude;
            
            // Calcular passos
            if (lastPos) {
                const dist = getDistance(lastPos.lat, lastPos.lng, newLat, newLng);
                if (dist > 1) { // Ignorar ruído de GPS (< 1 metro)
                    const stepsAdded = Math.floor(dist / 0.762);
                    player.steps += stepsAdded;
                    document.getElementById('step-count').innerText = player.steps;
                }
            }
            
            player.lat = newLat;
            player.lng = newLng;
            lastPos = { lat: newLat, lng: newLng };
            createPlayerMarker();
        }

        function handleError(error) { console.warn("GPS Error:", error); }

        // --- 3. LÓGICA DE SPAWN ---
        function gameLoop() {
            clearMarkers();
            spawnGameFlag();

            prs.forEach(pr => {
                const dist = getDistance(player.lat, player.lng, pr.lat, pr.lng);
                if (dist < pr.radius) {
                    let chance = 20 - (dist / 1000 * 2); 
                    if (chance < 1) chance = 1; 
                    if (Math.random() * 100 < chance) {
                        spawnPRFlag(pr);
                    }
                }
            });
        }

        function spawnGameFlag() {
            const angle = Math.random() * 2 * Math.PI;
            const dist = 80 + Math.random() * 40; 
            
            const newLat = player.lat + (dist / 111000) * Math.cos(angle) * 180/Math.PI;
            const newLng = player.lng + (dist / (111000 * Math.cos(player.lat * Math.PI/180))) * Math.sin(angle) * 180/Math.PI;

            if (getDistance(player.lat, player.lng, newLat, newLng) <= player.vision) {
                let energyReward = 5;
                let typeText = "+5%";
                let color = "#006400";

                const rng = Math.random();
                if (rng > 0.90) { energyReward = 50; typeText = "BINGO! +50%"; color = "#00FF00"; } 
                else if (rng > 0.60) { energyReward = 15; typeText = "+15%"; color = "#32CD32"; }

                const marker = L.marker([newLat, newLng], { icon: getIcon(color) })
                .addTo(map)
                .bindPopup(`⚡ Bandeira ZAP (${typeText})`)
                .on('click', () => collectGameFlag(energyReward));
                
                allMarkers.push(marker);
            }
        }

        function spawnPRFlag(pr) {
            const angle = Math.random() * 2 * Math.PI;
            const dist = Math.random() * 100; 
            const newLat = pr.lat + (dist / 111000) * Math.cos(angle) * 180/Math.PI;
            const newLng = pr.lng + (dist / (111000 * Math.cos(pr.lat * Math.PI/180))) * Math.sin(angle) * 180/Math.PI;

            if (getDistance(player.lat, player.lng, newLat, newLng) <= player.vision) {
                const marker = L.marker([newLat, newLng], { icon: getIcon('orange') })
                    .addTo(map)
                    .bindPopup(`🎯 Bandeira Misteriosa (+1 Ponto QR)`)
                    .on('click', () => collectFlag('PR', pr));
                allMarkers.push(marker);
            }
        }

        function collectGameFlag(energy) {
            if (player.energy <= 0) { alert("⚠️ SEM ENERGIA!"); return; }
            player.energy -= 1;
            player.energy = Math.min(100, player.energy + energy);
            updateHUD();
            gameLoop(); 
        }

        function collectFlag(type, pr = null) {
            if (player.energy <= 0) { alert("⚠️ SEM ENERGIA!"); return; }
            player.energy -= 1;

            if (type === 'PR') {
                player.flags++;
                player.inventory.push(pr.id);
                if (player.flags % 10 === 0) {
                    player.qrs.push({ id: Date.now(), pr_id: pr.id, date: Date.now() + (15 * 24 * 60 * 60 * 1000) });
                }
            }
            calculateSkill();
            updateHUD();
            gameLoop(); 
        }

        // --- 4. SISTEMA DE SKILL & STATS ---
        function calculateSkill() {
            const points = player.flags;
            let newVision = 5 + Math.sqrt(points / 100);
            player.vision = Math.floor(newVision);
            if (player.vision > 100) player.vision = 100; 
            player.skill = 1 + Math.floor(points / 100);
        }

        function updateHUD() {
            document.getElementById('energy-text').innerText = Math.floor(player.energy);
            const fill = document.getElementById('energy-fill');
            fill.style.width = player.energy + "%";
            if (player.energy < 20) fill.classList.add('low');
            else fill.classList.remove('low');
        }

        function updateGameTime() {
            const now = Date.now();
            const diff = Math.floor((now - player.startTime) / 1000);
            const mins = Math.floor(diff / 60).toString().padStart(2, '0');
            const secs = (diff % 60).toString().padStart(2, '0');
            document.getElementById('stat-time').innerText = `${mins}:${secs}`;
        }

        function toggleStats() {
            const el = document.getElementById('stats-modal');
            el.classList.toggle('hidden');
            if (!el.classList.contains('hidden')) {
                document.getElementById('stat-level').innerText = player.skill;
                document.getElementById('stat-vision').innerText = player.vision + "m";
                document.getElementById('stat-flags').innerText = player.flags;
                document.getElementById('stat-steps').innerText = player.steps;
                const skillBonus = Math.min(50, Math.floor(player.steps / 100)); 
                document.getElementById('stat-skill').innerText = skillBonus + "%";
            }
        }

        // --- 5. SAÍDA DO JOGO ---
        function confirmExit() {
            if(confirm("⚠️ ATENÇÃO: Quer mesmo sair do jogo?")) {
                location.reload();
            }
        }

        // --- 6. MERCADO ---
        let marketListings = []; 

        function toggleTrade() {
            const el = document.getElementById('trade-modal');
            el.classList.toggle('hidden');
            if (!el.classList.contains('hidden')) renderMarket();
        }

        function listFlagForTrade() {
            if (player.inventory.length === 0) { alert("Inventário vazio!"); return; }
            if (player.energy < 5) { alert("Energia insuficiente (5%)!"); return; }
            const index = Math.floor(Math.random() * player.inventory.length);
            const prId = player.inventory[index];
            player.inventory.splice(index, 1); 
            marketListings.push({ owner: player.name, pr_id: prId, expires: Date.now() + (5 * 24 * 60 * 60 * 1000) });
            player.energy -= 5;
            updateHUD();
            renderMarket();
        }

        function renderMarket() {
            const list = document.getElementById('flag-list');
            list.innerHTML = "";
            if(marketListings.length === 0) {
                list.innerHTML = "<div style='padding:10px; text-align:center; color:#555;'>Mercado vazio.</div>";
                return;
            }
            marketListings.forEach((item, index) => {
                const prName = prs.find(p => p.id === item.pr_id)?.name || "Loja Desconhecida";
                list.innerHTML += `
                    <div class="flag-item">
                        <span>${prName}</span>
                        <button onclick="buyFromMarket(${index})">COMPRAR</button>
                    </div>
                `;
            });
        }

        function buyFromMarket(index) {
            const item = marketListings[index];
            if (player.energy < 2) { alert("Energia insuficiente."); return; }
            player.energy -= 2;
            player.flags++;
            player.inventory.push(item.pr_id);
            if (player.flags % 10 === 0) player.qrs.push({ id: Date.now(), pr_id: item.pr_id });
            marketListings.splice(index, 1); 
            updateHUD();
            renderMarket();
        }

        // --- 7. QR CODE ---
        function showMyQR() {
            const el = document.getElementById('qr-modal');
            const container = document.getElementById('my-qrs');
            el.classList.toggle('hidden');
            container.innerHTML = "";
            if (player.qrs.length === 0) { 
                container.innerHTML = "<p style='color:#aaa'>Ainda não tens QRs. Apanha 10 bandeiras!</p>"; 
                return; 
            }
            player.qrs.forEach((qr, index) => {
                const prName = prs.find(p => p.id === qr.pr_id)?.name || "Loja";
                const div = document.createElement('div');
                div.style.borderBottom = "1px solid #333";
                div.style.paddingBottom = "10px";
                div.innerHTML = `<b>${prName}</b> (Expira em ${new Date(qr.date).toLocaleDateString()})`;
                const qrDiv = document.createElement('div');
                qrDiv.className = "qr-container";
                div.appendChild(qrDiv);
                new QRCode(qrDiv, {
                    text: `ZAP_QR_${qr.id}_${player.email}`,
                    width: 128, height: 128,
                    colorDark : "#000000", colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                const useBtn = document.createElement('button');
                useBtn.innerText = "MOSTRAR AO LOJISTA";
                useBtn.onclick = () => alert("Aponta a câmara do Lojista para este código!");
                div.appendChild(useBtn);
                container.appendChild(div);
            });
        }
        function toggleQR() { document.getElementById('qr-modal').classList.toggle('hidden'); }

        // --- 8. PAINEL DO PR (SIMPLIFICADO) ---
        function showPRDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('pr-dashboard').classList.remove('hidden');
            renderPRDashboard();
        }

        function buyPack(type, value) {
            let radius, count;
            if (type === 'BRONZE') { radius = 5000; count = 50000; }
            if (type === 'PRATA') { radius = 20000; count = 150000; }
            if (type === 'OURO') { radius = 50000; count = 500000; }
            if (type === 'PLATINA') { radius = 150000; count = 2000000; }

            // Simples: Cria 2 PRs por pacote
            for(let i=0; i<2; i++) {
                const newPr = { 
                    id: Date.now() + i, 
                    name: "Minha Loja " + type + " #" + (i+1), 
                    lat: 39.3999 + (Math.random()-0.5), 
                    lng: -8.2245 + (Math.random()-0.5),
                    pack: type, radius: radius, flagsLeft: count, color: "orange" 
                };
                prs.push(newPr);
            }
            alert(`Pack ${type} ativado! Criados 2 novos pontos.`);
            renderPRDashboard();
        }

        function renderPRDashboard() {
            const div = document.getElementById('pr-campaigns');
            div.innerHTML = "";
            prs.forEach(pr => {
                div.innerHTML += `
                    <div class="pr-item">
                        <b>${pr.name}</b> (${pr.pack})<br>
                        Bandeiras: ${pr.flagsLeft.toLocaleString()}<br>
                        Raio: ${pr.radius/1000}km
                    </div>
                `;
            });
        }

        function openScanner() {
            const resultDiv = document.getElementById('scanner-result');
            resultDiv.innerHTML = "📸 A apontar...";
            setTimeout(() => {
                const hasQr = player.qrs.length > 0;
                if (hasQr) {
                    resultDiv.innerHTML = "<span style='color:#0f0'>✅ SUCESSO! Cliente verificado.</span>";
                    player.qrs.shift(); 
                } else {
                    resultDiv.innerHTML = "<span style='color:#f00'>❌ QR Inválido.</span>";
                }
            }, 1500);
        }

        // --- UTILS ---
        function clearMarkers() { allMarkers.forEach(m => map.removeLayer(m)); allMarkers = []; }
        
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }
        
        function getIcon(color) {
            let hexColor = color;
            if(color === 'orange') hexColor = '#FFA500';
            return L.divIcon({ 
                className: 'custom-icon', 
                html: `<div style="background:${hexColor}; width:20px; height:20px; border-radius:50%; border:2px solid white; box-shadow:0 0 5px ${hexColor};"></div>` 
            });
        }

        // --- DRAG FUNCTIONALITY FOR MODALS ---
        let draggedElement = null;
        let initialX, initialY, currentX, currentY;
        let xOffset = 0, yOffset = 0;

        function dragStart(e, id) {
            draggedElement = document.getElementById(id);
            const rect = draggedElement.getBoundingClientRect();
            xOffset = e.clientX - rect.left;
            yOffset = e.clientY - rect.top;

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchmove', dragTouch, {passive: false});
            document.addEventListener('touchend', dragEnd);
        }

        function drag(e) {
            if (draggedElement) {
                e.preventDefault();
                currentX = e.clientX - xOffset;
                currentY = e.clientY - yOffset;
                if(currentY < 0) currentY = 0;
                draggedElement.style.left = currentX + "px";
                draggedElement.style.top = currentY + "px";
                draggedElement.style.transform = "none";
            }
        }

        function dragTouch(e) {
            if (draggedElement) {
                e.preventDefault();
                const touch = e.touches[0];
                currentX = touch.clientX - xOffset;
                currentY = touch.clientY - yOffset;
                if(currentY < 0) currentY = 0;
                draggedElement.style.left = currentX + "px";
                draggedElement.style.top = currentY + "px";
                draggedElement.style.transform = "none";
            }
        }

        function dragEnd() {
            initialX = currentX;
            initialY = currentY;
            draggedElement = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', dragEnd);
            document.removeEventListener('touchmove', dragTouch);
            document.removeEventListener('touchend', dragEnd);
        }

    </script>
