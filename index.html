<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZAP FLAGS</title>
  <link rel="icon" href="./icon.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #000; color: #0f0; min-height: 100vh; overflow-x: hidden; }
    .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
    .screen.active { display: block; }
    h1 { margin-bottom: 10px; text-shadow: 0 0 8px #0f0; }
    .sub { color: #a7fca7; margin-bottom: 20px; }
    .btn { background: #0f0; color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; margin: 8px; font-size: 14px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-dark { background: #181818; color: #0f0; border: 1px solid #0f0; }
    .btn-danger { background: #8b0000; color: #fff; border: 1px solid #ff6b6b; }
    .form-group { margin: 12px 0; text-align: left; }
    .form-group label { display: block; font-size: 12px; color: #a7fca7; margin-bottom: 4px; }
    input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #0f0; background: #101010; color: #0f0; font-size: 14px; }
    .msg { min-height: 20px; margin-top: 8px; font-size: 12px; }
    .ok { color: #8fff8f; } .danger { color: #ff8686; } .warning { color: #ffb347; }
  </style>
</head>
<body>

  <!-- ECRÃ INICIAL -->
  <section id="screen-welcome" class="screen active">
    <h1>⚡ ZAP FLAGS</h1>
    <p class="sub">Bem-vindo! Como queres entrar?</p>
    <button class="btn" data-target="screen-player-login">🎮 SOU JOGADOR</button>
    <button class="btn btn-dark" data-target="screen-company-login">🏢 SOU EMPRESA</button>
    <button class="btn btn-dark" data-target="screen-admin-login">🔒 ADMIN</button>
  </section>

  <!-- LOGIN JOGADOR -->
  <section id="screen-player-login" class="screen">
    <h1>🎮 JOGADOR</h1>
    <p class="sub">Entra com o teu email e senha.</p>
    <form id="form-player-login">
      <div class="form-group"><label>Email</label><input type="email" id="pl-email" required></div>
      <div class="form-group"><label>Senha</label><input type="password" id="pl-pass" required></div>
      <button type="submit" class="btn">ENTRAR</button>
    </form>
    <div id="msg-player-login" class="msg"></div>
    <button class="btn btn-dark" style="margin-top:15px" data-target="screen-welcome">VOLTAR</button>
  </section>

  <!-- LOGIN EMPRESA -->
  <section id="screen-company-login" class="screen">
    <h1>🏢 EMPRESA</h1>
    <p class="sub">Entra com o NIF e senha.</p>
    <form id="form-company-login">
      <div class="form-group"><label>NIF</label><input type="text" id="co-nif" maxlength="9" required></div>
      <div class="form-group"><label>Senha</label><input type="password" id="co-pass" required></div>
      <button type="submit" class="btn">ENTRAR</button>
    </form>
    <div id="msg-company-login" class="msg"></div>
    <button class="btn btn-dark" style="margin-top:15px" data-target="screen-welcome">VOLTAR</button>
  </section>

  <!-- LOGIN ADMIN -->
  <section id="screen-admin-login" class="screen">
    <h1>🔒 ADMIN</h1>
    <p class="sub">Acesso restrito.</p>
    <form id="form-admin-login">
      <div class="form-group"><label>Email</label><input type="text" id="ad-email" required></div>
      <div class="form-group"><label>Senha</label><input type="password" id="ad-pass" required></div>
      <button type="submit" class="btn">ENTRAR</button>
    </form>
    <div id="msg-admin-login" class="msg"></div>
    <button class="btn btn-dark" style="margin-top:15px" data-target="screen-welcome">VOLTAR</button>
  </section>

  <script>
    // ============================================================
    // NAVEGAÇÃO SEGURA (zero onclick inline)
    // ============================================================
    document.querySelectorAll('[data-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });

    // ============================================================
    // ESTADO & STORAGE
    // ============================================================
    const STORAGE_KEY = 'zap_flags_v2';
    const defaultState = {
      player: { email: '', pass: '', name: '', flags: 0, energy: 100 },
      companies: [],
      admin: { email: 'ovo@ovo', pass: '258258258' }
    };

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState; }
      catch { return defaultState; }
    }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    let state = loadState();

    // ============================================================
    // FORMULÁRIOS
    // ============================================================
    document.getElementById('form-player-login').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('pl-email').value.trim();
      const pass  = document.getElementById('pl-pass').value;
      const msg   = document.getElementById('msg-player-login');
      if (email === state.player.email && pass === state.player.pass) {
        msg.innerHTML = '<span class="ok">✓ Login OK!</span>';
        setTimeout(() => alert('🎮 Bem-vindo ao jogo! (Ecrã do jogo em breve)'), 500);
      } else msg.innerHTML = '<span class="danger">Credenciais inválidas.</span>';
    });

    document.getElementById('form-company-login').addEventListener('submit', e => {
      e.preventDefault();
      const nif  = document.getElementById('co-nif').value.trim();
      const pass = document.getElementById('co-pass').value;
      const msg  = document.getElementById('msg-company-login');
      const co = state.companies.find(c => c.nif === nif);
      if (co && co.pass === pass) {
        msg.innerHTML = '<span class="ok">✓ Login OK!</span>';
        setTimeout(() => alert('🏢 Painel da empresa (em breve)'), 500);
      } else msg.innerHTML = '<span class="danger">NIF ou senha incorretos.</span>';
    });

    document.getElementById('form-admin-login').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('ad-email').value.trim();
      const pass  = document.getElementById('ad-pass').value;
      const msg   = document.getElementById('msg-admin-login');
      if (email === state.admin.email && pass === state.admin.pass) {
        msg.innerHTML = '<span class="ok">✓ Acesso Admin!</span>';
        setTimeout(() => alert('🛡️ Painel Admin (em breve)'), 500);
      } else msg.innerHTML = '<span class="danger">Credenciais inválidas.</span>';
    });

    console.log('✅ ZAP FLAGS v2 inicializado com sucesso');
  </script>
</body>
</html>
