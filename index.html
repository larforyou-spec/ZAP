<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZAP FLAGS - Avatar</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;color:#0f0;font-family:'Courier New',monospace;overflow:hidden;
  width:100vw;height:100vh;}

/* ======= MAPA ======= */
#mapa{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}

/* Escurecer o mapa fora do círculo de visão */
#overlay-escuro{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:2;pointer-events:none;
}

/* ======= AVATAR FIXO NO CENTRO ======= */
#avatar-container{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  pointer-events:none;
}

/* CÍRCULO DE VISÃO */
#circulo-visao{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(0,255,0,.5);
  box-shadow:
    0 0 0 2000px rgba(0,0,0,.75),
    inset 0 0 20px rgba(0,255,0,.1),
    0 0 20px rgba(0,255,0,.3);
  transform:translate(-50%,-50%);
  top:50%;left:50%;
  transition:width .8s ease,height .8s ease,
    box-shadow .8s ease, border-color .8s ease;
  pointer-events:none;
}

/* AVATAR SVG ANIMADO */
#avatar{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:48px;height:48px;
  filter:drop-shadow(0 0 8px #0f0);
  z-index:11;
}

/* ANIMAÇÃO DE ANDAR */
@keyframes caminhar{
  0%,100%{transform:translate(-50%,-55%);}
  50%{transform:translate(-50%,-45%);}
}
@keyframes bracoDireito{
  0%,100%{transform:rotate(-20deg);}
  50%{transform:rotate(20deg);}
}
@keyframes bracoEsquerdo{
  0%,100%{transform:rotate(20deg);}
  50%{transform:rotate(-20deg);}
}
@keyframes pernaDireita{
  0%,100%{transform:rotate(20deg);}
  50%{transform:rotate(-20deg);}
}
@keyframes pernaEsquerda{
  0%,100%{transform:rotate(-20deg);}
  50%{transform:rotate(20deg);}
}
@keyframes cabecaMover{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-2px);}
}
@keyframes corpoOscilar{
  0%,100%{transform:translate(-50%,-50%) rotate(-1deg);}
  50%{transform:translate(-50%,-50%) rotate(1deg);}
}

/* PULSAR quando parado */
@keyframes pulsarParado{
  0%,100%{filter:drop-shadow(0 0 8px #0f0);}
  50%{filter:drop-shadow(0 0 15px #0ff);}
}

/* BRILHO DO CIRCULO */
@keyframes brilhoCirculo{
  0%,100%{box-shadow:0 0 0 2000px rgba(0,0,0,.75),inset 0 0 20px rgba(0,255,0,.1),0 0 20px rgba(0,255,0,.3);}
  50%{box-shadow:0 0 0 2000px rgba(0,0,0,.75),inset 0 0 30px rgba(0,255,0,.2),0 0 35px rgba(0,255,0,.5);}
}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  background:rgba(0,0,0,.85);border-bottom:2px solid #0f0;
  padding:8px 12px;display:flex;justify-content:space-between;align-items:center;
}
#hud-dir{display:flex;gap:8px;align-items:center;}

/* INFO VISAO */
#info-visao{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:20;background:rgba(0,0,0,.85);border:1px solid #0f0;
  border-radius:20px;padding:4px 12px;font-size:.72rem;
  text-align:center;white-space:nowrap;
}

/* BARRA SKILL */
#barra-skill-wrap{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:20;width:220px;text-align:center;
}
#barra-skill-label{font-size:.68rem;color:#0aa;margin-bottom:3px;}
#barra-skill{height:8px;background:#111;border-radius:4px;border:1px solid #0f0;overflow:hidden;}
#barra-skill-fill{height:100%;background:linear-gradient(90deg,#0f0,#0ff);border-radius:4px;transition:width .5s;}

/* GPS INFO */
#gps-info{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:20;font-size:.68rem;color:#555;
  background:rgba(0,0,0,.7);border-radius:12px;padding:3px 10px;
}

/* BOTÃO */
.btn-hud{
  background:#0f0;color:#000;border:none;padding:5px 10px;
  font-size:.72rem;font-weight:bold;cursor:pointer;border-radius:4px;
  font-family:'Courier New',monospace;
}
.btn-hud:hover{background:#0ff;}
.btn-cinza{background:#111;color:#0f0;border:1px solid #0f0;}
.btn-cinza:hover{background:#0a0a0a;}

/* NOTIFICAÇÃO SKILL */
#notif-skill{
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  z-index:30;background:#000;border:2px solid #0ff;border-radius:10px;
  padding:10px 20px;text-align:center;display:none;
  animation:fadeInOut 3s ease forwards;
}
@keyframes fadeInOut{
  0%{opacity:0;transform:translate(-50%,-10px);}
  15%{opacity:1;transform:translate(-50%,0);}
  75%{opacity:1;}
  100%{opacity:0;transform:translate(-50%,-10px);}
}

/* MARCADOR SKILL NO MAPA */
.marcador-skill{
  background:rgba(0,255,0,.2);border:2px solid #0f0;
  border-radius:50%;cursor:pointer;
  animation:pulsar-skill 1.5s ease-in-out infinite alternate;
}
@keyframes pulsar-skill{
  from{transform:scale(1);box-shadow:0 0 5px #0f0;}
  to{transform:scale(1.15);box-shadow:0 0 15px #0ff;}
}

/* PAINEL LATERAL (info do avatar) */
#painel-avatar{
  position:fixed;top:50%;right:10px;transform:translateY(-50%);
  z-index:20;background:rgba(0,0,0,.88);border:1px solid #0f0;
  border-radius:8px;padding:12px;font-size:.72rem;min-width:110px;
}
#painel-avatar .linha{
  display:flex;justify-content:space-between;
  margin:3px 0;border-bottom:1px solid #111;padding-bottom:3px;
}
#painel-avatar .linha:last-child{border-bottom:none;}
.pa-label{color:#0aa;}
.pa-val{color:#0ff;font-weight:bold;}

/* LOADING GPS */
#loading-gps{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:rgba(0,0,0,.9);display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
#loading-gps.oculto{display:none;}
@keyframes girar{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:3px solid #111;border-top-color:#0f0;
  border-radius:50%;animation:girar 1s linear infinite;margin-bottom:15px;}
</style>
</head>
<body>

<!-- LOADING GPS -->
<div id="loading-gps">
  <div class="spinner"></div>
  <p style="color:#0f0;font-size:1rem;margin-bottom:8px;">📡 A obter localização GPS...</p>
  <p style="color:#0aa;font-size:.78rem;margin-bottom:15px;">Permite o acesso à localização para jogar</p>
  <button class="btn-hud btn-cinza" onclick="usarPosicaoPadrao()" style="padding:8px 16px;">
    Continuar sem GPS (posição demo)
  </button>
</div>

<!-- MAPA -->
<div id="mapa"></div>

<!-- OVERLAY ESCURO (cria o efeito de "névoa de guerra") -->
<canvas id="overlay-escuro"></canvas>

<!-- AVATAR FIXO NO CENTRO DO ECRÃ -->
<div id="avatar-container">
  <!-- CÍRCULO DE VISÃO -->
  <div id="circulo-visao"></div>

  <!-- AVATAR SVG ANIMADO -->
  <svg id="avatar" viewBox="0 0 48 60" xmlns="http://www.w3.org/2000/svg">
    <!-- SOMBRA -->
    <ellipse cx="24" cy="56" rx="10" ry="3" fill="rgba(0,0,0,.4)"/>

    <!-- GRUPO CORPO (oscila) -->
    <g id="corpo-grupo" style="transform-origin:24px 30px;">

      <!-- PERNA ESQUERDA -->
      <g id="perna-esq" style="transform-origin:21px 38px;">
        <rect x="18" y="38" width="6" height="14" rx="3" fill="#0a5a0a"/>
        <!-- PÉ -->
        <ellipse cx="20" cy="51" rx="5" ry="3" fill="#050"/>
      </g>

      <!-- PERNA DIREITA -->
      <g id="perna-dir" style="transform-origin:27px 38px;">
        <rect x="24" y="38" width="6" height="14" rx="3" fill="#0a5a0a"/>
        <!-- PÉ -->
        <ellipse cx="28" cy="51" rx="5" ry="3" fill="#050"/>
      </g>

      <!-- TORSO -->
      <rect x="17" y="24" width="14" height="16" rx="4" fill="#0f6a0f"/>
      <!-- DETALHE TORSO -->
      <rect x="20" y="27" width="8" height="2" rx="1" fill="#0ff" opacity=".4"/>
      <rect x="20" y="31" width="8" height="1" rx=".5" fill="#0ff" opacity=".3"/>

      <!-- BRACO ESQUERDO -->
      <g id="braco-esq" style="transform-origin:17px 26px;">
        <rect x="10" y="24" width="7" height="10" rx="3" fill="#0d5a0d"/>
        <!-- MÃO -->
        <circle cx="13" cy="35" r="3" fill="#0a4a0a"/>
      </g>

      <!-- BRACO DIREITO -->
      <g id="braco-dir" style="transform-origin:31px 26px;">
        <rect x="31" y="24" width="7" height="10" rx="3" fill="#0d5a0d"/>
        <!-- MÃO -->
        <circle cx="35" cy="35" r="3" fill="#0a4a0a"/>
      </g>

      <!-- PESCOÇO -->
      <rect x="22" y="20" width="4" height="6" rx="2" fill="#0d5a0d"/>

      <!-- CABEÇA -->
      <g id="cabeca" style="transform-origin:24px 14px;">
        <!-- Cabeça base -->
        <circle cx="24" cy="14" r="10" fill="#0f6a0f"/>
        <!-- Capacete/Boné -->
        <ellipse cx="24" cy="5" rx="9" ry="4" fill="#050"/>
        <rect x="15" y="5" width="18" height="4" rx="2" fill="#050"/>
        <!-- Viseira -->
        <rect x="17" y="8" width="14" height="3" rx="1.5" fill="#0ff" opacity=".6"/>
        <!-- OLHOS -->
        <circle cx="20" cy="14" r="2.5" fill="#000"/>
        <circle cx="28" cy="14" r="2.5" fill="#000"/>
        <circle cx="20" cy="14" r="1.5" fill="#0ff"/>
        <circle cx="28" cy="14" r="1.5" fill="#0ff"/>
        <!-- BRILHO OLHOS -->
        <circle cx="20.8" cy="13.2" r=".6" fill="#fff"/>
        <circle cx="28.8" cy="13.2" r=".6" fill="#fff"/>
        <!-- BOCA -->
        <path d="M 21 18 Q 24 20 27 18" stroke="#0ff" stroke-width="1" fill="none" stroke-linecap="round" opacity=".6"/>
        <!-- ANTENA -->
        <line x1="24" y1="4" x2="24" y2="0" stroke="#0f0" stroke-width="1.5"/>
        <circle cx="24" cy="0" r="2" fill="#0ff">
          <animate attributeName="opacity" values="1;.3;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </svg>
</div>

<!-- HUD -->
<div id="hud">
  <div>
    <div style="font-weight:bold;font-size:.82rem;" id="hud-nome">👤 ---</div>
    <div style="font-size:.62rem;color:#0aa;" id="hud-pos">📍 ---</div>
  </div>
  <div id="hud-dir">
    <button class="btn-hud btn-cinza" onclick="ganharSkill(10)" style="padding:5px 8px;font-size:.7rem;">+Skill (teste)</button>
    <button class="btn-hud btn-cinza" id="btn-seguir" onclick="toggleSeguir()" style="padding:5px 8px;font-size:.7rem;">📍 Centrar</button>
    <button class="btn-hud btn-cinza" onclick="togglePainel()" style="padding:5px 8px;font-size:.7rem;">📊</button>
  </div>
</div>

<!-- PAINEL LATERAL -->
<div id="painel-avatar">
  <div style="color:#0f0;font-weight:bold;text-align:center;margin-bottom:6px;">👤 AVATAR</div>
  <div class="linha"><span class="pa-label">Nível</span><span class="pa-val" id="pa-nivel">1</span></div>
  <div class="linha"><span class="pa-label">Skill</span><span class="pa-val" id="pa-skill">0</span></div>
  <div class="linha"><span class="pa-label">Visão</span><span class="pa-val" id="pa-visao">5m</span></div>
  <div class="linha"><span class="pa-label">Flags</span><span class="pa-val" id="pa-flags">0</span></div>
  <div class="linha"><span class="pa-label">Energia</span><span class="pa-val" id="pa-energia">100%</span></div>
</div>

<!-- INFO VISÃO (por baixo do avatar) -->
<div id="info-visao">
  👁️ Visão: <b id="info-visao-val" style="color:#0ff;">5m</b>
  &nbsp;·&nbsp;
  🎯 Skill: <b id="info-skill-val" style="color:#ff0;">0</b>
</div>

<!-- BARRA SKILL -->
<div id="barra-skill-wrap">
  <div id="barra-skill-label">Próximo nível de visão: <span id="skill-prox">10</span> pts</div>
  <div id="barra-skill">
    <div id="barra-skill-fill" style="width:0%;"></div>
  </div>
</div>

<!-- GPS INFO -->
<div id="gps-info">📡 GPS: a iniciar...</div>

<!-- NOTIFICAÇÃO SKILL -->
<div id="notif-skill">
  <div style="font-size:1.2rem;margin-bottom:4px;">🎯</div>
  <div id="notif-texto" style="color:#0ff;font-weight:bold;font-size:.88rem;"></div>
  <div id="notif-sub" style="color:#0aa;font-size:.75rem;margin-top:2px;"></div>
</div>

<script>
'use strict';

// ============================================================
// CONFIGURAÇÃO
// ============================================================
const PASSO_SKILL = 10;    // pontos skill para +1m de visão
const VISAO_MIN   = 5;     // metros mínimos de visão
const VISAO_MAX   = 100;   // metros máximos de visão
const METROS_POR_PIXEL = 1; // será calculado dinamicamente

// ============================================================
// ESTADO DO AVATAR
// ============================================================
let avatar = {
  nome:     'Jogador',
  lat:      39.5,
  lng:      -8.0,
  skill:    0,
  skillTotal:0,
  nivel:    1,
  visao:    VISAO_MIN,   // metros de visão actual
  flags:    0,
  energia:  100,
  andando:  false,
};

let mapaL       = null;
let watchId     = null;
let gpsFunciona = false;
let seguirGPS   = true;
let marcasBingo = [];
let timerAnim   = null;
let painelVisivel = true;

// ============================================================
// INICIALIZAR MAPA
// ============================================================
function iniciarMapa(){
  mapaL = L.map('mapa', {
    center:       [avatar.lat, avatar.lng],
    zoom:         18,       // zoom próximo para mostrar a área de visão
    zoomControl:  true,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',
    maxZoom:20,
  }).addTo(mapaL);

  // Quando o mapa se move, actualizar posição se seguirGPS estiver off
  mapaL.on('move', () => {
    if(!seguirGPS){
      const c = mapaL.getCenter();
      avatar.lat = c.lat;
      avatar.lng = c.lng;
      actualizarOverlay();
    }
  });

  mapaL.on('zoom', () => {
    actualizarCirculoVisao();
    actualizarOverlay();
  });

  // Iniciar GPS
  iniciarGPS();
}

// ============================================================
// GPS REAL
// ============================================================
function iniciarGPS(){
  if(!navigator.geolocation){
    G('gps-info').innerText='❌ GPS não suportado — modo demo';
    usarPosicaoPadrao();
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);

      // Esconder loading
      G('loading-gps').classList.add('oculto');
      gpsFunciona = true;

      // Actualizar posição do avatar
      avatar.lat = lat;
      avatar.lng = lng;

      // Seguir GPS
      if(seguirGPS) mapaL.setView([lat, lng], mapaL.getZoom());

      // Info GPS
      G('gps-info').innerText = `📡 GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)} (±${acc}m)`;
      G('hud-pos').innerText  = `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

      actualizarCirculoVisao();
      actualizarOverlay();
      actualizarPainel();
    },
    err => {
      gpsFunciona = false;
      let m = '⚠️ GPS indisponível';
      if(err.code===1) m='❌ GPS bloqueado — permite localização';
      G('gps-info').innerText = m;
      // Modo demo
      usarPosicaoPadrao();
    },
    {enableHighAccuracy:true, maximumAge:2000, timeout:10000}
  );
}

function usarPosicaoPadrao(){
  G('loading-gps').classList.add('oculto');
  avatar.lat = 38.7223; avatar.lng = -9.1393; // Lisboa
  mapaL.setView([avatar.lat, avatar.lng], 18);
  G('gps-info').innerText='📍 Modo demo — arrasta o mapa para "andar"';
  G('hud-pos').innerText='📍 Demo (Lisboa)';
  actualizarCirculoVisao();
  actualizarOverlay();
  actualizarPainel();
}

// ============================================================
// CÍRCULO DE VISÃO
// ============================================================
function actualizarCirculoVisao(){
  if(!mapaL) return;
  const visaoM   = avatar.visao; // metros
  const pixeis   = calcularPixeisPorMetro() * visaoM;
  const diam     = Math.max(80, pixeis * 2); // diâmetro em px, mínimo 80px

  const circ = G('circulo-visao');

  // Cor varia com o nível de visão
  const progresso = (visaoM - VISAO_MIN) / (VISAO_MAX - VISAO_MIN);
  const r1 = Math.round(0 + progresso * 0);
  const g1 = Math.round(255);
  const b1 = Math.round(0 + progresso * 255);
  const corBorda = `rgb(${r1},${g1},${b1})`;

  circ.style.width  = diam + 'px';
  circ.style.height = diam + 'px';
  circ.style.borderColor = corBorda;
  circ.style.boxShadow = `
    0 0 0 2000px rgba(0,0,0,.78),
    inset 0 0 ${20+progresso*30}px rgba(${r1},${g1},${b1},.15),
    0 0 ${20+progresso*40}px rgba(${r1},${g1},${b1},.4)
  `;
  circ.style.animation = `brilhoCirculo ${2-progresso}s ease-in-out infinite`;
}

function calcularPixeisPorMetro(){
  if(!mapaL) return 1;
  // Calcular quantos pixéis = 1 metro no zoom actual
  const zoom     = mapaL.getZoom();
  const lat      = mapaL.getCenter().lat;
  const ppm      = 156543.03392 * Math.cos(lat*Math.PI/180) / Math.pow(2,zoom);
  return 1 / ppm; // pixéis por metro
}

// ============================================================
// OVERLAY ESCURO (fog of war)
// ============================================================
function actualizarOverlay(){
  const canvas = G('overlay-escuro');
  const ctx    = canvas.getContext('2d');
  const W      = window.innerWidth;
  const H      = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;

  const cx = W/2;
  const cy = H/2;

  const visaoM  = avatar.visao;
  const raio    = Math.max(40, calcularPixeisPorMetro() * visaoM);

  // Escurecer tudo
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = 'rgba(0,0,0,.78)';
  ctx.fillRect(0,0,W,H);

  // "Recortar" o círculo de visão com gradiente
  const grad = ctx.createRadialGradient(cx,cy,raio*.6,cx,cy,raio);
  grad.addColorStop(0,'rgba(0,0,0,1)');   // centro: apagar o escuro
  grad.addColorStop(1,'rgba(0,0,0,0)');   // borda: manter o escuro

  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(cx,cy,raio,0,Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.fill();
  ctx.restore();

  // Gradiente suave na borda do círculo
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  const gradBorda = ctx.createRadialGradient(cx,cy,raio*.7,cx,cy,raio*1.1);
  gradBorda.addColorStop(0,'rgba(0,0,0,0)');
  gradBorda.addColorStop(1,'rgba(0,0,0,.78)');
  ctx.beginPath();
  ctx.arc(cx,cy,raio*1.1,0,Math.PI*2);
  ctx.fillStyle = gradBorda;
  ctx.fill();
  ctx.restore();
}

// ============================================================
// ANIMAÇÃO DO AVATAR
// ============================================================
let estadoAnim = 'parado';
let dirAvatar  = 1; // 1=direita, -1=esquerda
let posAnterior = null;
let animFrame  = null;

function iniciarAnimacaoAvatar(){
  animarPasso();
}

let t = 0;
function animarPasso(){
  t += 0.08;

  const andando = avatar.andando;
  const svg     = G('avatar');
  const bracoE  = G('braco-esq');
  const bracoD  = G('braco-dir');
  const pernaE  = G('perna-esq');
  const pernaD  = G('perna-dir');
  const cabeca  = G('cabeca');
  const corpoG  = G('corpo-grupo');

  if(andando){
    // Animação de andar
    const amp = 20;
    const bracoAng = Math.sin(t) * amp;
    const pernaAng = Math.sin(t) * amp;
    const cabecaY  = Math.abs(Math.sin(t*2)) * -1;
    const corpoAng = Math.sin(t) * 2;

    bracoE.style.transform = `rotate(${bracoAng}deg)`;
    bracoD.style.transform = `rotate(${-bracoAng}deg)`;
    pernaE.style.transform = `rotate(${-pernaAng}deg)`;
    pernaD.style.transform = `rotate(${pernaAng}deg)`;
    cabeca.style.transform  = `translateY(${cabecaY}px)`;
    corpoG.style.transform  = `translate(-50%,-50%) rotate(${corpoAng}deg)`;

    // Direção (espelhar se for para a esquerda)
    svg.style.transform = `translate(-50%,-50%) scaleX(${dirAvatar})`;
    svg.style.filter    = 'drop-shadow(0 0 10px #0f0)';
  } else {
    // Respiração suave quando parado
    const amp = 1;
    const resp = Math.sin(t*.5) * amp;

    bracoE.style.transform = `rotate(${resp}deg)`;
    bracoD.style.transform = `rotate(${-resp}deg)`;
    pernaE.style.transform = `rotate(0deg)`;
    pernaD.style.transform = `rotate(0deg)`;
    cabeca.style.transform  = `translateY(${resp*.5}px)`;
    corpoG.style.transform  = 'translate(-50%,-50%) rotate(0deg)';

    // Pulsar suave
    const escala = 1 + Math.sin(t*.8)*.02;
    svg.style.transform = `translate(-50%,-50%) scale(${escala})`;
    svg.style.filter    = `drop-shadow(0 0 ${8+Math.sin(t*.8)*4}px #0f0)`;
  }

  animFrame = requestAnimationFrame(animarPasso);
}

// Detectar movimento do GPS para activar animação de andar
function verificarMovimento(novaLat, novaLng){
  if(!posAnterior){
    posAnterior = {lat:novaLat, lng:novaLng};
    return;
  }
  const dx = novaLng - posAnterior.lng;
  const dy = novaLat - posAnterior.lat;
  const dist = Math.sqrt(dx*dx+dy*dy) * 111000; // metros aproximados

  if(dist > 1){
    avatar.andando = true;
    dirAvatar = dx > 0 ? 1 : -1;
    clearTimeout(timerAnim);
    timerAnim = setTimeout(()=>{ avatar.andando=false; }, 2000);
  }
  posAnterior = {lat:novaLat, lng:novaLng};
}

// ============================================================
// SISTEMA DE SKILL / VISÃO
// ============================================================
/*
  REGRA:
  - Cada 10 pontos de skill → +1 metro de visão
  - Visão começa em 5m e pode chegar a 100m
  - O círculo no mapa expande-se visualmente
*/

function ganharSkill(pontos){
  avatar.skill      += pontos;
  avatar.skillTotal += pontos;

  // Calcular nova visão
  const visaoExtra  = Math.floor(avatar.skill / PASSO_SKILL);
  const novaVisao   = Math.min(VISAO_MAX, VISAO_MIN + visaoExtra);

  const visaoAnterior = avatar.visao;
  avatar.visao = novaVisao;

  // Calcular nível
  avatar.nivel = Math.floor(avatar.skillTotal / 50) + 1;

  // Mostrar notificação se a visão aumentou
  if(novaVisao > visaoAnterior){
    mostrarNotifSkill(
      `👁️ Visão aumentou para ${novaVisao}m!`,
      `+${novaVisao-visaoAnterior}m · Skill: ${avatar.skill}`
    );
  }

  // Actualizar tudo
  actualizarCirculoVisao();
  actualizarOverlay();
  actualizarPainel();
  actualizarBarraSkill();
}

function actualizarBarraSkill(){
  const skillNoNivel = avatar.skill % PASSO_SKILL;
  const pct          = (skillNoNivel / PASSO_SKILL) * 100;
  const proxVisao    = avatar.visao < VISAO_MAX ? avatar.visao + 1 : VISAO_MAX;

  G('barra-skill-fill').style.width = pct + '%';
  G('barra-skill-label').innerText  = avatar.visao >= VISAO_MAX
    ? `👁️ Visão máxima atingida! (${VISAO_MAX}m)`
    : `Próxima visão ${proxVisao}m em ${PASSO_SKILL - skillNoNivel} skill`;
  G('skill-prox').innerText = PASSO_SKILL - skillNoNivel;

  // Info visão
  G('info-visao-val').innerText  = avatar.visao + 'm';
  G('info-skill-val').innerText  = avatar.skill;
}

function actualizarPainel(){
  G('pa-nivel').innerText   = avatar.nivel;
  G('pa-skill').innerText   = avatar.skill;
  G('pa-visao').innerText   = avatar.visao + 'm';
  G('pa-flags').innerText   = avatar.flags;
  G('pa-energia').innerText = Math.round(avatar.energia) + '%';
  G('hud-nome').innerText   = '👤 ' + avatar.nome;
}

function mostrarNotifSkill(texto, sub){
  const n = G('notif-skill');
  G('notif-texto').innerText = texto;
  G('notif-sub').innerText   = sub || '';
  n.style.display = 'flex';
  n.style.flexDirection = 'column';
  n.style.animation = 'none';
  // Restart animation
  void n.offsetWidth;
  n.style.animation = 'fadeInOut 3s ease forwards';
  setTimeout(()=>{ n.style.display='none'; }, 3000);
}

// ============================================================
// MARCADORES DE SKILL NO MAPA
// ============================================================
function colocarMarcadoresSkill(){
  // Colocar alguns marcadores de skill em volta
  const raiosKm = [0.05, 0.1, 0.08, 0.12, 0.07];
  const angulos  = [30, 110, 200, 280, 350];

  raiosKm.forEach((r,i) => {
    const ang  = angulos[i] * Math.PI/180;
    const lat2 = avatar.lat + (r/111.32)*Math.cos(ang);
    const lng2 = avatar.lng + (r/(111.32*Math.cos(avatar.lat*Math.PI/180)))*Math.sin(ang);

    const ic = L.divIcon({
      className:'',
      html:`<div class="marcador-skill" style="width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.8rem;">👁️</div>`,
      iconSize:[20,20],iconAnchor:[10,10]
    });

    const m = L.marker([lat2,lng2],{icon:ic}).addTo(mapaL);
    m.bindPopup(`<b>🎯 Cristal de Skill</b><br>Clica para ganhar +${5+i*2} skill!`);
    m.on('click',()=>{
      const pts = 5+i*2;
      ganharSkill(pts);
      avatar.flags++;
      mapaL.removeLayer(m);
      actualizarPainel();
    });
    marcasBingo.push(m);
  });
}

// ============================================================
// TOGGLES
// ============================================================
function toggleSeguir(){
  seguirGPS = !seguirGPS;
  const btn = G('btn-seguir');
  if(seguirGPS){
    btn.innerText = '📍 A seguir';
    btn.style.background = '#0f0';
    btn.style.color = '#000';
    if(mapaL) mapaL.setView([avatar.lat, avatar.lng]);
  } else {
    btn.innerText = '📍 Centrar';
    btn.style.background = '#111';
    btn.style.color = '#0f0';
  }
}

function togglePainel(){
  painelVisivel = !painelVisivel;
  G('painel-avatar').style.display = painelVisivel ? 'block' : 'none';
}

// ============================================================
// UTILS
// ============================================================
const G = id => document.getElementById(id);

// Redimensionar overlay quando a janela muda de tamanho
window.addEventListener('resize', ()=>{
  actualizarOverlay();
  actualizarCirculoVisao();
});

// ============================================================
// INICIALIZAR
// ============================================================
function iniciar(){
  // Carregar dados do localStorage se existirem
  try {
    const sj = JSON.parse(localStorage.getItem('zap_sj') || 'null');
    if(sj){
      avatar.nome     = sj.nm   || 'Jogador';
      avatar.flags    = sj.fl   || 0;
      avatar.energia  = sj.en   || 100;
      avatar.skill    = sj.skillPts || 0;
      avatar.skillTotal= sj.skillPts || 0;
      // Recalcular visão
      const visaoExtra = Math.floor(avatar.skill / PASSO_SKILL);
      avatar.visao     = Math.min(VISAO_MAX, VISAO_MIN + visaoExtra);
      avatar.nivel     = Math.floor(avatar.skillTotal / 50) + 1;
    }
  } catch(e){}

  // Iniciar mapa
  iniciarMapa();

  // Iniciar animação do avatar
  iniciarAnimacaoAvatar();

  // Actualizar UI inicial
  actualizarPainel();
  actualizarBarraSkill();

  // Colocar marcadores de skill após breve delay
  setTimeout(()=>{
    actualizarCirculoVisao();
    actualizarOverlay();
    colocarMarcadoresSkill();
  }, 500);

  // Actualizar overlay periodicamente (quando o mapa é arrastado)
  setInterval(()=>{
    actualizarOverlay();
    actualizarCirculoVisao();
  }, 100);
}

// Aguardar DOM
window.addEventListener('load', iniciar);
</script>
