<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAP FLAGS - PC Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- ESTILO DESKTOP --- */
        body { margin: 0; padding: 0; font-family: 'Courier New', monospace; overflow: hidden; background: #000; color: #0ff; }
        #map { width: 100vw; height: 100vh; cursor: crosshair; }
        
        /* LOGIN SCREEN */
        #login-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .login-box { background: #111; padding: 40px; border: 2px solid #ff00ff; text-align: center; }
        h1 { font-size: 3rem; margin: 0 0 20px 0; text-shadow: 0 0 10px #0ff; }
        .btn { background: transparent; border: 2px solid #fff; color: #fff; padding: 15px 40px; font-size: 1.2rem; margin: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #fff; color: #000; }
        .btn-pr { border-color: #ff00ff; color: #ff00ff; }
        .btn-pr:hover { background: #ff00ff; color: #fff; }

        /* SIDEBAR (HUD) */
        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 250px;
            background: rgba(0,0,0,0.8); border: 1px solid #0ff; padding: 15px;
            z-index: 500; display: none;
        }
        #sidebar h3 { margin: 0 0 10px 0; color: #ff00ff; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.9rem; }
        
        /* PAINEL PR (EM BAIXO) */
        #pr-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 200px;
            background: rgba(20,0,20,0.95); border-top: 2px solid #ff00ff;
            z-index: 500; display: none; padding: 20px; overflow-y: auto;
        }
        .pack-card { background: #333; padding: 10px; margin: 5px; border-radius: 5px; display: inline-block; width: 200px; }

        /* MODAL QR */
        #qr-modal { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 2000; 
            background: white; color: black; padding: 30px; border-radius: 10px; text-align: center; 
            box-shadow: 0 0 50px #000;
        }
    </style>
</head>
<body>

    <!-- 🗺️ MAPA -->
    <div id="map"></div>

    <!-- 🚪 LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h1>⚡ ZAP FLAGS PC</h1>
            <p>Clica para jogar</p>
            <button class="btn" onclick="startApp('player')">🎮 JOGADOR</button>
            <button class="btn btn-pr" onclick="startApp('pr')">🏪 LOJISTA (PR)</button>
        </div>
    </div>

    <!-- 📊 SIDEBAR JOGADOR -->
    <div id="sidebar">
        <h3>🤖 JOGADOR</h3>
        <div class="stat-row"><span>Bandeiras:</span> <span id="flag-count">0</span></div>
        <div class="stat-row"><span>QRs Ganhos:</span> <span id="qr-count">0</span></div>
        <hr style="border-color: #333;">
        <p style="font-size:0.8rem; color:#888;">Clica no mapa para andar.<br>Clica na bandeira para apanhar.</p>
    </div>

    <!-- 💼 PAINEL PR -->
    <div id="pr-panel">
        <h3 style="color:#ff00ff; margin-top:0;">GERIR CAMPANHAS (PR)</h3>
        <div id="pr-list"></div>
        <button class="btn btn-pr" style="margin-top:10px;" onclick="addCampaign()">+ NOVA CAMPANHA</button>
    </div>

    <!-- 🎁 QR MODAL -->
    <div id="qr-modal">
        <h2 id="qr-title">PRÉMIO!</h2>
        <div id="qr-image"></div>
        <p>Loja: <b id="qr-pr-name">...</b></p>
        <button class="btn" onclick="closeQR()">FECHAR</button>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // --- & CONFIGURAÇÃO ---
        let map, playerMarker;
        let currentUser = null;
        let flags = [];
        let collections = {}; // { 'pr1-red': 2 }

        // Dados dos PRs (Podes editar isto)
        let prCampaigns = [
            {
                id: 1,
                name: "STARBUCKS LISBOA",
                radius: 1000, // 1km
                lots: [
                    { color: 'red', discount: '50%', target: 3, url: 'https://starbucks.com' },
                    { color: 'blue', discount: '10%', target: 5, url: 'https://starbucks.com' },
                    { color: 'grey', discount: 'Neutro', target: 0, url: 'https://starbucks.com' }
                ]
            },
            {
                id: 2,
                name: "NIKE ALGÉS",
                radius: 500,
                lots: [
                    { color: 'orange', discount: '20%', target: 2, url: 'https://nike.com' }
                ]
            }
        ];

        // --- 🚀 START ---
        function startApp(role) {
            currentUser = role;
            document.getElementById('login-screen').style.display = 'none';
            
            initMap();

            if (role === 'player') {
                document.getElementById('sidebar').style.display = 'block';
                loadCollections();
                spawnAllFlags();
            } else {
                document.getElementById('pr-panel').style.display = 'block';
                renderPRPanel();
            }
        }

        // --- 🗺️ MAPA & MOVIMENTO (PC) ---
        function initMap() {
            map = L.map('map').setView([38.7223, -9.1393], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // MOVIMENTO: Clicar no mapa move o jogador
            map.on('click', function(e) {
                movePlayer(e.latlng.lat, e.latlng.lng);
            });
        }

        function movePlayer(lat, lon) {
            if (!playerMarker) {
                playerMarker = L.marker([lat, lon], { 
                    icon: L.divIcon({ className: 'player-dot', html: '🤖', iconSize: [30,30] }) 
                }).addTo(map);
            } else {
                playerMarker.setLatLng([lat, lon]);
                map.panTo([lat, lon]);
            }
            checkNearbyFlags(lat, lon);
        }

        // --- 🚩 SISTEMA DE BANDEIRAS ---
        function spawnAllFlags() {
            flags.forEach(f => map.removeLayer(f.marker));
            flags = [];
            prCampaigns.forEach(pr => {
                pr.lots.forEach(lot => {
                    for(let i=0; i<3; i++) createFlag(pr, lot);
                });
            });
        }

        function createFlag(pr, lot) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * pr.radius;
            const lat = 38.7223 + (Math.random() * 0.1 - 0.05);
            const lon = -9.1393 + (Math.random() * 0.1 - 0.05);

            const flag = { id: Date.now()+Math.random(), prId: pr.id, prName: pr.name, color: lot.color, discount: lot.discount, target: lot.target, url: lot.url, lat: lat, lon: lon, marker: null };
            
            const iconHtml = `<div class="flag-icon flag-${lot.color}"></div>`;
            flag.marker = L.marker([lat, lon], { icon: L.divIcon({ className: 'flag', html: iconHtml, iconSize: [30,40] }) }).addTo(map);
            
            // CLIQUE NA BANDEIRA (PC)
            flag.marker.on('click', () => captureFlag(flag));
            flags.push(flag);
        }

        function checkNearbyFlags(pLat, pLon) {
            // Auto-captura se clicares MUITO perto (ajuda o jogador)
            flags.forEach(flag => {
                if (getDistance(pLat, pLon, flag.lat, flag.lon) < 10) {
                    captureFlag(flag);
                }
            });
        }

        function captureFlag(flag) {
            // 1. Abre Publicidade (Nova Aba)
            window.open(flag.url, '_blank');

            // 2. Atualiza Contagem
            const key = `${flag.prId}-${flag.color}`;
            if (!collections[key]) collections[key] = 0;
            collections[key]++;
            saveCollections();
            updateHUD();

            // 3. Remove Bandeira
            map.removeLayer(flag.marker);
            flags = flags.filter(f => f.id !== flag.id);

            // 4. Verifica QR
            if (flag.target > 0 && collections[key] >= flag.target) {
                generateQR(flag.prName, flag.discount);
                collections[key] = 0; // Reseta
                saveCollections();
            }
        }

        // --- 🎁 QR & UI ---
        function generateQR(prName, discount) {
            document.getElementById('qr-title').innerText = `PARABÉNS! ${discount} DESCONTO`;
            document.getElementById('qr-pr-name').innerText = prName;
            document.getElementById('qr-image').innerHTML = "";
            new QRCode(document.getElementById('qr-image'), { text: `ZAP_${prName}_${discount}_${Date.now()}`, width: 150, height: 150 });
            document.getElementById('qr-modal').style.display = 'block';
            document.getElementById('qr-count').innerText = parseInt(document.getElementById('qr-count').innerText) + 1;
        }

        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
        function updateHUD() { 
            let total = 0; for(let k in collections) total += collections[k];
            document.getElementById('flag-count').innerText = total;
        }
        function saveCollections() { localStorage.setItem('zap_pc_collections', JSON.stringify(collections)); }
        function loadCollections() { 
            const saved = localStorage.getItem('zap_pc_collections'); 
            if (saved) collections = JSON.parse(saved); 
            updateHUD();
        }

        // --- 💼 LÓGICA PR ---
        function renderPRPanel() {
            const list = document.getElementById('pr-list');
            list.innerHTML = '';
            prCampaigns.forEach((pr, i) => {
                list.innerHTML += `
                    <div class="pack-card">
                        <strong>${pr.name}</strong><br>
                        <small>Raio: ${pr.radius}m</small><br>
                        <button onclick="editRadius(${i})" style="font-size:0.7rem">Editar Raio</button>
                    </div>`;
            });
        }
        function addCampaign() {
            const name = prompt("Nome da Loja:");
            if(name) prCampaigns.push({ id: Date.now(), name: name, radius: 500, lots: [{ color: 'red', discount: '10%', target: 2, url: '#' }] });
            renderPRPanel();
            if(currentUser==='player') spawnAllFlags();
        }
        function editRadius(index) {
            const r = prompt("Novo raio em metros:", prCampaigns[index].radius);
            if(r) { prCampaigns[index].radius = parseInt(r); renderPRPanel(); if(currentUser==='player') spawnAllFlags(); }
        }
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c * 1000;
        }
    </script>
</body>
</html>
