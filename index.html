<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAP FLAGS - Bandeiras BINGO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Courier New',monospace;background:#000;color:#0f0;min-height:100vh;}

/* HUD FIXO NO TOPO */
.hud-bingo{
  position:sticky;top:0;left:0;right:0;z-index:3000;
  background:rgba(10,8,0,.98);
  border-bottom:3px solid #ff0;
  padding:10px 15px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 15px rgba(255,200,0,.3);
}
.hud-titulo{
  display:flex;align-items:center;gap:8px;
}
.hud-titulo h1{font-size:1.3rem;color:#ff0;text-shadow:0 0 10px #ff0;}
.hud-btns{display:flex;gap:6px;}

/* CONTEÚDO */
.box{max-width:580px;margin:0 auto;padding:15px;}

h2{font-size:1.1rem;margin-bottom:10px;border-bottom:1px solid #ff0;padding-bottom:6px;color:#ff0;}
h3{font-size:.88rem;color:#0ff;margin:10px 0 6px;}

input,select,textarea{width:100%;background:#0a0a0a;color:#0f0;border:1px solid #0f0;
  padding:10px;margin:4px 0;font-size:.9rem;font-family:'Courier New',monospace;border-radius:4px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0ff;box-shadow:0 0 5px #0ff;}
select option{background:#0a0a0a;}
textarea{resize:vertical;min-height:65px;}
input[type=range]{border:none;background:transparent;padding:6px 0;cursor:pointer;}

.btn{display:inline-block;padding:10px 16px;margin:3px 2px;font-size:.85rem;font-weight:bold;
  cursor:pointer;font-family:'Courier New',monospace;border:none;border-radius:4px;transition:all .2s;}
.bb{display:block;width:100%;margin:5px 0;padding:12px;text-align:center;}
.bv{background:#0f0;color:#000;}.bv:hover{background:#0ff;}
.bc{background:#111;color:#0f0;border:1px solid #0f0;}.bc:hover{background:#1a1a1a;}
.bo{background:linear-gradient(45deg,#f80,#ff0);color:#000;}.bo:hover{background:#ff0;}
.br{background:#1a0000;color:#f00;border:1px solid #f00;}.br:hover{background:#300;}
.bvol{background:#000;color:#0aa;border:1px solid #0aa;font-size:.82rem;padding:7px 12px;}.bvol:hover{background:#0aa;color:#000;}
.bsair{background:#1a0000;color:#f00;border:1px solid #f00;font-size:.82rem;padding:7px 12px;}.bsair:hover{background:#300;}
.bbingo{background:linear-gradient(45deg,#600,#f00,#ff0);color:#fff;border:2px solid #ff0;
  animation:bingoPulse 2s ease-in-out infinite;}
@keyframes bingoPulse{0%,100%{box-shadow:0 0 5px #ff0}50%{box-shadow:0 0 20px #ff0,0 0 40px #f00}}
.bdesativ{background:#1a0000;color:#f00;border:2px solid #f00;}.bdesativ:hover{background:#300;}
.bpurple{background:linear-gradient(45deg,#606,#90f);color:#fff;}.bpurple:hover{background:#90f;}

.msg{padding:10px;margin:6px 0;border-radius:4px;display:none;font-size:.83rem;}
.msg.e{background:#200;border:1px solid #f00;color:#f00;display:block;}
.msg.s{background:#020;border:1px solid #0f0;color:#0f0;display:block;}
.msg.i{background:#002;border:1px solid #0ff;color:#0ff;display:block;}
.msg.a{background:#220;border:1px solid #ff0;color:#ff0;display:block;}

.card{background:#080808;border:1px solid #222;border-radius:8px;padding:14px;margin:8px 0;}
.card-y{border-color:#ff0;background:#0a0800;}
.card-v{border-color:#0f0;background:#050f05;}
.card-b{border-color:#0ff;background:#00080a;}
.card-r{border-color:#f00;background:#0f0000;}
.card-bingo{border-color:#ff0;background:linear-gradient(135deg,#1a0000,#1a0800);}

.row{padding:5px 0;border-bottom:1px solid #111;font-size:.82rem;display:flex;
  justify-content:space-between;align-items:flex-start;gap:8px;}
.row:last-child{border-bottom:none;}
.rl{color:#0aa;font-size:.7rem;white-space:nowrap;padding-top:2px;flex-shrink:0;}
.rv{text-align:right;font-size:.82rem;word-break:break-word;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0;}
.stat{background:#080808;border:1px solid #ff0;border-radius:8px;padding:10px;text-align:center;}
.stat-n{font-size:1.5rem;color:#ff0;font-weight:bold;}
.stat-t{font-size:.7rem;color:#0aa;margin-top:3px;}

/* BINGO FLAG CARD */
.bfc{border-radius:10px;padding:14px;margin:12px 0;position:relative;}
.bfc.inativa{background:#0a0500;border:2px solid #333;}
.bfc.ativa{background:#1a0800;border:2px solid #ff0;box-shadow:0 0 12px rgba(255,200,0,.3);}
.bfc.encontrada{background:#001a00;border:2px solid #0f0;}
.bfc.expirada{background:#0a0000;border:2px solid #333;opacity:.6;}

/* TIMER GRANDE */
.timer-grande{display:flex;flex-direction:column;align-items:center;
  background:#000;border:3px solid #ff0;border-radius:12px;
  padding:14px;margin:10px 0;text-align:center;}
.timer-display{font-size:2.8rem;color:#ff0;font-weight:bold;
  font-family:'Courier New',monospace;text-shadow:0 0 15px #ff0;
  letter-spacing:4px;line-height:1;}
.timer-label{font-size:.72rem;color:#0aa;margin-top:4px;}
.timer-ico-anim{font-size:2rem;animation:tick 1s ease-in-out infinite alternate;display:inline-block;}
@keyframes tick{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}

/* SLIDER */
.slider-wrapper{background:#0a0a0a;border:1px solid #ff0;border-radius:8px;padding:14px;margin:8px 0;}
.slider-val{font-size:1.6rem;color:#ff0;font-weight:bold;text-align:center;margin:6px 0;}
.slider-sub{display:flex;justify-content:space-between;font-size:.65rem;color:#555;margin-top:3px;}

/* FOTO */
.foto-area{border:2px dashed #ff0;border-radius:8px;padding:20px;
  text-align:center;cursor:pointer;background:#0a0800;transition:all .2s;margin:6px 0;}
.foto-area:hover{background:#1a1000;border-color:#0ff;}

/* BADGES */
.badge-ativa   {background:#1a0800;color:#ff0;border:1px solid #ff0;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:bold;}
.badge-inativa {background:#111;color:#555;border:1px solid #333;padding:3px 10px;border-radius:12px;font-size:.72rem;}
.badge-enc     {background:#001a00;color:#0f0;border:1px solid #0f0;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:bold;}
.badge-exp     {background:#1a0000;color:#f00;border:1px solid #f00;padding:3px 10px;border-radius:12px;font-size:.72rem;}

/* QR */
.qr-wrap{background:#fff;padding:16px;border-radius:8px;text-align:center;margin:12px auto;max-width:240px;}
.qr-info{background:#0a0a0a;border:1px solid #0f0;border-radius:8px;padding:12px;margin:10px 0;}
.qr-info .row{border-color:#111;}
.qr-premio-box{background:#1a0800;border:3px solid #ff0;border-radius:10px;padding:16px;text-align:center;margin:10px 0;}

/* EDIT SECTION */
.edit-section{background:#080808;border:1px solid #333;border-radius:8px;padding:12px;margin:10px 0;}
.edit-section h3{color:#ff0;margin-bottom:8px;}

/* MODAL */
#movl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9000;display:none;}
#mdl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;
  border:3px solid #ff0;border-radius:12px;padding:20px;z-index:9001;
  width:95%;max-width:520px;max-height:92vh;overflow-y:auto;display:none;}

/* CONFIRM SAIR */
#confirm-sair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#000;border:3px solid #f00;border-radius:12px;padding:24px;
  z-index:9500;width:90%;max-width:380px;text-align:center;display:none;}
#confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9499;display:none;}

.sep{border:none;border-top:1px solid #222;margin:12px 0;}
.pb{width:100%;height:10px;background:#222;border-radius:5px;margin:6px 0;overflow:hidden;}
.pf{height:100%;border-radius:5px;transition:width .5s;}
.scroll{max-height:60vh;overflow-y:auto;padding-right:3px;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:#ff0;}

/* BANNER VOLTA */
.banner-volta{background:#001a00;border:1px solid #0f0;border-radius:6px;
  padding:8px 12px;margin-bottom:10px;font-size:.78rem;color:#0aa;text-align:center;}
</style>
</head>
<body>

<!-- ===== HUD FIXO COM BOTÕES VOLTAR / SAIR ===== -->
<div class="hud-bingo">
  <div class="hud-titulo">
    <span style="font-size:1.6rem;">🎰</span>
    <div>
      <h1>BINGO FLAGS</h1>
      <div style="font-size:.65rem;color:#0aa;">Painel do Lojista</div>
    </div>
  </div>

  <!-- STATS NO HUD -->
  <div style="display:flex;gap:12px;font-size:.78rem;text-align:center;">
    <div>
      <div style="color:#ff0;font-weight:bold;font-size:1.1rem;" id="hud-total">0</div>
      <div style="color:#555;font-size:.62rem;">Total</div>
    </div>
    <div>
      <div style="color:#0f0;font-weight:bold;font-size:1.1rem;" id="hud-ativas">0</div>
      <div style="color:#555;font-size:.62rem;">Ativas</div>
    </div>
    <div>
      <div style="color:#0ff;font-weight:bold;font-size:1.1rem;" id="hud-enc">0</div>
      <div style="color:#555;font-size:.62rem;">Encontradas</div>
    </div>
  </div>

  <!-- BOTÕES VOLTAR / SAIR -->
  <div class="hud-btns">
    <button class="btn bvol" onclick="voltarPainel()" title="Voltar ao painel do lojista">
      ← Voltar
    </button>
    <button class="btn bsair" onclick="mostrarConfirmSair()" title="Sair da conta">
      Sair
    </button>
  </div>
</div>

<!-- CONTEÚDO PRINCIPAL -->
<div class="box">

  <!-- BANNER INFO -->
  <div class="banner-volta">
    💡 Para voltar ao painel principal do lojista, clica em <b style="color:#0ff;">← Voltar</b> no topo.
  </div>

  <!-- STATS CARDS -->
  <div class="grid3" style="margin-bottom:12px;">
    <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-t">🎰 Total</div></div>
    <div class="stat"><div class="stat-n" id="st-ativas" style="color:#0f0;">0</div><div class="stat-t">⚡ Ativas</div></div>
    <div class="stat"><div class="stat-n" id="st-enc" style="color:#0ff;">0</div><div class="stat-t">✅ Encontradas</div></div>
  </div>

  <!-- MSG GLOBAL -->
  <div id="msg-global" class="msg"></div>

  <!-- LISTA DE BANDEIRAS BINGO -->
  <div id="lista-bingo" class="scroll"></div>

  <!-- BOTÃO VOLTAR EM BAIXO (para quando a lista é longa) -->
  <div style="display:flex;gap:8px;margin-top:20px;padding-top:15px;border-top:1px solid #222;">
    <button class="btn bvol" style="flex:1;padding:12px;" onclick="voltarPainel()">
      ← VOLTAR AO PAINEL
    </button>
    <button class="btn bsair" style="flex:1;padding:12px;" onclick="mostrarConfirmSair()">
      🚪 SAIR DA CONTA
    </button>
  </div>

</div><!-- fim .box -->

<!-- ===== CONFIRMAÇÃO SAIR ===== -->
<div id="confirm-overlay" onclick="fecharConfirmSair()"></div>
<div id="confirm-sair">
  <div style="font-size:2.5rem;margin-bottom:10px;">🚪</div>
  <h2 style="color:#f00;border-color:#f00;margin-bottom:12px;">SAIR DA CONTA</h2>
  <p style="color:#0aa;font-size:.85rem;margin-bottom:20px;">
    Tens a certeza que queres sair da conta da empresa?<br>
    <span style="color:#555;font-size:.78rem;">Os dados ficam guardados.</span>
  </p>
  <div style="display:flex;gap:8px;">
    <button class="btn bvol" style="flex:1;padding:12px;" onclick="fecharConfirmSair()">
      ❌ CANCELAR
    </button>
    <button class="btn bsair" style="flex:1;padding:12px;" onclick="confirmarSair()">
      ✅ SIM, SAIR
    </button>
  </div>
</div>

<!-- MODAL PRINCIPAL -->
<div id="movl" onclick="fecharMdl()"></div>
<div id="mdl">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h2 id="mdl-tit" style="color:#ff0;border:none;margin:0;">---</h2>
    <button class="btn bc" style="width:auto;padding:5px 10px;font-size:.8rem;" onclick="fecharMdl()">✖ FECHAR</button>
  </div>
  <div id="mdl-corpo"></div>
  <div id="mdl-m" class="msg"></div>
  <button class="btn bvol bb" onclick="fecharMdl()" style="margin-top:8px;">← FECHAR</button>
</div>

<script>
'use strict';
// ============================================================
// CONFIG
// ============================================================
const BINGO_RAIO=250;

// ============================================================
// DB
// ============================================================
function getFlags(){try{return JSON.parse(localStorage.getItem('zap_bingo')||'[]')}catch{return[]}}
function saveFlags(l){localStorage.setItem('zap_bingo',JSON.stringify(l));}

// Empresa padrão (vem normalmente da sessão PR)
const empresaBase={
  ne:'Café Central',morada:'Rua das Flores 10, 4000-100 Porto',
  lat:'41.1496',lng:'-8.6109',tel:'220 000 000',
  email:'cafe@email.pt',website:'https://cafecentral.pt',
  resp:'João Silva',respTel:'912 000 000',
};

// ============================================================
// INICIALIZAR BANDEIRAS (demo com 10)
// ============================================================
function iniciar(){
  if(getFlags().length>0) return;
  const f=[];
  for(let i=0;i<10;i++){
    f.push({
      id:Date.now()+i,num:i+1,estado:'inativa',
      premio:'🎁 Prémio Surpresa',descricao:'',foto:null,
      empNome:empresaBase.ne,empMorada:empresaBase.morada,
      empLat:empresaBase.lat,empLng:empresaBase.lng,usarGPS:false,
      empTel:empresaBase.tel,empEmail:empresaBase.email,
      empWeb:empresaBase.website,empResp:empresaBase.resp,empRespTel:empresaBase.respTel,
      ativadoEm:null,duracaoMs:3600000,expiracaoAtivacao:null,
      encontradaEm:null,encontradaPor:null,qrData:null,
      packFim:Date.now()+90*24*60*60*1000,
    });
  }
  saveFlags(f);
}

// ============================================================
// NAVEGAÇÃO — VOLTAR / SAIR
// ============================================================
function voltarPainel(){
  // Em app completa: ir('p-pr') ou ir('p-pr-painel')
  // Aqui simulamos:
  if(confirm('Voltar ao painel do lojista?\n\n(Os dados das bandeiras BINGO ficam guardados.)')){
    alert('✅ Em app completa: voltaria ao painel do lojista.\n\nFuncionalidade integrada no sistema ZAP FLAGS.');
    // ir('p-pr');  ← usar esta linha no sistema completo
  }
}

function mostrarConfirmSair(){
  document.getElementById('confirm-overlay').style.display='block';
  document.getElementById('confirm-sair').style.display='block';
}
function fecharConfirmSair(){
  document.getElementById('confirm-overlay').style.display='none';
  document.getElementById('confirm-sair').style.display='none';
}
function confirmarSair(){
  fecharConfirmSair();
  // Em app completa:
  // DB.delSessPR(); prAtual=null; ir('p0');
  alert('✅ Em app completa: termina a sessão e volta ao início.\n\nFuncionalidade integrada no sistema ZAP FLAGS.');
}

// ============================================================
// UTILS
// ============================================================
const $=id=>document.getElementById(id);
const val=id=>$(id)?.value?.trim()||'';
function pad(n){return String(Math.floor(n)).padStart(2,'0');}
function fmt(ts){return ts?new Date(ts).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'---';}
function msParaHMS(ms){const t=Math.max(0,ms);return{h:Math.floor(t/3600000),m:Math.floor((t%3600000)/60000),s:Math.floor((t%60000)/1000)};}
function fmtTimer(ms){const{h,m,s}=msParaHMS(ms);return`${pad(h)}:${pad(m)}:${pad(s)}`;}
function msgMdl(t,tp){const e=$('mdl-m');if(!e)return;e.className='msg '+tp;e.innerText=t;setTimeout(()=>{if(e){e.className='msg';e.innerText='';}},4000);}
function msgGlobal(t,tp){const e=$('msg-global');if(!e)return;e.className='msg '+tp;e.innerText=t;setTimeout(()=>{if(e){e.className='msg';e.innerText='';}},5000);}
function fecharMdl(){$('movl').style.display='none';$('mdl').style.display='none';}
function abrirMdl(tit,corpo){
  $('mdl-tit').innerText=tit;
  $('mdl-corpo').innerHTML=corpo;
  $('movl').style.display='block';
  $('mdl').style.display='block';
}

// TIMERS
const TIMERS={};
function pararTimer(id){if(TIMERS[id]){clearInterval(TIMERS[id]);delete TIMERS[id];}}
function iniciarTimerEl(elId,expiracaoTs,onExpire){
  pararTimer(elId);
  TIMERS[elId]=setInterval(()=>{
    const el=$(elId);if(!el){pararTimer(elId);return;}
    const r=expiracaoTs-Date.now();
    el.innerText=fmtTimer(r);
    if(r<=0){pararTimer(elId);if(onExpire)onExpire();}
  },1000);
}

// ============================================================
// VERIFICAR EXPIRAÇÕES
// ============================================================
function verificarExp(){
  const flags=getFlags();let alt=false;
  flags.forEach(bf=>{
    if(bf.estado==='ativa'&&bf.expiracaoAtivacao&&bf.expiracaoAtivacao<Date.now()){
      bf.estado='inativa';bf.ativadoEm=null;bf.expiracaoAtivacao=null;alt=true;
    }
    if((bf.estado==='inativa'||bf.estado==='ativa')&&bf.packFim<Date.now()){
      bf.estado='expirada';alt=true;
    }
  });
  if(alt){saveFlags(flags);renderLista();}
  atualizarStats();
}

function atualizarStats(){
  const f=getFlags();
  const t=f.length;const a=f.filter(b=>b.estado==='ativa').length;const e=f.filter(b=>b.estado==='encontrada').length;
  ['st-total','hud-total'].forEach(id=>{if($(id))$(id).innerText=t;});
  ['st-ativas','hud-ativas'].forEach(id=>{if($(id))$(id).innerText=a;});
  ['st-enc','hud-enc'].forEach(id=>{if($(id))$(id).innerText=e;});
}

// ============================================================
// RENDER LISTA
// ============================================================
function renderLista(){
  verificarExp();
  const flags=getFlags();
  $('lista-bingo').innerHTML=flags.map((bf,i)=>renderCard(bf,i)).join('');
  flags.forEach(bf=>{
    if(bf.estado==='ativa'&&bf.expiracaoAtivacao){
      iniciarTimerEl(`t-${bf.id}`,bf.expiracaoAtivacao,()=>{verificarExp();renderLista();});
    }
  });
}

function renderCard(bf,i){
  const est=bf.estado;
  const badges={
    inativa:'<span class="badge-inativa">💤 INATIVA</span>',
    ativa:  '<span class="badge-ativa">⚡ ATIVA</span>',
    encontrada:'<span class="badge-enc">✅ ENCONTRADA</span>',
    expirada:'<span class="badge-exp">❌ EXPIRADA</span>',
  };

  let timerHtml='';
  if(est==='ativa'&&bf.expiracaoAtivacao){
    const r=Math.max(0,bf.expiracaoAtivacao-Date.now());
    timerHtml=`<div class="timer-grande">
      <span class="timer-ico-anim">⏱️</span>
      <div class="timer-display" id="t-${bf.id}">${fmtTimer(r)}</div>
      <div class="timer-label">Tempo restante ativo</div>
      <div style="font-size:.7rem;color:#555;margin-top:3px;">
        Ativado: ${fmt(bf.ativadoEm)} &nbsp;·&nbsp; Expira: ${fmt(bf.expiracaoAtivacao)}
      </div>
    </div>`;
  }

  const fotoHtml=bf.foto
    ?`<img src="${bf.foto}" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:2px solid #ff0;margin:8px 0;">`:'';

  let encHtml='';
  if(est==='encontrada'){
    encHtml=`<div class="card card-v" style="margin-top:8px;padding:10px;">
      <div class="row"><div class="rl">Encontrada por</div><div class="rv" style="color:#0f0;font-weight:bold;">${bf.encontradaPor||'---'}</div></div>
      <div class="row"><div class="rl">Data/Hora</div><div class="rv" style="color:#0aa;">${fmt(bf.encontradaEm)}</div></div>
      <button class="btn bv" style="width:100%;margin-top:8px;padding:8px;" onclick="verQR(${i})">🎫 VER QR CODE GERADO</button>
    </div>`;
  }

  let btns='';
  if(est==='inativa'){
    btns=`<div style="margin-top:10px;">
      <button class="btn bbingo bb" onclick="abrirPainelAtivar(${i})">🎰 CONFIGURAR E ATIVAR</button>
    </div>`;
  }
  if(est==='ativa'){
    btns=`<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn bdesativ" style="flex:1;padding:9px;font-size:.82rem;" onclick="desativar(${i})">⏹️ DESATIVAR</button>
      <button class="btn bo"      style="flex:1;padding:9px;font-size:.82rem;" onclick="abrirEditarAtiva(${i})">✏️ EDITAR</button>
      <button class="btn bpurple" style="flex:1;padding:9px;font-size:.82rem;" onclick="abrirAlterarTempo(${i})">⏱️ TEMPO</button>
    </div>
    <button class="btn bc bb" style="margin-top:5px;padding:7px;" onclick="simularEncontrar(${i})">🧪 Simular encontrar</button>`;
  }
  if(est==='encontrada'){
    btns=`<button class="btn bv bb" style="margin-top:10px;" onclick="verQR(${i})">🎫 VER / IMPRIMIR QR CODE</button>`;
  }

  return `<div class="bfc ${est}">

function atualizarSlider(v,valId,expiId){
  duracaoSlider=parseFloat(v);
  const el=$(valId);if(el) el.innerText=v<1?Math.round(v*60)+'min':v+'h';
  const ep=$(expiId);if(ep) ep.innerText=fmt(Date.now()+duracaoSlider*3600000);
}

function swLoc(pfx,tipo){
  usarGPSLocal=tipo==='gps';
  $(`${pfx}-m-wrap`).style.display=tipo==='morada'?'block':'none';
  $(`${pfx}-g-wrap`).style.display=tipo==='gps'?'block':'none';
  $(`${pfx}-btn-m`).className=`btn ${tipo==='morada'?'bv':'bc'}`;
  $(`${pfx}-btn-g`).className=`btn ${tipo==='gps'?'bv':'bc'}`;
}

function obterGPS(pfx){
  const st=$(`${pfx}-gps-st`);if(st) st.innerText='📡 A localizar...';
  if(!navigator.geolocation){if(st) st.innerText='❌ GPS não suportado';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const la=pos.coords.latitude.toFixed(6),ln=pos.coords.longitude.toFixed(6);
    const elLa=$(`${pfx}-lat`),elLn=$(`${pfx}-lng`);
    if(elLa) elLa.value=la;if(elLn) elLn.value=ln;
    if(st) st.innerText=`✅ ${la}, ${ln}`;
  },()=>{if(st) st.innerText='❌ Erro GPS';});
}

function carregarFoto(input,pfx){
  const f=input.files[0];if(!f) return;
  if(f.size>5*1024*1024){alert('❌ Foto demasiado grande! Máx. 5MB');return;}
  const r=new FileReader();r.onload=e=>{
    imgB64=e.target.result;
    const ph=$(`${pfx}-fp`),pv=$(`${pfx}-fp-img`);
    if(ph) ph.style.display='none';if(pv){pv.src=imgB64;pv.style.display='block';}
    const rem=$(`${pfx}-rem`);
    if(rem) rem.innerHTML=`<button class="btn br" style="width:auto;padding:4px 12px;font-size:.75rem;" onclick="removerFoto('${pfx}')">🗑️ Remover foto</button>`;
  };r.readAsDataURL(f);
}

function removerFoto(pfx){
  imgB64=null;
  const ph=$(`${pfx}-fp`),pv=$(`${pfx}-fp-img`),inp=$(`${pfx}-fi`),rem=$(`${pfx}-rem`);
  if(ph) ph.style.display='block';if(pv){pv.src='';pv.style.display='none';}
  if(inp) inp.value='';if(rem) rem.innerHTML='';
}

}

function adicionarTempo(i,t){
  const ms={'+':{'+30min':30*60000,'+1h':3600000,'+2h':7200000,'+4h':14400000,'+6h':21600000,'+12h':43200000,'+24h':86400000}[t]||0,'-':{'-1h':-3600000}[t]||0}[t[0]];
  let addMs=0;
  if(t==='+30min') addMs=30*60000;
  else if(t==='+1h')  addMs=3600000;
  else if(t==='+2h')  addMs=7200000;
  else if(t==='+4h')  addMs=14400000;
  else if(t==='+6h')  addMs=21600000;
  else if(t==='+12h') addMs=43200000;
  else if(t==='+24h') addMs=86400000;
  else if(t==='-1h')  addMs=-3600000;

  const flags=getFlags();const bf=flags[i];
  const novaExp=Math.max(Date.now()+60000,(bf.expiracaoAtivacao||Date.now())+addMs);
  bf.expiracaoAtivacao=novaExp;bf.duracaoMs=Math.max(1800000,bf.duracaoMs+addMs);
  saveFlags(flags);
  iniciarTimerEl(`t-mdl-${bf.id}`,novaExp,()=>{});
  iniciarTimerEl(`t-${bf.id}`,novaExp,()=>{verificarExp();renderLista();});
  const ep=$('sl2-expira');if(ep) ep.innerText=fmt(novaExp);
  msgMdl(`✅ Tempo ${t} — Expira: ${fmt(novaExp)}`,'s');
  msgGlobal(`⏱️ Bandeira BINGO #${bf.num}: tempo ${t}`,'i');
}

function reiniciarTempo(i){
  const v=parseFloat($('sl2-tempo')?.value||1);
  const flags=getFlags();const bf=flags[i];
  const novaExp=Date.now()+v*3600000;
  bf.expiracaoAtivacao=novaExp;bf.duracaoMs=v*3600000;
  saveFlags(flags);
  iniciarTimerEl(`t-mdl-${bf.id}`,novaExp,()=>{});
  iniciarTimerEl(`t-${bf.id}`,novaExp,()=>{verificarExp();renderLista();});
  msgMdl(`✅ Timer reiniciado: ${v}h`,'s');
  msgGlobal(`🔄 Bandeira BINGO #${bf.num}: timer reiniciado (${v}h)`,'s');
}

  const jogador=nomes[Math.floor(Math.random()*nomes.length)];
  const flags=getFlags();const bf=flags[i];
  if(bf.estado!=='ativa'){alert('Esta bandeira não está ativa!');return;}
  bf.estado='encontrada';bf.encontradaEm=Date.now();bf.encontradaPor=jogador;
  bf.qrData=gerarQRData(bf,jogador);
  pararTimer(`t-${bf.id}`);
  saveFlags(flags);renderLista();atualizarStats();
  msgGlobal(`🎰 BINGO! ${jogador} encontrou a Bandeira #${bf.num}!`,'s');
  setTimeout(()=>verQR(i),400);
}

// ============================================================
// GERAR QR DATA
// ============================================================
function gerarQRData(bf,jogador){
  return {
    id:`BINGO-${bf.id}-${Date.now()}`,tipo:'BINGO ESPECIAL ZAP FLAGS',
    jogador,premio:bf.premio,descricao:bf.descricao||'',temFoto:!!bf.foto,
    empresa:bf.empNome,
    morada:bf.usarGPS?`GPS: ${bf.empLat}, ${bf.empLng}`:bf.empMorada,
    lat:bf.usarGPS?bf.empLat:null,lng:bf.usarGPS?bf.empLng:null,
    tel:bf.empTel,email:bf.empEmail||'',web:bf.empWeb||'',
    resp:bf.empResp,respTel:bf.empRespTel||'',
    encontradoEm:fmt(bf.encontradaEm),
    validade:fmt(bf.encontradaEm+30*24*60*60*1000),
    bandeira:`#${bf.num}`,raio:`${BINGO_RAIO}m`,
  };
}

// ============================================================
// VER QR
// ============================================================
function verQR(i){
  const bf=getFlags()[i];if(!bf.qrData){alert('QR ainda não gerado.');return;}
  const q=bf.qrData;

  abrirMdl(`🎫 QR CODE — ${q.premio}`,`
    ${bf.foto?`<img src="${bf.foto}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;border:2px solid #ff0;margin-bottom:12px;">`:''}
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:2rem;margin-bottom:5px;">🎰</div>
      <h3 style="color:#ff0;font-size:1rem;">BINGO ESPECIAL!</h3>
      <p style="color:#0ff;font-weight:bold;font-size:.95rem;">${q.jogador}</p>
      <p style="color:#0aa;font-size:.78rem;">encontrou a bandeira!</p>
    </div>
    <div style="text-align:center;margin:12px 0;">
      <p style="color:#0aa;font-size:.75rem;margin-bottom:8px;">Apresenta este QR na loja:</p>
      <div class="qr-wrap" id="qr-div"></div>
    </div>
    <div class="qr-premio-box">
      <p style="color:#0aa;font-size:.75rem;margin-bottom:5px;">🎁 PRÉMIO:</p>
      <p style="color:#ff0;font-size:1.3rem;font-weight:bold;text-shadow:0 0 8px #ff0;">${q.premio}</p>
      ${q.descricao?`<p style="color:#0aa;font-size:.8rem;margin-top:8px;line-height:1.6;">${q.descricao}</p>`:''}
    </div>
    <div class="qr-info" style="border-color:#ff0;margin-top:10px;">
      <p style="color:#ff0;font-size:.85rem;font-weight:bold;margin-bottom:8px;">🏢 DADOS DA EMPRESA</p>
      <div class="row"><div class="rl">Empresa</div><div class="rv" style="color:#ff0;font-weight:bold;">${q.empresa}</div></div>
      <div class="row"><div class="rl">📍 ${q.lat?'GPS':'Morada'}</div><div class="rv" style="color:#0aa;font-size:.78rem;">${q.morada}</div></div>
      ${q.lat?`<div class="row"><div class="rl">🗺️ Coords</div><div class="rv" style="color:#0ff;font-size:.75rem;">${q.lat}, ${q.lng}</div></div>`:''}
      <div class="row"><div class="rl">📞 Telefone</div><div class="rv" style="color:#0ff;font-weight:bold;">${q.tel}</div></div>
      ${q.email?`<div class="row"><div class="rl">📧 Email</div><div class="rv" style="color:#0ff;font-size:.78rem;">${q.email}</div></div>`:''}
      ${q.web?`<div class="row"><div class="rl">🌐 Website</div><div class="rv" style="color:#0ff;font-size:.78rem;">${q.web}</div></div>`:''}
      <div class="row"><div class="rl">👤 Responsável</div><div class="rv" style="color:#0f0;font-weight:bold;">${q.resp}</div></div>
      ${q.respTel?`<div class="row"><div class="rl">📱 Tel. Resp.</div><div class="rv">${q.respTel}</div></div>`:''}
    </div>
    <div class="qr-info" style="border-color:#333;margin-top:8px;">
      <p style="color:#555;font-size:.75rem;font-weight:bold;margin-bottom:6px;">ℹ️ DETALHES</p>
      <div class="row"><div class="rl">ID</div><div class="rv" style="color:#555;font-size:.7rem;">${q.id}</div></div>
      <div class="row"><div class="rl">Bandeira</div><div class="rv">${q.bandeira} · ${q.raio}</div></div>
      <div class="row"><div class="rl">Encontrado em</div><div class="rv" style="font-size:.78rem;">${q.encontradoEm}</div></div>
      <div class="row"><div class="rl">⏰ Válido até</div><div class="rv" style="color:#f80;font-weight:bold;">${q.validade}</div></div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="btn bv" style="flex:1;padding:10px;" onclick="window.print()">🖨️ IMPRIMIR</button>
      <button class="btn bc" style="flex:1;padding:10px;" onclick="navigator.clipboard?.writeText('${q.id}').then(()=>alert('✅ ID copiado!'))">📋 COPIAR ID</button>
    </div>
  `);

  setTimeout(()=>{
    const div=$('qr-div');
    if(div&&typeof QRCode!=='undefined'){
      div.innerHTML='';
      new QRCode(div,{
        text:[q.tipo,q.id,q.empresa,q.morada,q.tel,`Premio: ${q.premio}`,q.descricao||'',`Jogador: ${q.jogador}`,`Valido ate: ${q.validade}`].filter(Boolean).join('\n'),
        width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M
      });
    }
  },250);
}

// ============================================================
// INICIALIZAR
// ============================================================
iniciar();
renderLista();
setInterval(()=>{verificarExp();atualizarStats();},5000);
</script>
</body>
</html>
