<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZAP FLAGS | Larforyou&reg;</title>
  
  <style>
    /* RESET BÁSICO E DESIGN */
    * { box-sizing: border-box; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #121212; color: #fff; }
    .hidden { display: none !important; }
    
    button { cursor: pointer; transition: 0.2s; border: none; border-radius: 8px; font-weight: bold; }
    input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #4CAF50; background: #1e1e1e; color: #fff; }
    a { color: #81c784; text-decoration: none; font-size: 12px; }

    /* DASHBOARD / LOGIN SCREEN (Larforyou) */
    #login-screen {
      position: absolute; inset: 0; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10000; overflow-y: auto;
    }
    .login-box {
      width: 100%; max-width: 500px; background: rgba(0, 0, 0, 0.85); border: 2px solid #4CAF50;
      border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(76, 175, 80, 0.2); margin: auto;
    }
    .tab-container { display: flex; margin-bottom: 15px; border: 1px solid #4CAF50; border-radius: 8px; overflow: hidden; }
    .tab-btn { flex: 1; padding: 12px; background: #1e1e1e; color: #4CAF50; border-radius: 0; }
    .tab-btn.active { background: #4CAF50; color: #000; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-main { width: 100%; padding: 15px; font-size: 16px; background: #4CAF50; color: #000; margin-top: 10px; }
    .btn-main:hover { background: #45a049; }
    
    /* GAME SCREEN (Avatar Life) */
    #game-screen { position: absolute; inset: 0; background: #8bc34a; overflow: hidden; }
    
    /* MUNDO QUE SE MOVE (20x20m / 2000px) */
    #world {
      position: absolute; width: 2000px; height: 2000px;
      background-image: radial-gradient(#689f38 1px, transparent 1px); background-size: 50px 50px;
      border: 5px solid #d32f2f; /* Limites do mundo */
      transition: transform 0.1s linear; transform-origin: top left;
    }
    .decor { position: absolute; font-size: 40px; transform: translate(-50%, -50%); }

    /* AVATAR FIXO NO CENTRO */
    #avatar-container {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; z-index: 100; display: flex; flex-direction: column; align-items: center;
    }
    /* CÍRCULO PICOTADO DE 2.5 METROS */
    .radius-circle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 250px; height: 250px; 
      border: 2px dashed rgba(33, 150, 243, 0.8); border-radius: 50%; background: rgba(33, 150, 243, 0.1); pointer-events: none;
    }
    .avatar-body {
      width: 40px; height: 40px; background: #ffeb3b; border: 3px solid #fbc02d; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #000;
      z-index: 2; transition: transform 0.1s;
    }
    .legs { display: flex; gap: 6px; margin-top: -5px; z-index: 1; }
    .leg { width: 8px; height: 15px; background: #333; border-radius: 4px; transition: transform 0.2s; }

    /* UI DO JOGO (Energia, Fome, Humor, Moedas) */
    #top-bar {
      position: absolute; top: 10px; left: 10px; right: 10px; background: rgba(0, 0, 0, 0.8);
      border: 2px solid #4CAF50; border-radius: 12px; padding: 10px; z-index: 200;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .stat { flex: 1; min-width: 60px; text-align: center; font-size: 12px; font-weight: bold; }
    .stat-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; border: 1px solid #555; }
    .stat-fill { height: 100%; background: #4CAF50; width: 100%; transition: width 0.3s; }
    
    /* PAINEL EXTRA (Simular Esgotar Energia) */
    #extra-panel {
      position: absolute; top: 80px; left: 10px; z-index: 200; display: flex; flex-direction: column; gap: 5px;
    }
    .btn-extra { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #ff9800; padding: 8px; font-size: 12px; }

    /* CONTROLOS À DIREITA */
    #right-controls {
      position: absolute; bottom: 40px; right: 20px; z-index: 200;
      display: grid; grid-template-columns: 50px 50px 50px; grid-gap: 5px;
    }
    .dpad-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.6); color: #4CAF50; border: 2px solid #4CAF50; border-radius: 12px; font-size: 20px; }
    .dpad-btn:active { background: #4CAF50; color: #000; }
    
    /* AVISO DE CANSAÇO */
    #sleep-warning {
      position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(211, 47, 47, 0.95); padding: 15px 25px; border-radius: 10px; border: 2px solid #fff;
      font-weight: bold; font-size: 16px; text-align: center; z-index: 500; display: none; box-shadow: 0 0 20px #000;
    }

    /* MARCA DE ÁGUA E DIREITOS (Larforyou) */
    .watermark { position: fixed; bottom: 35px; left: 15px; font-size: 20px; font-weight: bold; color: rgba(255,255,255,0.5); text-shadow: 2px 2px 4px #000; z-index: 9999; pointer-events: none; }
    .copyright { position: fixed; bottom: 5px; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.5); z-index: 9999; pointer-events: none; }
  </style>
</head>
<body>

  <!-- MARCAS LARFORYOU -->
  <div class="watermark">Larforyou&reg;</div>
  <div class="copyright">&copy; 2024 Larforyou&reg; - Marca Registada. Todos os direitos reservados.</div>

  <!-- DASHBOARD (ECRÃ DE LOGIN / REGISTO) -->
  <div id="login-screen">
    <div class="login-box">
      <h1 style="text-align: center; color: #4CAF50; margin-top: 0; text-shadow: 0 0 10px #4CAF50;">ZAP FLAGS</h1>
      
      <!-- ESCOLHA DO TIPO (Jogador ou Empresa) -->
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="btn-jg" class="tab-btn active" onclick="switchMain('JG')">JOGADOR</button>
        <button id="btn-pr" class="tab-btn" style="background:#1e1e1e;" onclick="switchMain('PR')">EMPRESA / PR</button>
      </div>

      <!-- ÁREA JOGADOR -->
      <div id="area-jg">
        <div class="tab-container">
          <button id="tab-jg-in" class="tab-btn active" onclick="switchSub('JG', 'in')">ENTRAR</button>
          <button id="tab-jg-up" class="tab-btn" onclick="switchSub('JG', 'up')">CRIAR CONTA</button>
        </div>
        
        <div id="jg-in">
          <input type="email" id="jg-email" placeholder="O teu E-mail" />
          <input type="password" id="jg-pass" placeholder="Senha" />
          <div style="text-align:right;"><a href="#" onclick="alert('Recuperação disponível em breve.')">Esqueci a senha?</a></div>
          <button class="btn-main" onclick="enterGame()">ENTRAR NO JOGO</button>
        </div>

        <div id="jg-up" class="hidden">
          <input type="text" placeholder="* Nome do Jogador" />
          <input type="email" placeholder="* E-mail" />
          <div class="form-grid">
            <input type="password" placeholder="* Criar Senha" />
            <input type="password" placeholder="* Confirmar Senha" />
          </div>
          <button class="btn-main" onclick="enterGame()">REGISTAR E JOGAR</button>
        </div>
      </div>

      <!-- ÁREA EMPRESA / PR -->
      <div id="area-pr" class="hidden">
        <div class="tab-container">
          <button id="tab-pr-in" class="tab-btn active" onclick="switchSub('PR', 'in')">ENTRAR</button>
          <button id="tab-pr-up" class="tab-btn" onclick="switchSub('PR', 'up')">REGISTAR EMPRESA</button>
        </div>
        
        <div id="pr-in">
          <input type="email" placeholder="E-mail da Empresa" />
          <input type="password" placeholder="Senha" />
          <div style="text-align:right;"><a href="#" onclick="alert('Recuperação disponível em breve.')">Esqueci a senha?</a></div>
          <button class="btn-main" onclick="alert('Bem-vindo à área de Empresa! O seu Dashboard de faturação está em desenvolvimento.')">ENTRAR NA ÁREA PR</button>
        </div>

        <div id="pr-up" class="hidden">
          <div style="font-size:11px; color:#81c784; margin-bottom:8px;">Preencha os dados da empresa para faturação (* obrigatório).</div>
          <input type="text" placeholder="* Nome da Empresa / Loja" />
          <div class="form-grid"><input type="text" placeholder="* NIF" /><input type="text" placeholder="* Telefone" /></div>
          <input type="email" placeholder="* E-mail (Será o seu login)" />
          <div class="form-grid"><input type="password" placeholder="* Criar Senha" /><input type="password" placeholder="* Confirmar" /></div>
          <input type="text" placeholder="* Morada / Rua" />
          <div class="form-grid"><input type="text" placeholder="* Cód. Postal" /><input type="text" placeholder="* Cidade" /></div>
          <button class="btn-main" onclick="alert('Empresa Registada com Sucesso!')">CONCLUIR REGISTO</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ECRÃ DE JOGO AVATAR LIFE -->
  <div id="game-screen" class="hidden">
    
    <!-- Mundo que se move -->
    <div id="world">
      <!-- Decorações geradas via JS -->
    </div>

    <!-- UI TOPO: Barras de Status -->
    <div id="top-bar">
      <div class="stat">Energia <span id="v-ener">100</span>/100<div class="stat-bar"><div id="b-ener" class="stat-fill"></div></div></div>
      <div class="stat">Fome <span id="v-fome">100</span>/100<div class="stat-bar"><div id="b-fome" class="stat-fill" style="background:#ff9800;"></div></div></div>
      <div class="stat">Humor <span id="v-humo">100</span>/100<div class="stat-bar"><div id="b-humo" class="stat-fill" style="background:#03a9f4;"></div></div></div>
      <div class="stat">Moedas <br><span id="v-moed" style="color:#ffd54f; font-size:16px;">150</span></div>
    </div>

    <!-- BOTÕES EXTRA -->
    <div id="extra-panel">
      <button class="btn-extra" onclick="forceSleep()">⚡ Esgotar Energia</button>
      <button class="btn-extra" onclick="maxStats()">🔋 Max Stats</button>
    </div>

    <!-- O Avatar Fixo ao Centro -->
    <div id="avatar-container">
      <div class="radius-circle"></div>
      <div class="avatar-body" id="avatar-body">😊</div>
      <div class="legs">
        <div class="leg" id="leg-l"></div>
        <div class="leg" id="leg-r"></div>
      </div>
    </div>

    <!-- Aviso de Cansaço -->
    <div id="sleep-warning">😴 Estou cansado, preciso dormir 15 minutos.</div>

    <!-- CONTROLOS À DIREITA (On-Screen) -->
    <div id="right-controls">
      <div></div><button class="dpad-btn" onmousedown="press('Up')" onmouseup="release('Up')" ontouchstart="press('Up')" ontouchend="release('Up')">▲</button><div></div>
      <button class="dpad-btn" onmousedown="press('Left')" onmouseup="release('Left')" ontouchstart="press('Left')" ontouchend="release('Left')">◀</button>
      <button class="dpad-btn" onmousedown="press('Down')" onmouseup="release('Down')" ontouchstart="press('Down')" ontouchend="release('Down')">▼</button>
      <button class="dpad-btn" onmousedown="press('Right')" onmouseup="release('Right')" ontouchstart="press('Right')" ontouchend="release('Right')">▶</button>
    </div>
  </div>

  <script>
    // --- LÓGICA DO DASHBOARD (LOGIN / REGISTO) ---
    function switchMain(type) {
      document.getElementById('area-jg').classList.toggle('hidden', type !== 'JG');
      document.getElementById('area-pr').classList.toggle('hidden', type !== 'PR');
      document.getElementById('btn-jg').className = type === 'JG' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('btn-jg').style.background = type === 'JG' ? '#4CAF50' : '#1e1e1e';
      document.getElementById('btn-pr').className = type === 'PR' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('btn-pr').style.background = type === 'PR' ? '#4CAF50' : '#1e1e1e';
    }

    function switchSub(type, sub) {
      document.getElementById(type.toLowerCase() + '-in').classList.toggle('hidden', sub !== 'in');
      document.getElementById(type.toLowerCase() + '-up').classList.toggle('hidden', sub !== 'up');
      document.getElementById('tab-' + type.toLowerCase() + '-in').className = sub === 'in' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('tab-' + type.toLowerCase() + '-up').className = sub === 'up' ? 'tab-btn active' : 'tab-btn';
    }

    function enterGame() {
      // Esconde o Dashboard de Login e mostra o Jogo
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      initGame(); // Arranca o Avatar Life
    }

    // --- MOTOR DE JOGO (AVATAR LIFE) ---
    const worldSize = 2000;
    let avatarX = 1000; // Começa no centro do mapa
    let avatarY = 1000;
    const speed = 5;
    
    // Status Iniciais (como pedido: Moedas a 150)
    let energy = 100, hunger = 100, mood = 100, coins = 150;
    let isExhausted = false;

    // Controlos
    const keys = { Up: false, Down: false, Left: false, Right: false };
    let stepCount = 0;
    let isMoving = false;

    function initGame() {
      generateWorld();
      updateBars();
      gameLoop();
    }

    // Gerar a paisagem com Emojis
    function generateWorld() {
      const world = document.getElementById('world');
      const emojis = ['🌳', '🏡', '🌸', '🪨', '🌻', '🍄', '⛲', '🌲', '🚩'];
      for (let i = 0; i < 100; i++) {
        let el = document.createElement('div');
        el.className = 'decor';
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.floor(Math.random() * worldSize) + 'px';
        el.style.top = Math.floor(Math.random() * worldSize) + 'px';
        world.appendChild(el);
      }
    }

    // Teclado do PC (Setas e WASD)
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowUp' || e.key === 'w') keys.Up = true;
      if(e.key === 'ArrowDown' || e.key === 's') keys.Down = true;
      if(e.key === 'ArrowLeft' || e.key === 'a') keys.Left = true;
      if(e.key === 'ArrowRight' || e.key === 'd') keys.Right = true;
    });
    window.addEventListener('keyup', (e) => {
      if(e.key === 'ArrowUp' || e.key === 'w') keys.Up = false;
      if(e.key === 'ArrowDown' || e.key === 's') keys.Down = false;
      if(e.key === 'ArrowLeft' || e.key === 'a') keys.Left = false;
      if(e.key === 'ArrowRight' || e.key === 'd') keys.Right = false;
    });

    // Controlos Touch (Setas à Direita)
    function press(dir) { keys[dir] = true; }
    function release(dir) { keys[dir] = false; }

    function gameLoop() {
      if (isExhausted) return; // Bloqueia movimento

      isMoving = false;
      let moveX = 0, moveY = 0;

      if (keys.Up) { moveY -= speed; isMoving = true; }
      if (keys.Down) { moveY += speed; isMoving = true; }
      if (keys.Left) { moveX -= speed; isMoving = true; }
      if (keys.Right) { moveX += speed; isMoving = true; }

      // Limites de 20x20m do mundo
      if (avatarX + moveX > 20 && avatarX + moveX < worldSize - 20) avatarX += moveX;
      if (avatarY + moveY > 20 && avatarY + moveY < worldSize - 20) avatarY += moveY;

      // Animação: Mexer as pernas e rodar corpo
      const legL = document.getElementById('leg-l');
      const legR = document.getElementById('leg-r');
      const body = document.getElementById('avatar-body');

      if (isMoving) {
        stepCount += 0.4;
        legL.style.transform = `translateY(${Math.sin(stepCount) * 6}px)`;
        legR.style.transform = `translateY(${Math.cos(stepCount) * 6}px)`;
        body.innerText = '🚶';
        
        if (keys.Left) body.style.transform = "rotate(-15deg)";
        else if (keys.Right) body.style.transform = "rotate(15deg)";
        else body.style.transform = "rotate(0deg)";

        // Gasta energia e fome a andar
        if (Math.random() < 0.015) drainStats();

      } else {
        legL.style.transform = 'translateY(0px)';
        legR.style.transform = 'translateY(0px)';
        body.innerText = '😊';
        body.style.transform = "rotate(0deg)";
      }

      // Mover a câmara (O mundo desloca-se, o avatar fica no meio)
      const world = document.getElementById('world');
      const screenCX = window.innerWidth / 2;
      const screenCY = window.innerHeight / 2;
      world.style.transform = `translate(${screenCX - avatarX}px, ${screenCY - avatarY}px)`;

      requestAnimationFrame(gameLoop);
    }

    // Gasto de Atributos
    function drainStats() {
      if (energy > 0) energy -= 1;
      if (hunger > 0) hunger -= 0.5;
      if (hunger < 30 && mood > 0) mood -= 1; // Fome tira humor
      updateBars();
      
      if (energy <= 0) triggerSleep();
    }

    // Forçar Esgotar Energia (Botão UI)
    function forceSleep() {
      energy = 0; updateBars(); triggerSleep();
    }

    // Botão Max Stats
    function maxStats() {
      energy = 100; hunger = 100; mood = 100; coins += 50; updateBars();
    }

    // Dormir 15 minutos (aqui simulado com 5 segundos)
    function triggerSleep() {
      if (isExhausted) return;
      isExhausted = true;
      document.getElementById('sleep-warning').style.display = 'block';
      
      // Simulação rápida para testar: 5 segundos e acorda
      setTimeout(() => {
        energy = 100;
        isExhausted = false;
        document.getElementById('sleep-warning').style.display = 'none';
        updateBars();
        gameLoop(); 
      }, 5000); 
    }

    function updateBars() {
      document.getElementById('v-ener').innerText = Math.floor(energy);
      document.getElementById('b-ener').style.width = energy + '%';
      document.getElementById('v-fome').innerText = Math.floor(hunger);
      document.getElementById('b-fome').style.width = hunger + '%';
      document.getElementById('v-humo').innerText = Math.floor(mood);
      document.getElementById('b-humo').style.width = mood + '%';
      document.getElementById('v-moed').innerText = coins;
    }
  </script>
</body>
</html>
