<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zap Flags – Jogo</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- QR Code Generator -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; overflow: hidden; }
        #game-container { height: 100%; width: 100%; position: relative; }

        /* Modais */
        .modal, .draggable-window {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .draggable-content {
            background: white; border-radius: 1rem; padding: 2rem; max-width: 500px; width: 90%;
            color: #333; box-shadow: 0 0 30px rgba(0,0,0,0.2); text-align: center;
            cursor: move; position: relative;
        }
        .draggable-content h2 { color: #16213e; margin-bottom: 1rem; }
        .draggable-content input, .draggable-content select, .draggable-content textarea {
            width: 100%; padding: 0.7rem; margin: 0.5rem 0; border-radius: 0.5rem; border: 1px solid #ccc;
            background: white; color: #333;
        }
        .draggable-content button {
            background: #e94560; color: white; border: none; padding: 0.8rem 1.5rem;
            border-radius: 2rem; font-weight: bold; cursor: pointer; margin: 0.5rem;
        }
        .draggable-content button:hover { background: #c0392b; }
        .link { color: #2980b9; cursor: pointer; text-decoration: underline; }
        .hidden { display: none !important; }

        /* UI sobre o mapa */
        .ui-overlay { position: absolute; z-index: 1000; pointer-events: none; }
        .ui-overlay > * { pointer-events: auto; }

        #map { height: 100%; width: 100%; z-index: 1; }

        /* HUD */
        #hud {
            top: 1rem; left: 1rem; background: rgba(255,255,255,0.9); border-radius: 1rem;
            padding: 0.8rem; min-width: 220px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: #16213e; font-size: 0.9rem;
        }
        .hud-icons { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
        .icon-btn { background: none; border: none; color: #16213e; font-size: 1.3rem; cursor: pointer; }
        .energy-bar { width: 100%; height: 6px; background: #ddd; border-radius: 3px; margin: 0.3rem 0; }
        .energy-fill { height: 100%; background: #27ae60; border-radius: 3px; }

        /* D-Pad offline */
        #offline-dpad {
            bottom: 2rem; right: 1rem; display: grid;
            grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px;
        }
        .dpad-btn { background: white; border: 1px solid #ccc; color: #16213e; font-size: 1.5rem; border-radius: 12px; cursor: pointer; }
        .dpad-center { background: #e94560; color: white; }

        /* Rodapé ticker */
        #ticker {
            position: absolute; bottom:0; left:0; right:0; height:30px; background:#16213e;
            color:white; display:flex; align-items:center; padding:0 1rem; font-size:0.8rem;
            z-index:900; overflow: hidden; white-space: nowrap;
        }

        /* Popup das bandeiras */
        .flag-popup button { background: #e94560; border: none; color: white; padding: 0.3rem 1rem; border-radius: 1rem; cursor: pointer; }

        /* Lista de jogadores */
        #player-list-panel {
            top:1rem; right:1rem; background:white; border-radius:1rem; padding:1rem;
            min-width:250px; max-height:60vh; overflow-y:auto; box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }
        .player-entry { display:flex; justify-content:space-between; align-items:center; margin:0.5rem 0; }
        .add-friend-btn { background:#27ae60; color:white; border:none; padding:0.2rem 0.8rem; border-radius:1rem; cursor:pointer; }

        /* Chat privado */
        .chat-modal {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:white; border-radius:1rem; padding:1rem; width:400px; max-height:80vh;
            z-index:2500; box-shadow:0 10px 40px rgba(0,0,0,0.3); cursor:move;
        }
        .chat-modal .messages { max-height:200px; overflow-y:auto; margin-bottom:0.5rem; }
        .chat-modal .input-row { display:flex; gap:0.5rem; }

        /* Troca de QR */
        .trade-slot { width:100px; height:100px; border:2px dashed #ccc; border-radius:1rem; margin:0.5rem; }
        .qr-large { background:white; padding:2rem; border-radius:1rem; }
        .lock-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.4); display:flex; align-items:center;
            justify-content:center; font-size:3rem; color:white; pointer-events:none;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="map"></div>

    <!-- Autenticação -->
    <div id="auth-modal" class="modal hidden">
        <div class="draggable-content" id="auth-drag-header">
            <h2 id="auth-title">Zap Flags</h2>
            <select id="account-type">
                <option value="JG">Jogador</option>
                <option value="PR">Empresa</option>
                <option value="AD">Admin</option>
            </select>
            <input id="auth-name" placeholder="Nome" />
            <div id="auth-extra-fields"></div>
            <input id="auth-password" type="password" placeholder="Password" />
            <input id="auth-confirm-password" type="password" placeholder="Confirmar password" class="hidden" />
            <button id="auth-action-btn">Entrar / Registar</button>
            <p class="link" id="switch-mode">Criar conta</p>
            <p class="link" id="recover-pw">Recuperar password</p>
        </div>
    </div>

    <!-- Escolha de modo -->
    <div id="mode-modal" class="modal hidden">
        <div class="draggable-content">
            <h2>Escolhe o modo</h2>
            <button id="gps-mode-btn"><i class="fa-solid fa-location-dot"></i> GPS real</button>
            <button id="home-mode-btn"><i class="fa-solid fa-house"></i> Modo casa</button>
            <p style="margin-top:1rem;font-size:0.8rem;color:gray;">Se o GPS não funcionar, o modo casa será ativado automaticamente.</p>
        </div>
    </div>

    <!-- HUD do jogador -->
    <div id="hud" class="ui-overlay hidden">
        <div class="hud-icons">
            <span id="hud-name"></span>
            <button class="icon-btn" id="skill-btn"><i class="fa-solid fa-bolt"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-flag"></i> <span id="flag-count">0</span></button>
            <div class="energy-bar"><div class="energy-fill" id="energy-fill" style="width:100%"></div></div>
            <span id="energy-text">100%</span>
            <button class="icon-btn" id="gps-fix-btn"><i class="fa-solid fa-crosshairs"></i></button>
            <button class="icon-btn" id="player-list-btn"><i class="fa-solid fa-users"></i></button>
            <button class="icon-btn" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
        <button class="icon-btn" id="street-view-btn" title="Alternar Street View"><i class="fa-solid fa-road"></i></button>
        </div>
    </div>

    <!-- D-Pad -->
    <div id="offline-dpad" class="ui-overlay hidden">
        <button class="dpad-btn" data-dir="nw"><i class="fa-solid fa-arrow-up-left"></i></button>
        <button class="dpad-btn" data-dir="n"><i class="fa-solid fa-arrow-up"></i></button>
        <button class="dpad-btn" data-dir="ne"><i class="fa-solid fa-arrow-up-right"></i></button>
        <button class="dpad-btn" data-dir="w"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="dpad-center" id="center-btn"><i class="fa-solid fa-location-dot"></i></button>
        <button class="dpad-btn" data-dir="e"><i class="fa-solid fa-arrow-right"></i></button>
        <button class="dpad-btn" data-dir="sw"><i class="fa-solid fa-arrow-down-left"></i></button>
        <button class="dpad-btn" data-dir="s"><i class="fa-solid fa-arrow-down"></i></button>
        <button class="dpad-btn" data-dir="se"><i class="fa-solid fa-arrow-down-right"></i></button>
    </div>

    <!-- Painel da empresa -->
    <div id="pr-dashboard" class="ui-overlay hidden draggable-window" style="top:1rem;right:1rem;width:280px;background:white;border-radius:1rem;padding:1rem;">
        <h3><span id="pr-name"></span></h3>
        <p>Pacotes: <span id="pr-packages-count">0</span></p>
        <button id="pr-logout-btn">Sair</button>
    </div>

    <!-- Painel do admin -->
    <div id="admin-panel" class="ui-overlay hidden draggable-window" style="top:1rem;right:1rem;width:300px;background:white;border-radius:1rem;padding:1rem;">
        <h3>Admin</h3>
        <p>Jogadores: <span id="admin-jg">0</span> / Empresas: <span id="admin-pr">0</span></p>
        <button id="admin-create-flag-btn">Criar bandeira</button>
        <button id="admin-promo-btn">Fazer promoção</button>
        <button id="admin-logout-btn">Sair</button>
    </div>

    <!-- Lista de jogadores (chat) -->
    <div id="player-list-panel" class="ui-overlay hidden">
        <h3>Jogadores</h3>
        <div id="player-list"></div>
    </div>

    <!-- Chat privado -->
    <div id="private-chat-modal" class="chat-modal hidden">
        <div class="messages" id="private-messages"></div>
        <div class="input-row">
            <input id="private-input" placeholder="Mensagem..." />
            <button id="private-send-btn">Enviar</button>
        </div>
        <button id="open-trade-from-chat">Troca</button>
        <button id="open-warehouse-from-chat">Armazém</button>
        <button id="close-private-chat">Fechar</button>
    </div>

    <!-- Troca de QR -->
    <div id="trade-modal" class="modal hidden">
        <div class="draggable-content">
            <h2>Troca</h2>
            <div style="display:flex; gap:1rem;">
                <div class="trade-slot" id="my-offer-slot" ondragover="allowDrop(event)" ondrop="dropQR(event,'my')" onclick="selectQRFromInventory('my')">Arrasta QR</div>
                <div class="trade-slot"><canvas id="partner-qr-canvas" width="100" height="100"></canvas></div>
            </div>
            <button id="enlarge-my-qr">Ampliar meu QR</button>
            <button id="enlarge-partner-qr">Ampliar parceiro</button>
            <button id="accept-trade-btn">Aceitar</button>
            <button id="close-trade-btn">Fechar</button>
        </div>
    </div>

    <!-- Visualização grande do QR -->
    <div id="qr-large-overlay" class="modal hidden">
        <div class="qr-large">
            <div class="lock-overlay"><i class="fa-solid fa-lock"></i></div>
            <canvas id="qr-large-canvas" width="200" height="200"></canvas>
            <button id="close-qr-large-btn">Fechar</button>
        </div>
    </div>

    <!-- Armazém -->
    <div id="warehouse-panel" class="modal hidden">
        <div class="draggable-content">
            <h2>Armazém</h2>
            <div id="warehouse-qr-list"></div>
            <button id="close-warehouse-btn">Fechar</button>
        </div>
    </div>

    <!-- Resultado da recolha -->
    <div id="result-modal" class="modal hidden">
        <div class="draggable-content">
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <button id="close-result-btn">OK</button>
        </div>
    </div>

    <!-- Ticker -->
    <div id="ticker"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ======================== BOOT ========================
const STORAGE_KEY = 'zapflags_state';
let gameState = defaultState();

function defaultState() {
    return {
        players: {},
        companies: {},
        flags: [],
        chatMessages: {},   // chave: "id1|id2" -> array de mensagens
        settings: { maxFlags: 5, flagRadius: 0.001, viewRadius: 0.000045 },
        ads: []             // últimas recolhas (player, company, prize)
    };
}

function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
        try { gameState = JSON.parse(raw); } catch(e) { gameState = defaultState(); }
    } else {
        gameState = defaultState();
    }
    gameState.flags = gameState.flags || [];
    gameState.players = gameState.players || {};
    gameState.companies = gameState.companies || {};
    gameState.chatMessages = gameState.chatMessages || {};
    gameState.ads = gameState.ads || [];
}

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
}

// ======================== AUTH ========================
let authMode = 'login';
const lastLoginLS = JSON.parse(localStorage.getItem('lastLogin') || '{}');

function showAuthModal() {
    document.getElementById('auth-modal').classList.remove('hidden');
    updateAuthUI();
    const type = document.getElementById('account-type').value;
    const nameField = document.getElementById('auth-name');
    if (type === 'JG' && lastLoginLS.jgName) nameField.value = lastLoginLS.jgName;
    else if (type === 'PR' && lastLoginLS.prName) {
        nameField.value = lastLoginLS.prName;
        const emailField = document.getElementById('auth-email');
        if (emailField) emailField.value = lastLoginLS.prEmail || '';
    }
}

function updateAuthUI() {
    const type = document.getElementById('account-type').value;
    document.getElementById('auth-title').innerText = type === 'JG' ? 'Jogador' : type === 'PR' ? 'Empresa' : 'Admin';
    document.getElementById('auth-action-btn').innerText = authMode === 'login' ? 'Entrar' : 'Criar conta';
    document.getElementById('switch-mode').innerText = authMode === 'login' ? 'Criar conta' : 'Já tem conta?';
    document.getElementById('auth-confirm-password').classList.toggle('hidden', authMode !== 'register');

    const extra = document.getElementById('auth-extra-fields');
    extra.innerHTML = '';
    if (authMode === 'register') {
        if (type === 'JG') {
            extra.innerHTML = `
                <input id="auth-email" placeholder="Email (opcional)" />
                <input id="auth-contact" placeholder="Contacto (opcional)" />
                <input id="auth-locality" placeholder="Localidade (opcional)" />
                <input id="auth-district" placeholder="Distrito (opcional)" />
            `;
        } else if (type === 'PR') {
            extra.innerHTML = `
                <input id="auth-email" type="email" placeholder="Email (obrigatório)" required />
                <input id="auth-nif" placeholder="NIF (obrigatório)" />
                <input id="auth-address" placeholder="Morada" />
                <input id="auth-locality" placeholder="Localidade" />
                <input id="auth-contact" placeholder="Contacto" />
                <input id="auth-website" placeholder="Website (opcional)" />
                <label>Logótipo / Foto (obrigatório)<input type="file" id="auth-logo" accept="image/*" /></label>
                <img id="auth-logo-preview" style="max-width:80px; display:none;" />
            `;
            // listener para preview do logo
            setTimeout(() => {
                document.getElementById('auth-logo').addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            document.getElementById('auth-logo-preview').src = ev.target.result;
                            document.getElementById('auth-logo-preview').style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }, 10);
        }
    } else { // login
        if (type === 'PR') {
            extra.innerHTML = `<input id="auth-email" type="email" placeholder="Email" required />`;
        }
    }
}

document.getElementById('account-type').onchange = updateAuthUI;
document.getElementById('switch-mode').onclick = () => {
    authMode = authMode === 'login' ? 'register' : 'login';
    updateAuthUI();
};

document.getElementById('recover-pw').onclick = () => {
    const type = document.getElementById('account-type').value;
    const name = document.getElementById('auth-name').value.trim();
    if (!name) { alert('Preencha o nome'); return; }
    if (type === 'AD') { alert('Admin não recupera password'); return; }
    const col = type === 'JG' ? gameState.players : gameState.companies;
    const found = Object.values(col).find(u => u.name === name);
    alert(found ? 'Password: ' + found.password : 'Utilizador não encontrado');
};

document.getElementById('auth-action-btn').onclick = () => {
    const type = document.getElementById('account-type').value;
    const name = document.getElementById('auth-name').value.trim();
    const pw = document.getElementById('auth-password').value.trim();
    const confirmPw = document.getElementById('auth-confirm-password').value.trim();

    if (authMode === 'register') {
        if (!name || !pw) { alert('Preencha nome e password'); return; }
        if (pw !== confirmPw) { alert('Passwords não coincidem'); return; }
        if (type === 'AD') { alert('Admin não pode ser criado'); return; }

        if (type === 'JG') {
            const email = document.getElementById('auth-email')?.value.trim() || '';
            const contact = document.getElementById('auth-contact')?.value.trim() || '';
            const locality = document.getElementById('auth-locality')?.value.trim() || '';
            const district = document.getElementById('auth-district')?.value.trim() || '';
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
            gameState.players[id] = normalizePlayer({
                id, name, password: pw, email, contact, locality, district
            });
            saveState();
            lastLoginLS.jgName = name;
            localStorage.setItem('lastLogin', JSON.stringify(lastLoginLS));
            alert('Conta criada! Faça login.');
            authMode = 'login';
            updateAuthUI();
            document.getElementById('auth-name').value = name;
        } else if (type === 'PR') {
            const email = document.getElementById('auth-email')?.value.trim() || '';
            const nif = document.getElementById('auth-nif')?.value.trim() || '';
            const address = document.getElementById('auth-address')?.value.trim() || '';
            const locality = document.getElementById('auth-locality')?.value.trim() || '';
            const contact = document.getElementById('auth-contact')?.value.trim() || '';
            const website = document.getElementById('auth-website')?.value.trim() || '';
            const logoFile = document.getElementById('auth-logo')?.files[0];
            if (!email || !nif) { alert('Email e NIF são obrigatórios'); return; }
            if (!logoFile) { alert('Logótipo obrigatório'); return; }
            const reader = new FileReader();
            reader.onload = function(ev) {
                const logoData = ev.target.result;
                const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
                gameState.companies[id] = normalizeCompany({
                    id, name, email, password: pw, nif, address, locality, contact, website, logo: logoData
                });
                saveState();
                lastLoginLS.prName = name;
                lastLoginLS.prEmail = email;
                localStorage.setItem('lastLogin', JSON.stringify(lastLoginLS));
                alert('Empresa criada! Faça login.');
                authMode = 'login';
                updateAuthUI();
                document.getElementById('auth-name').value = name;
            };
            reader.readAsDataURL(logoFile);
        }
    } else { // login
        if (!name || !pw) { alert('Preencha nome e password'); return; }
        if (type === 'AD') {
            const email = document.getElementById('auth-email')?.value.trim() || '';
            if (name === 'admin' && pw === '321321' && email === 'ze_ovo@ovo') {
                gameState.currentUser = { type: 'AD', id: 'admin' };
                saveState();
                document.getElementById('auth-modal').classList.add('hidden');
                startAdmin();
                return;
            } else { alert('Credenciais admin inválidas'); return; }
        }

        let user = null;
        if (type === 'JG') {
            user = Object.values(gameState.players).find(u => u.name === name && u.password === pw);
            if (user) {
                lastLoginLS.jgName = name;
                localStorage.setItem('lastLogin', JSON.stringify(lastLoginLS));
            }
        } else if (type === 'PR') {
            const email = document.getElementById('auth-email')?.value.trim() || '';
            user = Object.values(gameState.companies).find(u => u.name === name && u.email === email && u.password === pw);
            if (user) {
                lastLoginLS.prName = name;
                lastLoginLS.prEmail = email;
                localStorage.setItem('lastLogin', JSON.stringify(lastLoginLS));
            }
        }
        if (!user) { alert('Credenciais inválidas'); return; }
        gameState.currentUser = { type, id: user.id };
        saveState();
        document.getElementById('auth-modal').classList.add('hidden');
        if (type === 'JG') startPlayerGame();
        else if (type === 'PR') startPRGame();
    }
};

function normalizePlayer(p) {
    return {
        ...p,
        energy: p.energy ?? 100,
        points: p.points ?? 0,
        flagsCollected: p.flagsCollected ?? [],
        inventory: p.inventory ?? [],
        friends: p.friends ?? [],
        x: p.x ?? 38.7223,
        y: p.y ?? -9.1393,
        lastEnergyUpdate: p.lastEnergyUpdate ?? Date.now()
    };
}

function normalizeCompany(c) {
    return {
        ...c,
        packages: c.packages ?? []
    };
}

// ======================== DRAGGABLE ========================
function makeDraggable(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    const header = modal.querySelector('.draggable-content');
    if (!header) return;
    let offsetX, offsetY, isDown = false;
    header.addEventListener('mousedown', function(e) {
        isDown = true;
        offsetX = e.clientX - modal.getBoundingClientRect().left;
        offsetY = e.clientY - modal.getBoundingClientRect().top;
        modal.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', function(e) {
        if (!isDown) return;
        e.preventDefault();
        modal.style.left = (e.clientX - offsetX) + 'px';
        modal.style.top = (e.clientY - offsetY) + 'px';
        modal.style.right = 'auto';
        modal.style.bottom = 'auto';
    });
    document.addEventListener('mouseup', function() {
        isDown = false;
        modal.style.cursor = '';
    });
}
window.addEventListener('load', () => {
    ['auth-modal', 'mode-modal', 'pr-dashboard', 'admin-panel', 'private-chat-modal', 'trade-modal', 'warehouse-panel', 'result-modal'].forEach(makeDraggable);
});

// ======================== MAPA / JOGO ========================
let map, playerMarker, flagMarkers = {}, watchId, circleInner, circleOuter, gpsTimeout;

function startPlayerGame() {
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('pr-dashboard').classList.add('hidden');
    document.getElementById('mode-modal').classList.remove('hidden');
    initMap();
    updateHUD();
    refreshFlags();
}

function startPRGame() {
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('pr-dashboard').classList.remove('hidden');
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('mode-modal').classList.add('hidden');
    if (map) { map.remove(); map = null; }
    document.getElementById('map').classList.add('hidden');
    updatePRDashboard();
}

function startAdmin() {
    document.getElementById('admin-panel').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('pr-dashboard').classList.add('hidden');
    document.getElementById('mode-modal').classList.add('hidden');
    if (map) { map.remove(); map = null; }
    document.getElementById('map').classList.add('hidden');
    document.getElementById('admin-jg').innerText = Object.keys(gameState.players).length;
    document.getElementById('admin-pr').innerText = Object.keys(gameState.companies).length;
}

function initMap() {
    if (map) map.remove();
    document.getElementById('map').classList.remove('hidden');
    map = L.map('map', {
        center: [38.7223, -9.1393],
       zoom: 17,     
        zoomControl: false
    });

    // Mapa de satélite (estilo GPS)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri, Maxar, Earthstar Geographics, and the GIS User Community'
    }).addTo(map);

    // Sobreposição com nomes de ruas (muito leve)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '',
        opacity: 0.25
    }).addTo(map);

    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    const playerIcon = L.divIcon({
        html: '<i class="fa-solid fa-person" style="color:#e94560; font-size:40px;"></i>',
        iconSize: [40, 40],
        iconAnchor: [20, 40]
    });
    const player = gameState.players[gameState.currentUser.id];
    playerMarker = L.marker([player.x, player.y], { icon: playerIcon, zIndexOffset: 1000 }).addTo(map);

    // Círculo exterior (5m) – muito discreto
    circleOuter = L.circle([player.x, player.y], {
        radius: 5,
        color: '#ffcccc',
        fill: false,
        weight: 0.5,
        dashArray: '2, 8',
        interactive: false
    }).addTo(map);

    // Círculo interior (2.5m) – só aparece quando há bandeiras
    circleInner = L.circle([player.x, player.y], {
        radius: 2.5,
        color: 'red',
        fillColor: '#f03',
        fillOpacity: 0.1,
        weight: 1,
        dashArray: '4, 4',
        interactive: false
    });
    // Inicialmente escondido
    circleInner.removeFrom(map);

    updatePlayerLocation([player.x, player.y]);
    centerOnPlayer();
}

function updatePlayerLocation(latlng) {
    if (!playerMarker) return;
    playerMarker.setLatLng(latlng);
    if (circleInner) circleInner.setLatLng(latlng);
    if (circleOuter) circleOuter.setLatLng(latlng);
    const p = gameState.players[gameState.currentUser.id];
    p.x = latlng[0];
    p.y = latlng[1];
    regenEnergy(p);
    saveState();
    updateVisibleFlags();
    // Manter o mapa centrado no jogador sem alterar o zoom
    if (map) map.panTo(latlng);
}
function regenEnergy(player) {
    if (!player.lastEnergyUpdate) player.lastEnergyUpdate = Date.now();
    const now = Date.now();
    const diff = now - player.lastEnergyUpdate;
    const intervals = Math.floor(diff / (15 * 60 * 1000)); // cada 15 min
    if (intervals > 0) {
        player.energy = Math.min(100, player.energy + intervals * 10);
        player.lastEnergyUpdate = now - (diff % (15 * 60 * 1000));
    }
}

    function updateHUD() {
    const p = gameState.players[gameState.currentUser?.id];
    if (!p) return;
    document.getElementById('hud-name').innerText = p.name;
    document.getElementById('flag-count').innerText = p.flagsCollected.length;
    const energyRounded = Math.round(p.energy);
    document.getElementById('energy-fill').style.width = energyRounded + '%';
    document.getElementById('energy-text').innerText = energyRounded + '%';
    if (energyRounded <= 0) {
        document.getElementById('energy-text').innerText = '0% (descansando...)';
    }
}
// ======================== GPS / MODO CASA ========================
function requestGPSMode() {
    if (navigator.geolocation) {
        gpsTimeout = setTimeout(() => {
            alert('GPS não respondeu. Ativando modo casa.');
            activateHomeMode();
        }, 3000);
        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                clearTimeout(gpsTimeout);
                updatePosition(pos);
            },
            (err) => {
                clearTimeout(gpsTimeout);
                console.warn('Erro GPS:', err);
                alert('Erro no GPS. Ativando modo casa.');
                activateHomeMode();
            },
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
        document.getElementById('offline-dpad').classList.add('hidden');
    } else {
        alert('Geolocalização não suportada. Modo casa ativado.');
        activateHomeMode();
    }
}

function activateHomeMode() {
    stopGPS();
    document.getElementById('offline-dpad').classList.remove('hidden');
    document.getElementById('mode-modal').classList.add('hidden');
}

function stopGPS() {
    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }
    clearTimeout(gpsTimeout);
}

function updatePosition(pos) {
    const latlng = [pos.coords.latitude, pos.coords.longitude];
    updatePlayerLocation(latlng);
    const p = gameState.players[gameState.currentUser.id];
    p.energy = Math.max(0, p.energy - 0.25);
    updateHUD();
    saveState();
}

function handleGeoError(err) {
    console.error(err);
    alert('Erro no GPS. Ativando modo casa.');
    activateHomeMode();
}

document.getElementById('gps-mode-btn').addEventListener('click', () => {
    document.getElementById('mode-modal').classList.add('hidden');
    requestGPSMode();
});
document.getElementById('home-mode-btn').addEventListener('click', () => {
    document.getElementById('mode-modal').classList.add('hidden');
    activateHomeMode();
});

// ======================== MOVIMENTO MANUAL ========================
document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
    btn.addEventListener('click', (e) => moveHomePlayer(e.currentTarget.dataset.dir));
});
document.getElementById('center-btn').addEventListener('click', centerOnPlayer);
document.addEventListener('keydown', (e) => {
    if (gameState.currentUser?.type === 'JG' && !document.getElementById('offline-dpad').classList.contains('hidden')) {
        const maps = { ArrowUp: 'n', ArrowDown: 's', ArrowLeft: 'w', ArrowRight: 'e' };
        if (maps[e.key]) {
            e.preventDefault();
            moveHomePlayer(maps[e.key]);
        }
    }
});

function moveHomePlayer(dir) {
    if (!gameState.currentUser || gameState.currentUser.type !== 'JG') return;
    const p = gameState.players[gameState.currentUser.id];
    if (p.energy <= 0) {
        alert('Energia esgotada! Descanse 15 minutos.');
        return;
    }
    const step = 0.00002; // ~2 metros
    if (dir.includes('n')) p.x += step;
    if (dir.includes('s')) p.x -= step;
    if (dir.includes('e')) p.y += step;
    if (dir.includes('w')) p.y -= step;
    updatePlayerLocation([p.x, p.y]);
    p.energy = Math.max(0, p.energy - 0.25);
    updateHUD();
    saveState();
}

function centerOnPlayer() {
    const p = gameState.players[gameState.currentUser.id];
    if (map) map.setView([p.x, p.y], 17);
}

// ======================== BANDEIRAS ========================
function getAllActivePackages() {
    const pkgs = [];
    for (let cid in gameState.companies) {
        (gameState.companies[cid].packages || []).forEach(p => {
            if (p.flagsRemaining > 0) pkgs.push({ ...p, companyId: cid });
        });
    }
    return pkgs;
}

function createFlagCandidate() {
    const player = gameState.players[gameState.currentUser.id];
    const r = gameState.settings.flagRadius;
    const lat = player.x + (Math.random() - 0.5) * r * 2;
    const lng = player.y + (Math.random() - 0.5) * r * 2;
    const active = getAllActivePackages();
    if (active.length === 0 && Object.keys(gameState.companies).length === 0) {
        // Bandeira fantasma quando não há empresas
        return {
            id: 'f' + Date.now() + Math.random(),
            lat, lng,
            packageId: 'fantasma',
            companyId: 'fantasma',
            points: 10,
            promo: false,
            logo: null
        };
    }
    if (active.length === 0) return null;
    const chosen = active[Math.floor(Math.random() * active.length)];
    const promo = Math.random() < 0.2;
    return {
        id: 'f' + Date.now() + Math.random(),
        lat, lng,
        packageId: chosen.id,
        companyId: chosen.companyId,
        points: promo ? 20 : 10,
        promo
    };
}

function refreshFlags() {
    clearFlags();
    for (let i = 0; i < gameState.settings.maxFlags; i++) {
        const f = createFlagCandidate();
        if (f) gameState.flags.push(f);
    }
    drawFlagsOnMap();
    saveState();
}

function drawFlagsOnMap() {
    if (!map) return;
    Object.values(flagMarkers).forEach(m => map.removeLayer(m));
    flagMarkers = {};
    gameState.flags.forEach(flag => {
        const icon = L.divIcon({
            html: '<i class="fa-solid fa-flag" style="color:red; font-size:20px;"></i>',
            iconSize: [24, 24],
            iconAnchor: [12, 24]
        });
        const marker = L.marker([flag.lat, flag.lng], { icon }).addTo(map);
        marker.bindPopup(`
            <div class="flag-popup">
                <strong>${flag.promo ? '🌟 PROMO' : '🏁 Bandeira'}</strong><br>
                +${flag.points} pts<br>
                <button onclick="collectFlag('${flag.id}')">Recolher</button>
            </div>
        `);
        flagMarkers[flag.id] = marker;
    });
}

window.collectFlag = function(flagId) {
    const player = gameState.players[gameState.currentUser.id];
    const flag = gameState.flags.find(f => f.id === flagId);
    if (!flag || player.energy <= 0) return;
    const dist = map.distance([player.x, player.y], [flag.lat, flag.lng]);
    if (dist > 2.5) { alert('Demasiado longe'); return; }

    player.points += flag.points;
    player.energy = Math.min(100, player.energy + 5);
    player.flagsCollected.push(flagId);

    const qrData = JSON.stringify({ flagId, promo: flag.promo, points: flag.points });
    player.inventory.push({ qr: qrData, name: (flag.promo ? 'Promo' : 'Flag') + flag.points });

    const compName = gameState.companies[flag.companyId]?.name || 'Fantasma';
    gameState.ads.push({ player: player.name, company: compName, prize: flag.points + ' pts' });
    if (gameState.ads.length > 10) gameState.ads.shift();

    if (gameState.companies[flag.companyId]) {
        const pkg = gameState.companies[flag.companyId].packages.find(p => p.id === flag.packageId);
        if (pkg) pkg.flagsRemaining = Math.max(0, (pkg.flagsRemaining || 1) - 1);
    }

    removeFlag(flagId);
    updateHUD();
    saveState();

    document.getElementById('result-title').innerText = flag.promo ? '🌟 Promo!' : 'Bandeira recolhida!';
    document.getElementById('result-message').innerText = `+${flag.points} pontos! QR guardado.`;
    document.getElementById('result-modal').classList.remove('hidden');

    if (gameState.flags.length < gameState.settings.maxFlags) {
        const f = createFlagCandidate();
        if (f) { gameState.flags.push(f); drawFlagsOnMap(); }
    }
};

function removeFlag(flagId) {
    gameState.flags = gameState.flags.filter(f => f.id !== flagId);
    if (flagMarkers[flagId]) {
        map.removeLayer(flagMarkers[flagId]);
        delete flagMarkers[flagId];
    }
}

function clearFlags() {
    gameState.flags = [];
    Object.values(flagMarkers).forEach(m => map.removeLayer(m));
    flagMarkers = {};
}

function updateVisibleFlags() {
    const player = gameState.players[gameState.currentUser.id];
    let bandeiraNoRaioDeVisao = false;

    gameState.flags.forEach(flag => {
        const marker = flagMarkers[flag.id];
        if (!marker) return;
        const dist = map.distance([player.x, player.y], [flag.lat, flag.lng]);
        if (dist <= 5) {
            if (!map.hasLayer(marker)) marker.addTo(map);
            bandeiraNoRaioDeVisao = true;
        } else {
            if (map.hasLayer(marker)) map.removeLayer(marker);
        }
    });

    // Mostrar/ocultar o círculo interior baseado na presença de bandeiras
    if (circleInner) {
        if (bandeiraNoRaioDeVisao) {
            if (!map.hasLayer(circleInner)) circleInner.addTo(map);
        } else {
            if (map.hasLayer(circleInner)) circleInner.removeFrom(map);
        }
    }
}

document.getElementById('close-result-btn').onclick = () => document.getElementById('result-modal').classList.add('hidden');

document.getElementById('admin-promo-btn').onclick = () => {

// ======================== CHAT / AMIGOS ========================
document.getElementById('player-list-btn').onclick = () => {
    const panel = document.getElementById('player-list-panel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) renderPlayerList();
};

function renderPlayerList() {
    const list = document.getElementById('player-list');
    list.innerHTML = '';
    const me = gameState.players[gameState.currentUser.id];
    for (let id in gameState.players) {
        const p = gameState.players[id];
        if (p.id === me.id) continue;
        const entry = document.createElement('div');
        entry.className = 'player-entry';
        const isFriend = me.friends.includes(p.id);
        entry.innerHTML = `<span>${p.name}</span>`;
        const btn = document.createElement('button');
        btn.className = 'add-friend-btn';
        btn.innerText = isFriend ? 'Chat' : 'Adicionar';
        btn.onclick = () => {
            if (isFriend) {
                openPrivateChat(p.name);
            } else {
                me.friends.push(p.id);
                saveState();
                renderPlayerList();
                openPrivateChat(p.name);
            }
        };
        entry.appendChild(btn);
        list.appendChild(entry);
    }
}

let currentPrivateChat = null;

function openPrivateChat(friendName) {
    currentPrivateChat = friendName;
    document.getElementById('private-chat-modal').classList.remove('hidden');
    renderPrivateMessages();
}

document.getElementById('private-send-btn').onclick = () => {
    const input = document.getElementById('private-input');
    const msg = input.value.trim();
    if (!msg || !currentPrivateChat) return;
    const key = [gameState.currentUser.id, currentPrivateChat].sort().join('|');
    if (!gameState.chatMessages[key]) gameState.chatMessages[key] = [];
    gameState.chatMessages[key].push({
        from: gameState.players[gameState.currentUser.id].name,
        text: msg,
        time: Date.now()
    });
    saveState();
    input.value = '';
    renderPrivateMessages();
};

function renderPrivateMessages() {
    const cont = document.getElementById('private-messages');
    if (!currentPrivateChat) return;
    const key = [gameState.currentUser.id, currentPrivateChat].sort().join('|');
    const msgs = gameState.chatMessages[key] || [];
    cont.innerHTML = msgs.slice(-30).map(m => `<div><b>${m.from}:</b> ${m.text}</div>`).join('');
}

document.getElementById('close-private-chat').onclick = () => document.getElementById('private-chat-modal').classList.add('hidden');
document.getElementById('open-trade-from-chat').onclick = () => document.getElementById('trade-modal').classList.remove('hidden');
document.getElementById('open-warehouse-from-chat').onclick = openWarehouse;

// ======================== TRADE / WAREHOUSE / QR ========================
let currentTradeQR = null;
function allowDrop(ev) { ev.preventDefault(); }
function dropQR(ev, slot) {
    ev.preventDefault();
    const data = ev.dataTransfer.getData('text/plain');
    if (data && slot === 'my') {
        currentTradeQR = data;
        document.getElementById('my-offer-slot').innerHTML = '';
        new QRCode(document.getElementById('my-offer-slot'), { text: data, width: 100, height: 100 });
    }
}
function selectQRFromInventory() {
    const player = gameState.players[gameState.currentUser.id];
    if (player.inventory.length === 0) { alert('Sem QRs'); return; }
    const idx = prompt('Índice (0 a ' + (player.inventory.length - 1) + ')');
    const i = parseInt(idx);
    if (isNaN(i) || i < 0 || i >= player.inventory.length) return;
    currentTradeQR = player.inventory[i].qr;
    document.getElementById('my-offer-slot').innerHTML = '';
    new QRCode(document.getElementById('my-offer-slot'), { text: currentTradeQR, width: 100, height: 100 });
}
document.getElementById('enlarge-my-qr').onclick = () => { if (currentTradeQR) showLargeQR(currentTradeQR); };
document.getElementById('enlarge-partner-qr').onclick = () => { showLargeQR(JSON.stringify({ partner: true })); };
document.getElementById('accept-trade-btn').onclick = () => {
    if (!currentTradeQR) { alert('Ofereça um QR'); return; }
    const player = gameState.players[gameState.currentUser.id];
    const idx = player.inventory.findIndex(i => i.qr === currentTradeQR);
    if (idx === -1) return;
    player.inventory.splice(idx, 1);
    player.inventory.push({ qr: JSON.stringify({ partner: true }), name: 'QR parceiro' });
    saveState();
    alert('Troca OK');
    document.getElementById('trade-modal').classList.add('hidden');
};
document.getElementById('close-trade-btn').onclick = () => document.getElementById('trade-modal').classList.add('hidden');

function openWarehouse() {
    const player = gameState.players[gameState.currentUser.id];
    const list = document.getElementById('warehouse-qr-list');
    list.innerHTML = '';
    player.inventory.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'qr-item';
        div.innerHTML = `<canvas id="qr-canvas-${idx}" width="60" height="60"></canvas><br>${item.name}`;
        div.onclick = () => showLargeQR(item.qr);
        list.appendChild(div);
        setTimeout(() => new QRCode(document.getElementById(`qr-canvas-${idx}`), { text: item.qr, width: 60, height: 60 }), 10);
    });
    document.getElementById('warehouse-panel').classList.remove('hidden');
}
document.getElementById('close-warehouse-btn').onclick = () => document.getElementById('warehouse-panel').classList.add('hidden');
function showLargeQR(data) {
    document.getElementById('qr-large-overlay').classList.remove('hidden');
    const canvas = document.getElementById('qr-large-canvas');
    canvas.innerHTML = '';
    new QRCode(canvas, { text: data, width: 200, height: 200 });
    document.addEventListener('keydown', blockPrint);
}
document.getElementById('close-qr-large-btn').onclick = () => {
    document.getElementById('qr-large-overlay').classList.add('hidden');
    document.removeEventListener('keydown', blockPrint);
};
function blockPrint(e) {
    if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p')) {
        e.preventDefault();
        alert('Print bloqueado pelo cadeado.');
    }
}

    document.getElementById('pr-name').innerText = comp.name;
    document.getElementById('pr-packages-count').innerText = comp.packages.length;

document.getElementById('logout-btn').onclick = logout;
document.getElementById('pr-logout-btn').onclick = logout;
document.getElementById('admin-logout-btn').onclick = logout;
function logout() {
    stopGPS();
    gameState.currentUser = null;
    saveState();
    if (map) { map.remove(); map = null; }
    ['hud', 'offline-dpad', 'pr-dashboard', 'admin-panel', 'player-list-panel',
     'private-chat-modal', 'trade-modal', 'warehouse-panel', 'result-modal', 'qr-large-overlay', 'mode-modal']
    .forEach(id => document.getElementById(id)?.classList.add('hidden'));
    document.getElementById('map').classList.add('hidden');
    showAuthModal();
}

function updateTicker() {
    const el = document.getElementById('ticker');
    if (!el) return;
    let msgs = ['🎉 Empresa XPTO lançou um BINGO: 1000€ por tempo limitado!'];
    gameState.ads.forEach(ad => msgs.push(`${ad.player} ganhou ${ad.prize} da ${ad.company}`));
    el.innerText = msgs.join('  •  ');
    el.animate([{ transform: 'translateX(100%)' }, { transform: 'translateX(-100%)' }], {
        duration: 20000,
        iterations: Infinity
    });
}
setInterval(updateTicker, 15000);
updateTicker();

    else startAdmin();
} else {

}
