<!DOCTYPE html>
<html lang="pt">
<head>

<style>
/* =========================================
   GLOBAL & UTILITIES
========================================= */
*,*::before,*::after {box-sizing:border-box;margin:0;padding:0}
html,body {width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;background:#000;color:#0f0;user-select:none;-webkit-user-select:none}

.hidden {display:none !important}
.scroll {max-height:65vh;overflow-y:auto}
.pw-wrap {position:relative}.pw-wrap input {padding-right:44px;margin:0}
.pw-toggle {position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#555;padding:3px}
.fbar {height:4px;border-radius:2px;margin-top:4px;transition:.3s;background:#333;width:0%}
.g2 {display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
.tab-bar {display:flex;margin-bottom:14px;border-bottom:2px solid #0f0}
.tab {flex:1;text-align:center;padding:10px;cursor:pointer;font-weight:700;color:#0a0;border-bottom:3px solid transparent;transition:.2s}
.tab.active {color:#0f0;border-bottom-color:#0f0}
.msg{min-height:18px;font-size:12px;margin:6px 0;color:#a7fca7}
.msg.err{color:#f66}
.item{border:1px solid #0f0;background:rgba(0,25,0,.16);border-radius:10px;padding:10px;margin-bottom:8px;font-size:13px;line-height:1.5;color:#ccc}
.row{padding:4px 0;border-bottom:1px solid #0a0a0a;font-size:13px;display:flex;justify-content:space-between;gap:8px}
.rl{color:#0aa;font-size:11px;white-space:nowrap;flex-shrink:0}
.rv{text-align:right;word-break:break-word}
.card{background:rgba(0,15,0,.2);border:1px solid #0a0;border-radius:10px;padding:12px;margin:8px 0}
.card-y{border-color:#f90}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}

/* =========================================
   BUTTONS
========================================= */
button{background:#0f0;color:#000;border:none;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:800;cursor:pointer;transition:.15s}
button:active{transform:scale(.94)}
button:disabled{opacity:.4;cursor:not-allowed}
.bb{display:block;width:100%;margin:5px 0;text-align:center}
.bp{padding:24px 55px;font-size:26px;background:linear-gradient(135deg,#00ff66,#00c853);color:#000;border-radius:20px;box-shadow:0 0 40px rgba(0,255,100,.3);letter-spacing:2px}
.be{padding:16px 36px;font-size:17px;background:#181818;color:#0f0;border:2px solid #0f0;border-radius:16px}

.btn-dark{background:#181818;color:#0f0;border:1px solid #0f0}
.btn-danger{background:#600;color:#f88;border:1px solid #f44}

/* =========================================
   LAYOUT PAGES
========================================= */
/* Landing */

.sub{color:#a7fca7;font-size:15px;line-height:1.6}
.auth-title {text-align:center;margin-bottom:12px}

/* Auth Screen */
.auth-wrap {height:100vh;overflow-y:auto;padding:20px;background:linear-gradient(180deg,#000,#051005)}
.auth-box {max-width:500px;margin:0 auto;border:2px solid #0f0;border-radius:16px;background:rgba(0,20,0,.3);padding:20px;box-shadow:0 0 20px rgba(0,255,0,.1)}

/* Game Screen */
#game-screen {position:absolute;inset:0;z-index:900}
#map-wrap {position:absolute;inset:0}
#map {width:100%;height:100%;z-index:1}
.leaflet-container {background:#0a0a0a}
#fog-overlay {position:absolute;inset:0;pointer-events:none;z-index:450;--fog-x:50%;--fog-y:50%;--fog-r:90px;background:radial-gradient(circle var(--fog-r) at var(--fog-x) var(--fog-y),transparent 0%,transparent 60%,rgba(0,30,90,.6) 78%,rgba(0,30,90,.86) 100%)}
#top-strip {position:absolute;top:8px;left:8px;right:8px;z-index:1000;background:rgba(0,0,0,.85);border:1px solid #0f0;border-radius:12px;padding:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}

.fb {width:46px;height:46px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:18px}

/* Joystick */

.dpad {display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px}

/* Side Panel */
#sidep {position:absolute;left:8px;right:8px;bottom:8px;z-index:2500;background:rgba(0,0,0,.92);border:2px solid #0f0;border-radius:14px;padding:12px;max-height:38vh;overflow-y:auto}

.pm {width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00f0ff,#0066ff);border:3px solid #fff;box-shadow:0 0 10px rgba(0,255,255,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900;overflow:hidden}

.fc-z {background:#00ff66!important}

/* Modal */
.modal {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3000;width:92%;max-width:480px;background:#000;border:3px solid #0f0;border-radius:14px;padding:16px;box-shadow:0 0 25px rgba(0,255,0,.22);max-height:90vh;overflow-y:auto}

#pr-body {flex:1;overflow-y:auto;padding:16px;max-width:640px;margin:0 auto;width:100%}
.branch-card {border:1px solid #0a0;background:rgba(0,25,0,.1);border-radius:10px;padding:12px;margin-bottom:8px}

/* BACKOFFICE */
#bo-screen {display:flex;flex-direction:column;height:100vh;background:linear-gradient(180deg,#000,#040820)}
#bo-hdr {background:rgba(0,200,255,.08);border-bottom:1px solid #0ff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

/* MARKS */
.watermark {position:fixed;bottom:36px;left:14px;font-size:16px;font-weight:900;color:rgba(0,255,0,.2);z-index:9999;pointer-events:none}
.copyright {position:fixed;bottom:4px;width:100%;text-align:center;font-size:9px;color:rgba(0,255,0,.15);z-index:9999;pointer-events:none}
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* =========================================
   CORE STATE
========================================= */
const STORAGE_KEY = 'zap_flags_v_final';
let state = loadState();
let currentPRId = null; // For PR Login context
let prTabsActive = 'dash';

// Config
const CFG = {
  VISUAL: 5, // base radius
  PICKUP: 5, // pickup distance
  SKILL_PER: 1, // skill gained per flag
  QR_NEEDED: 20 // flags to get a QR
};

/* =========================================
   DATA MANAGEMENT
========================================= */
function defaultState() {
  return {
    lastEmail: '',
    players: [],
    prs: [], // Companies
    boLogs: []
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const p = JSON.parse(raw);
    return p;
  } catch (e) { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){ console.error("Save err",e); }
}

/* =========================================
   HELPERS
========================================= */
function uid(p) { return p + '_' + Math.random().toString(36).slice(2,8).toUpperCase(); }
function now() { return Date.now(); }

function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371e3, phi1 = lat1*Math.PI/180, phi2 = lat2*Math.PI/180;
  const dPhi = (lat2-lat1)*Math.PI/180, dLam = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dPhi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dLam/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showMsg(id, text, isError=false) {
  const el = document.getElementById(id); if(!el) return;
  el.textContent = text; el.className = 'msg' + (isError ? ' err' : ''); setTimeout(()=>{if(el)el.innerText=''}, 4000);
}

function tPW(id,b) {
  const i = document.getElementById(id); if(!i) return;
  i.type = i.type === 'text' ? 'password' : 'text';
  b.innerText = i.type === 'password' ? '👁' : '🙈';
}

/* =========================================
   NAVIGATION
========================================= */
function goLanding() { hideAll(); document.getElementById('landing').classList.remove('hidden'); }
function hideAll() { document.querySelectorAll('.hidden').forEach(e=>e.classList.add('hidden')); }

function showAuth(type) {
  hideAll(); 
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-title').textContent = type === 'JG' ? '🎮 JOGADOR' : '🏢 EMPRESA';
  // Reset Tabs
  showTab(type==='JG'?'reg':'reg'); 
  if(type==='JG') document.getElementById('jg-reg').classList.add('hidden'); else document.getElementById('pr-reg').classList.add('hidden');
  document.getElementById('tab-log').click(); // Ensure login tab is ready
}

function showTab(mode) {
  // JG Tabs
  if(document.getElementById('jg-reg')) document.getElementById('jg-reg').classList.toggle('hidden', mode!=='reg');
  if(document.getElementById('jg-log')) document.getElementById('jg-log').classList.toggle('hidden', mode!=='log');
  
  // PR Tabs
  if(document.getElementById('pr-reg')) document.getElementById('pr-reg').classList.toggle('hidden', mode!=='reg');
  if(document.getElementById('pr-log')) document.getElementById('pr-log').classList.toggle('hidden', mode!=='log');
}

function showBOLogin() {
  hideAll();
  const div = document.createElement('div');
  div.id = 'bo-login';
  div.innerHTML = '<div class="auth-wrap"><div class="auth-box"><h2>🔐 BackOffice</h2><input type="password" id="bo-pass" placeholder="Senha Admin"><button class="bb" onclick="doLoginBO()">ENTRAR</button><button class="btn-dark btn-small bb" onclick="goLanding()">CANCELAR</button></div></div>';
  document.body.appendChild(div);
}

/* =========================================
   AUTHENTICATION (JOGADOR & PR)
========================================= */
function regPlayer() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim().toLowerCase();
  const pass = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  const msg = 'jg-reg-msg';

  if(!name || !email || !pass || !pass2) return showMsg(msg,'Faltam campos obrigatórios.',true);
  if(pass !== pass2) return showMsg(msg,'Senhas diferentes!',true);
  if(pass.length < 4) return showMsg(msg,'Senha min. 4 car.',true);

  state.lastEmail = email;
  saveState();
  
  // Auto Login
  enterGame(p);
}

/* =========================================
   ENTER GAME LOGIC
========================================= */
function enterGame(player) {
  hideAll();
  document.getElementById('game-screen').classList.remove('hidden');
  initMap();
  
  // Init Player State Locally
  window.currentUser = player;
  updateHUD();
}

/* =========================================
   GAME ENGINE (MAP & MOVEMENT)
========================================= */
let map = null; let playerMarker = null; let visionCircle = null; let currentPos = {lat:38.7223,lng:-9.1393};
let myFlags = [];

function initMap() {
  if(map) { map.remove(); map=null; playerMarker=null; visionCircle=null; }
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([currentPos.lat,currentPos.lng],18);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{}).addTo(map);
  
  // Circle Player
  playerMarker = L.marker([currentPos.lat,currentPos.lng]).addTo(map);
  visionCircle = L.circle([currentPos.lat,currentPos.lng], {radius:CFG.VISUAL, color:'#00ff00'}).addTo(map);
  
  spawnMyFlags();
}

function spawnMyFlags() {
  if(!map) return;
  myFlags.forEach(f=>{ if(f.m) map.removeLayer(f.m); }); myFlags = [];

  // Spawn 10 Flags around
  for(let i=0;i<10;i++){
    const dist = 10 + Math.random()*15; // meters approx
    const angle = Math.random()*Math.PI*2;
    // Approximate offset for small distances
    const dLat = (dist/111320); 
    const dLng = (dist/(111320*Math.cos(currentPos.lat*Math.PI/180)));
    const fLat = currentPos.lat + (Math.sin(angle)*dLat);
    const fLng = currentPos.lng + (Math.cos(angle)*dLng);

    const types = ['ENERGY','PRIZE','EMPTY'];
    const type = types[Math.floor(Math.random()*types.length)];
    
    myFlags.push({
      id: uid('FL'), type: type, lat: fLat, lng: fLng, m: null,
      prize: `Prémio Extra`
    });
  }
  drawFlags();
}

function drawFlags() {
  myFlags.forEach((f, idx)=>{
    if(f.m) map.removeLayer(f.m); f.m = null;
    
    const d = calcDist(currentPos.lat,currentPos.lng,f.lat,f.lng);
    if(d <= CFG.VISUAL) {
      let color = '#f00'; // empty/red
      if(f.type==='ENERGY') color='#00ff66'; // green
      if(f.type==='PRIZE') color='#f00'; // red/purpleish
      
      const icon = L.divIcon({className:'fm',html:`<div class="fs"></div><div class="fbn ${f.type==='ENERGY'?'fc-z':(f.type==='PRIZE'?'fc-p':'fc-r')}"></div>`});
      f.m = L.marker([f.lat,f.lng],{icon:icon,zIndexOffset:100}).addTo(map);
      f.m.on('click',()=>tryPick(idx));
    }
  });
}

function moveHomePlayer(dx,dy) {
  if(window.currentUser.energy <= 0) { alert('Sem energia!'); return; }
  
  const step = 1; // meters
  const old = {...currentPos};
  currentPos.lat += dy*(step/111320);
  currentPos.lng += dx*(step/(111320*Math.cos(currentPos.lat*Math.PI/180)));

  window.currentUser.energy -= 0.2;
  saveState();

  playerMarker.setLatLng([currentPos.lat,currentPos.lng]);
  visionCircle.setLatLng([currentPos.lat,currentPos.lng]);
  drawFlags();
  updateHUD();
}

function centerPlayer() {
  if(map) map.setView([currentPos.lat,currentPos.lng],18);
}

function refreshFlagsManual() {
  spawnMyFlags();
}

function tryPick(idx) {
  const f = myFlags[idx];
  const d = calcDist(currentPos.lat,currentPos.lng,f.lat,f.lng);
  
  if(d > CFG.PICKUP) {
    showFlagInfo(f,false,d); return;
  }
  
  collectFlag(f);
}

function collectFlag(f) {
  f.collected = true;
  if(f.m) map.removeLayer(f.m);
  
  window.currentUser.flags++;
  window.currentUser.skill += CFG.SKILL_PER;
  
  // XP/Points logic could go here
  let energyGain = 5;
  if(f.type==='ENERGY') energyGain += 15;
  window.currentUser.energy = Math.min(100, window.currentUser.energy + energyGain);
  
  // Company tracking
  // In this basic version, "empty" or "prize" are generic. 
  // In a full version, f.companyId would link to state.prs.
  
  saveState();
  updateHUD();
  showFlagInfo(f,true,0);
  spawnMyFlags(); // Respawn others
}

/* =========================================
   HUD & MODALS
========================================= */
function updateHUD() {
  const u = window.currentUser;
  if(!u) return;
  document.getElementById('status-text').innerText = `👤 ${u.name} | ⚡ ${u.energy}%`;
  document.getElementById('efill').style.width = u.energy+'%';
}

function showFlagInfo(flag, collected, dist) {
  const c = document.getElementById('flag-content');
  c.innerHTML = `
    <div class="item">
      <b>${collected?'RECOLHIDA':'NO MAPA'}</b>: ${flag.type}<br>
      Distância: ${Math.round(dist)}m<br>
      Reputação/Próximo: +${CFG.SKILL_PER}% Skill
    </div>
    ${!collected ? `<button class="bb" onclick="closeFlagModal()">Fechar</button>` : ''}
  `;
  document.getElementById('flag-modal').classList.remove('hidden');
}
function closeFlagModal(){ document.getElementById('flag-modal').classList.add('hidden'); }

/* =========================================
   SIDE PANELS & QR
========================================= */
function openPanel(t) {
  document.getElementById('panel-content').innerHTML = '<div class="item">Carregar...</div>';
  const panel = document.getElementById('sidep');
  const pTitle = document.getElementById('panel-title');
  
  if(t==='progress') {
    pTitle.innerText = 'Progresso';
    document.getElementById('panel-content').innerHTML = `
      <div class="item"><b>Total Bandeiras:</b> ${window.currentUser.flags}</div>
      <div class="item"><b>Skill:</b> ${window.currentUser.skill.toFixed(1)}%</div>
      <div class="item"><b>Energia Max:</b> 100%</div>
    `;
  } else if (t==='qrs'){
    pTitle.innerText = 'Meus Prémios';
    renderQRsSimple();
  }
  panel.classList.remove('hidden');
}
function closeSidePanel() { document.getElementById('sidep').classList.add('hidden'); }

function openQR() {
  document.getElementById('qr-list').innerHTML = '<div class="item">Verificar...</div>';
  renderQRsSimple();
  document.getElementById('qr-modal').classList.remove('hidden');
}
function closeQRModal() { document.getElementById('qr-modal').classList.add('hidden'); }

function renderQRsSimple() {
  const list = window.currentUser.qrList || [];
  if(list.length===0) { document.getElementById('qr-list').innerHTML='<div class="item">Não tens QRs ativos.</div>'; return; }
  
  let html = '';
  list.forEach(qr => {
    html += `<div class="item card-v"><b>${qr.company}</b><br>Prémio: ${qr.prize}<br>ID: ${qr.code}<br>Validade: ${new Date(qr.exp).toLocaleDateString()}</div>`;
  });
  document.getElementById('qr-list').innerHTML = html;
}

/* =========================================
   PR DASHBOARD LOGIC
========================================= */
let currentPR = null;

function openPRDashboard(prId) {
  hideAll();
  const pr = state.prs.find(p=>p.id===prId);
  if(!pr) { goLanding(); return; }
  
  currentPR = pr;
  currentPRId = prId;
  document.getElementById('pr-screen').classList.remove('hidden');
  
  document.getElementById('pr-name').innerText = pr.name;
  document.getElementById('pr-info').innerText = `NIF ${pr.nif} | ${pr.postal}`;
  
  prSwitchTab('dash');
}

function prSwitchTab(tab) {
  prTabsActive = tab;
  document.querySelectorAll('#pr-hdr .tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  
  const c = document.getElementById('pr-tab-content');
  
  if(tab==='dash') {
    // Basic Stats
    const totalFlags = currentPR.packs.reduce((acc,p)=>acc+p.flagsLeft,0);
    const packs = currentPR.packs.length;
    c.innerHTML = `
      <div class="card card-y">📦 Stock Total: <b>${totalFlags}</b> bandeiras</div>
      <div class="card card-b">🏪 Pacotes Ativos: ${packs}</div>
      <div class="card card-v">📱 QRs Gerados: <b>${currentPR.issuedQrs}</b></div>
      <div class="card">⚙️ Gestão: Compra de novos pacotes em breve.</div>
    `;
  }
  else if (tab==='lojas') {
     c.innerHTML = `<div class="branch-card">🛒 Loja Principal <br><small>Ativo</small></div>
     <div class="item">Adicionar Filial... (Em desenvolvimento)</div>`;
  }
  else if (tab==='qrs') {
    c.innerHTML = `<div class="item">📋 Validação Manual<br><input id="val-code" placeholder="Código QR"><button class="bb" onclick="manualValidateQR()">Validar</button><div id="val-res"></div></div>`;
  }
}

function manualValidateQR() {
  const code = document.getElementById('val-code').value.toUpperCase();
  const res = document.getElementById('val-res');
  res.innerText = '';

  // Simple check against logged players
  const found = state.players.some(pl => pl.qrList && pl.qrList.some(q => q.code===code));
  
  if(found) {
    res.innerHTML = '<div class="msg">✅ Prémio Entregue!</div>';
    currentPR.validQrs++;
    currentPR.issuedQrs++;
    saveState();
  } else {
    res.innerHTML = '<div class="msg err">❌ QR Inválido ou Já Usado</div>';
  }
}
