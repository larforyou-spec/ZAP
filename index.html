<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Larforyou · ZAP-FLAGS 3.0</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #050807;
      --panel: rgba(10, 18, 16, 0.82);
      --panel-strong: rgba(16, 30, 26, 0.94);
      --green: #42d77d;
      --green-soft: #b9f5cc;
      --cyan: #7ad7ff;
      --yellow: #d7b35a;
      --red: #ff5a6f;
      --text: #ecfff2;
      --muted: #9ac9a8;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 8%, rgba(66, 215, 125, 0.16), transparent 28%),
        radial-gradient(circle at 90% 16%, rgba(122, 215, 255, 0.10), transparent 30%),
        linear-gradient(135deg, #020403 0%, #0b1110 52%, #020202 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "Larforyou ®";
      position: fixed;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%) rotate(-18deg);
      font-size: clamp(64px, 14vw, 220px);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.035);
      text-shadow:
        0 0 28px rgba(53, 255, 122, 0.08),
        0 0 80px rgba(78, 231, 255, 0.06);
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      right: -42px;
      bottom: 90px;
      transform: rotate(-90deg);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.28em;
      color: rgba(168, 255, 197, 0.16);
      pointer-events: none;
      z-index: 0;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
      position: relative;
      z-index: 1;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      background: rgba(4, 7, 6, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 16px;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, #f4f0df, #8fdcae);
      color: #07110d;
      box-shadow: 0 0 22px rgba(185, 245, 204, 0.20);
    }

    .nav-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), #92ffb4);
      color: #001506;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(53, 255, 122, 0.18);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--green-soft);
      border: 1px solid rgba(53, 255, 122, 0.34);
      box-shadow: none;
    }

    .btn.danger {
      background: rgba(255, 90, 111, 0.14);
      color: #ffdbe0;
      border: 1px solid rgba(255, 90, 111, 0.44);
      box-shadow: none;
    }

    .screen {
      display: none;
      animation: show 0.28s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 28px;
      align-items: center;
      padding: 56px 0 30px;
    }

    .hero-card, .panel {
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.015)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-copy {
      padding: 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(78, 231, 255, 0.08);
      border: 1px solid rgba(78, 231, 255, 0.22);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(44px, 6.6vw, 82px);
      line-height: 0.96;
      letter-spacing: -0.055em;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    h3 {
      margin: 0 0 10px;
      color: var(--green-soft);
    }

    p {
      color: var(--muted);
      line-height: 1.55;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .phone-preview {
      min-height: 620px;
      padding: 22px;
      border-radius: 36px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.11), rgba(255,255,255,0.025)),
        radial-gradient(circle at 75% 20%, rgba(122,215,255,0.12), transparent 38%);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: var(--shadow);
    }

    .mock-map {
      position: relative;
      min-height: 584px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 22%, rgba(122,215,255,0.16), transparent 24%),
        radial-gradient(circle at 24% 70%, rgba(66,215,125,0.14), transparent 30%),
        linear-gradient(135deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 60px),
        linear-gradient(45deg, rgba(255,255,255,0.055) 0 1px, transparent 1px 46px),
        #08100e;
      background-size: auto, auto, 60px 60px, 46px 46px, auto;
    }

    .mock-map::before {
      content: "";
      position: absolute;
      inset: 26px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.11);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(66,215,125,0.12), transparent 46%);
      pointer-events: none;
    }

    .map-road {
      position: absolute;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      transform-origin: center;
    }

    .road-a { width: 680px; height: 28px; left: -80px; top: 180px; transform: rotate(-24deg); }
    .road-b { width: 640px; height: 24px; left: -60px; top: 380px; transform: rotate(18deg); }
    .road-c { width: 28px; height: 700px; left: 250px; top: -40px; transform: rotate(12deg); }

    .avatar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(244, 240, 223, 0.14);
      border: 1px solid rgba(244, 240, 223, 0.62);
      box-shadow: 0 0 0 28px rgba(122,215,255,0.045), 0 0 34px rgba(66,215,125,0.20);
      font-size: 26px;
    }

    .flag-pin {
      position: absolute;
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 16px;
      font-size: 16px;
      background: rgba(10, 18, 16, 0.90);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 12px 26px rgba(0,0,0,0.28);
    }

    .map-full .flag-pin {
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .map-full .avatar {
      z-index: 4;
    }

    .pin-1 { left: 18%; top: 26%; }
    .pin-2 { left: 72%; top: 22%; }
    .pin-3 { left: 66%; top: 68%; }
    .pin-4 { left: 22%; top: 72%; }

    .hud {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      padding: 10px;
      border-radius: 16px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(53,255,122,0.24);
      text-align: center;
    }

    .stat strong {
      display: block;
      color: white;
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid.three {
      grid-template-columns: repeat(3, 1fr);
    }

    .grid.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .panel {
      padding: 24px;
    }

    .module-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--green-soft);
      font-size: 18px;
      font-weight: 900;
    }

    .section {
      padding: 28px 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .input-group {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    label {
      color: var(--green-soft);
      font-weight: 800;
      font-size: 13px;
    }

    input, select {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(53,255,122,0.26);
      color: white;
      background: rgba(0,0,0,0.28);
      padding: 0 14px;
      outline: none;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
      padding-top: 28px;
    }

    .sidebar {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .sidebar button {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
    }

    .content-area {
      min-height: 620px;
    }

    .cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .mini-card {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini-card b {
      display: block;
      font-size: 26px;
      color: white;
    }

    .mini-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .qr-card, .offer-card, .package-card {
      padding: 18px;
      border-radius: 20px;
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(53,255,122,0.22);
    }

    .qr-code-box {
      display: grid;
      place-items: center;
      min-height: 120px;
      margin: 12px 0;
      border-radius: 16px;
      background:
        repeating-linear-gradient(45deg, #fff 0 8px, #111 8px 16px);
      color: transparent;
      border: 8px solid white;
    }

    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--yellow);
      background: rgba(255,215,90,0.1);
      border: 1px solid rgba(255,215,90,0.26);
      font-size: 12px;
      font-weight: 900;
    }

    .map-full {
      position: relative;
      min-height: 420px;
      border-radius: 24px;
      overflow: hidden;
      margin-top: 16px;
      border: 1px solid rgba(53,255,122,0.24);
      background:
        linear-gradient(30deg, transparent 0 20%, rgba(255,255,255,0.08) 20% 22%, transparent 22% 62%, rgba(53,255,122,0.08) 62% 64%, transparent 64%),
        radial-gradient(circle at 70% 20%, rgba(78,231,255,0.18), transparent 24%),
        #0a1d12;
    }

    .map-full.placement-mode {
      cursor: crosshair;
      border-color: rgba(255, 215, 90, 0.72);
      box-shadow: inset 0 0 0 2px rgba(255, 215, 90, 0.18), 0 0 28px rgba(255, 215, 90, 0.14);
    }

    .map-full.player-move-mode {
      cursor: pointer;
    }

    .real-gps-map {
      background:
        linear-gradient(28deg, transparent 0 43%, rgba(255,255,255,0.82) 43% 45%, transparent 45%),
        linear-gradient(118deg, transparent 0 48%, rgba(255,255,255,0.72) 48% 50%, transparent 50%),
        linear-gradient(88deg, transparent 0 52%, rgba(255,255,255,0.58) 52% 53.4%, transparent 53.4%),
        linear-gradient(0deg, transparent 0 38%, rgba(255,255,255,0.52) 38% 39.4%, transparent 39.4%),
        radial-gradient(circle at 28% 32%, rgba(66,215,125,0.42), transparent 7%),
        radial-gradient(circle at 68% 58%, rgba(122,215,255,0.34), transparent 9%),
        radial-gradient(circle at 52% 74%, rgba(215,179,90,0.28), transparent 8%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 72px),
        #8ec7a3;
      border-color: rgba(255,255,255,0.14);
      isolation: isolate;
    }

    .real-gps-map iframe {
      position: absolute;
      left: -10%;
      top: -10%;
      width: 120%;
      height: 120%;
      border: 0;
      filter: saturate(0.82) contrast(0.98) brightness(0.86);
      z-index: 1;
      pointer-events: none;
      display: block;
      transform: translate(var(--map-shift-x, 0px), var(--map-shift-y, 0px));
      transition: transform .16s linear;
    }

    .leaflet-gps-map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .leaflet-container {
      background: #cfe8ff;
      font-family: inherit;
    }

    .offline-local-map {
      position: absolute;
      inset: -80%;
      z-index: 2;
      background:
        linear-gradient(28deg, transparent 0 43%, rgba(255,255,255,0.82) 43% 45%, transparent 45%),
        linear-gradient(118deg, transparent 0 48%, rgba(255,255,255,0.72) 48% 50%, transparent 50%),
        linear-gradient(88deg, transparent 0 52%, rgba(255,255,255,0.58) 52% 53.4%, transparent 53.4%),
        linear-gradient(0deg, transparent 0 38%, rgba(255,255,255,0.52) 38% 39.4%, transparent 39.4%),
        radial-gradient(circle at 28% 32%, rgba(66,215,125,0.42), transparent 7%),
        radial-gradient(circle at 68% 58%, rgba(122,215,255,0.34), transparent 9%),
        radial-gradient(circle at 52% 74%, rgba(215,179,90,0.28), transparent 8%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 72px),
        #8ec7a3;
      transform: translate(var(--map-shift-x, 0px), var(--map-shift-y, 0px));
      transition: transform .16s linear;
    }

    .real-gps-map .range-circle,
    .real-gps-map .avatar {
      left: 50% !important;
      top: 50% !important;
    }

    .real-gps-map::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 42%, rgba(5,8,7,0.08) 78%),
        linear-gradient(180deg, rgba(5,8,7,0.04), rgba(5,8,7,0.12));
      pointer-events: none;
      z-index: 3;
    }

    .real-gps-map .range-circle,
    .real-gps-map .flag-pin,
    .real-gps-map .avatar,
    .avatar-vitals {
      z-index: 5;
    }

    .avatar-vitals {
      position: absolute;
      left: 50%;
      top: 14px;
      width: min(420px, calc(100% - 28px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      pointer-events: none;
    }

    .vital-wrap {
      display: grid;
      gap: 4px;
      color: white;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.65);
    }

    .vital-line {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0,0,0,0.58);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .vital-fill {
      height: 100%;
      border-radius: inherit;
    }

    .vital-fill.energy {
      background: linear-gradient(90deg, #42d77d, #b9f5cc);
    }

    .vital-fill.hunger {
      background: linear-gradient(90deg, #d7b35a, #ffe39a);
    }

    .range-circle {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px dashed rgba(78,231,255,0.55);
      background: rgba(78,231,255,0.06);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .map-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px;
      margin: 12px 0;
      border-radius: 18px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .map-toolbar select {
      width: auto;
      min-width: 160px;
    }

    .placement-hint {
      color: var(--yellow);
      font-weight: 900;
    }

    .bottom-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      max-width: 320px;
      padding: 16px;
      border-radius: 18px;
      color: #001506;
      background: linear-gradient(135deg, var(--green), #baffce);
      font-weight: 900;
      box-shadow: var(--shadow);
      display: none;
    }

    .toast.active {
      display: block;
    }

    .brand-footer {
      margin: 28px 0 0;
