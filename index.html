<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZAP FLAGS | Larforyou&reg;</title>
  
  <style>
    /* ================= DESIGN MODERNO E BONITO ================= */
    * { box-sizing: border-box; user-select: none; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2c3e50; color: #fff; }
    .hidden { display: none !important; }
    
    button { cursor: pointer; transition: 0.3s; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #4CAF50; background: rgba(0,0,0,0.4); color: #fff; font-size: 14px; transition: 0.3s; }
    input:focus { outline: none; border-color: #81c784; background: rgba(0,0,0,0.6); box-shadow: 0 0 8px rgba(76,175,80,0.5); }
    a { color: #81c784; text-decoration: none; font-size: 13px; transition: 0.2s; }
    a:hover { color: #a5d6a7; text-decoration: underline; }

    /* ================= LOGIN SCREEN (Profissional) ================= */
    #login-screen {
      position: absolute; inset: 0; background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10000; overflow-y: auto;
    }
    .login-box {
      width: 100%; max-width: 480px; background: rgba(15, 25, 35, 0.9); border-top: 4px solid #4CAF50;
      border-radius: 12px; padding: 30px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); margin: auto;
    }
    .login-title { text-align: center; color: #fff; margin-top: 0; font-size: 28px; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .login-title span { color: #4CAF50; }
    
    .tab-container { display: flex; margin-bottom: 20px; border-radius: 8px; background: rgba(0,0,0,0.3); overflow: hidden; }
    .tab-btn { flex: 1; padding: 14px; background: transparent; color: #aaa; border-radius: 0; font-size: 13px; }
    .tab-btn.active { background: #4CAF50; color: #fff; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-main { width: 100%; padding: 16px; font-size: 15px; background: linear-gradient(to right, #4CAF50, #45a049); color: #fff; margin-top: 10px; box-shadow: 0 4px 15px rgba(76,175,80,0.3); }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,0.4); }
    .auth-msg { color: #ff6b6b; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }

    /* ================= GAME SCREEN (Mundo Bonito & Emojis) ================= */
    #game-screen { position: absolute; inset: 0; background: #7cb342; overflow: hidden; }
    
    #world {
      position: absolute; width: 2500px; height: 2500px;
      background-image: radial-gradient(rgba(0,0,0,0.1) 2px, transparent 2px); background-size: 40px 40px;
      border: 8px solid #c62828; border-radius: 20px;
      transition: transform 0.1s linear; transform-origin: top left;
    }
    .decor { position: absolute; font-size: 45px; transform: translate(-50%, -50%); filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); }

    /* AVATAR FIXO NO CENTRO */
    #avatar-container {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; z-index: 100; display: flex; flex-direction: column; align-items: center;
    }
    .radius-circle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 250px; height: 250px; 
      border: 3px dashed rgba(255, 255, 255, 0.6); border-radius: 50%; background: rgba(255, 255, 255, 0.1); pointer-events: none;
    }
    .avatar-body {
      width: 44px; height: 44px; background: #ffeb3b; border: 3px solid #f57f17; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000;
      z-index: 2; transition: transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .legs { display: flex; gap: 8px; margin-top: -6px; z-index: 1; }
    .leg { width: 10px; height: 18px; background: #3e2723; border-radius: 5px; transition: transform 0.2s; }

    /* UI DO JOGO (Top Bar) */
    #top-bar {
      position: absolute; top: 15px; left: 15px; right: 15px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(5px);
      border-radius: 15px; padding: 12px; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px;
    }
    .stat { flex: 1; min-width: 65px; text-align: center; font-size: 13px; font-weight: bold; color: #eee; text-transform: uppercase; }
    .stat-bar { height: 8px; background: #333; border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .stat-fill { height: 100%; background: #4CAF50; width: 100%; transition: width 0.3s; }
    
    /* CONTROLOS (D-Pad à Direita) */
    #right-controls {
      position: absolute; bottom: 50px; right: 30px; z-index: 200;
      display: grid; grid-template-columns: 55px 55px 55px; grid-gap: 8px;
    }
    .dpad-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); color: #fff; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .dpad-btn:active { background: #4CAF50; border-color: #4CAF50; transform: scale(0.95); }
    
    /* AVISO DE CANSAÇO */
    #sleep-warning {
      position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
      background: #e53935; padding: 15px 30px; border-radius: 12px; color: #fff;
      font-weight: bold; font-size: 18px; text-align: center; z-index: 500; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* ================= MARCAS LARFORYOU ================= */
    .watermark { position: fixed; bottom: 35px; left: 15px; font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.6); text-shadow: 1px 1px 3px rgba(0,0,0,0.8); z-index: 9999; pointer-events: none; letter-spacing: 1px; }
    .copyright { position: fixed; bottom: 8px; width: 100%; text-align: center; font-size: 12px; color: rgba(255,255,255,0.5); z-index: 9999; pointer-events: none; }
  </style>
</head>
<body>

  <!-- MARCAS -->
  <div class="watermark">Larforyou&reg;</div>
  <div class="copyright">&copy; 2024 Larforyou&reg; - Marca Registada. Todos os direitos reservados.</div>

  <!-- ================= DASHBOARD DE LOGIN / REGISTO ================= -->
  <div id="login-screen">
    <div class="login-box">
      <h1 class="login-title">ZAP <span>FLAGS</span></h1>
      
      <!-- ABAS PRINCIPAIS -->
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="btn-main-jg" class="tab-btn active" style="background:#4CAF50; color:#fff;" onclick="setMainTab('JG')">JOGADOR</button>
        <button id="btn-main-pr" class="tab-btn" onclick="setMainTab('PR')">EMPRESA / PR</button>
      </div>

      <!-- JOGADOR -->
      <div id="area-jg">
        <div class="tab-container">
          <button id="tab-jg-in" class="tab-btn active" onclick="setSubTab('JG', 'in')">ENTRAR</button>
          <button id="tab-jg-up" class="tab-btn" onclick="setSubTab('JG', 'up')">CRIAR CONTA</button>
        </div>
        
        <div id="jg-in">
          <input type="email" id="jg-email" placeholder="O teu E-mail" />
          <input type="password" id="jg-pass" placeholder="Senha" />
          <div style="text-align:right;"><a href="#" onclick="alert('Recuperação em breve.')">Esqueci a senha?</a></div>
          <button class="btn-main" onclick="validateAndEnter('JG')">ENTRAR NO JOGO</button>
          <div id="msg-jg" class="auth-msg"></div>
        </div>

        <div id="jg-up" class="hidden">
          <input type="text" id="jg-reg-name" placeholder="* Nome do Jogador" />
          <input type="email" id="jg-reg-email" placeholder="* E-mail" />
          <div class="form-grid">
            <input type="password" id="jg-reg-pass1" placeholder="* Criar Senha" />
            <input type="password" id="jg-reg-pass2" placeholder="* Confirmar Senha" />
          </div>
          <input type="text" placeholder="Telefone (Opcional)" />
          <button class="btn-main" onclick="registerUser('JG')">REGISTAR E JOGAR</button>
          <div id="msg-jg-up" class="auth-msg"></div>
        </div>
      </div>

      <!-- EMPRESA (NIF e Dados) -->
      <div id="area-pr" class="hidden">
        <div class="tab-container">
          <button id="tab-pr-in" class="tab-btn active" onclick="setSubTab('PR', 'in')">ENTRAR</button>
          <button id="tab-pr-up" class="tab-btn" onclick="setSubTab('PR', 'up')">REGISTAR EMPRESA</button>
        </div>
        
        <div id="pr-in">
          <input type="email" id="pr-email" placeholder="E-mail da Empresa" />
          <input type="password" id="pr-pass" placeholder="Senha" />
          <div style="text-align:right;"><a href="#" onclick="alert('Recuperação em breve.')">Esqueci a senha?</a></div>
          <button class="btn-main" onclick="validateAndEnter('PR')">ENTRAR NA ÁREA PR</button>
          <div id="msg-pr" class="auth-msg"></div>
        </div>

        <div id="pr-up" class="hidden">
          <div style="font-size:12px; color:#81c784; margin-bottom:10px; text-align:center;">Dados para faturação (* Obrigatório)</div>
          <input type="text" id="pr-reg-name" placeholder="* Nome da Empresa / Loja" />
          <div class="form-grid">
            <input type="text" id="pr-reg-nif" placeholder="* NIF" />
            <input type="text" id="pr-reg-phone" placeholder="* Telefone" />
          </div>
          <input type="email" id="pr-reg-email" placeholder="* E-mail (Para Login)" />
          <div class="form-grid">
            <input type="password" id="pr-reg-pass1" placeholder="* Criar Senha" />
            <input type="password" id="pr-reg-pass2" placeholder="* Confirmar" />
          </div>
          <input type="text" id="pr-reg-address" placeholder="* Morada / Rua" />
          <div class="form-grid">
            <input type="text" id="pr-reg-zip" placeholder="* Cód. Postal" />
            <input type="text" id="pr-reg-city" placeholder="* Cidade" />
          </div>
          <button class="btn-main" onclick="registerUser('PR')">CONCLUIR REGISTO</button>
          <div id="msg-pr-up" class="auth-msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= MUNDO AVATAR LIFE (Gráficos Bonitos) ================= -->
  <div id="game-screen" class="hidden">
    
    <!-- Mundo que se move -->
    <div id="world"></div>

    <!-- Top Bar (Barras de Status) -->
    <div id="top-bar">
      <div class="stat">Energia <br><span id="v-ener">100</span>%<div class="stat-bar"><div id="b-ener" class="stat-fill"></div></div></div>
      <div class="stat">Fome <br><span id="v-fome">100</span>%<div class="stat-bar"><div id="b-fome" class="stat-fill" style="background:#ff9800;"></div></div></div>
      <div class="stat">Humor <br><span id="v-humo">100</span>%<div class="stat-bar"><div id="b-humo" class="stat-fill" style="background:#03a9f4;"></div></div></div>
      <div class="stat">Moedas <br><span id="v-moed" style="color:#ffd54f; font-size:16px;">150</span></div>
    </div>

    <!-- Avatar -->
    <div id="avatar-container">
      <div class="radius-circle"></div>
      <div class="avatar-body" id="avatar-body">😊</div>
      <div class="legs">
        <div class="leg" id="leg-l"></div>
        <div class="leg" id="leg-r"></div>
      </div>
    </div>

    <!-- Aviso de Cansaço -->
    <div id="sleep-warning">😴 Estou cansado, preciso dormir 15 minutos!</div>

    <!-- D-Pad -->
    <div id="right-controls">
      <div></div>
      <button class="dpad-btn" onmousedown="press('Up')" onmouseup="release('Up')" ontouchstart="press('Up')" ontouchend="release('Up')">▲</button>
      <div></div>
      <button class="dpad-btn" onmousedown="press('Left')" onmouseup="release('Left')" ontouchstart="press('Left')" ontouchend="release('Left')">◀</button>
      <button class="dpad-btn" onmousedown="press('Down')" onmouseup="release('Down')" ontouchstart="press('Down')" ontouchend="release('Down')">▼</button>
      <button class="dpad-btn" onmousedown="press('Right')" onmouseup="release('Right')" ontouchstart="press('Right')" ontouchend="release('Right')">▶</button>
    </div>
  </div>

  <script>
    // ================= LÓGICA DO LOGIN / REGISTO =================
    function setMainTab(type) {
      document.getElementById('area-jg').classList.toggle('hidden', type !== 'JG');
      document.getElementById('area-pr').classList.toggle('hidden', type !== 'PR');
      document.getElementById('btn-main-jg').style.background = type === 'JG' ? '#4CAF50' : 'transparent';
      document.getElementById('btn-main-jg').style.color = type === 'JG' ? '#fff' : '#aaa';
      document.getElementById('btn-main-pr').style.background = type === 'PR' ? '#4CAF50' : 'transparent';
      document.getElementById('btn-main-pr').style.color = type === 'PR' ? '#fff' : '#aaa';
    }

    function setSubTab(type, sub) {
      document.getElementById(type.toLowerCase() + '-in').classList.toggle('hidden', sub !== 'in');
      document.getElementById(type.toLowerCase() + '-up').classList.toggle('hidden', sub !== 'up');
      document.getElementById('tab-' + type.toLowerCase() + '-in').className = sub === 'in' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('tab-' + type.toLowerCase() + '-up').className = sub === 'up' ? 'tab-btn active' : 'tab-btn';
    }

    function registerUser(type) {
      if (type === 'JG') {
        const name = document.getElementById('jg-reg-name').value;
        const email = document.getElementById('jg-reg-email').value;
        const p1 = document.getElementById('jg-reg-pass1').value;
        const p2 = document.getElementById('jg-reg-pass2').value;
        const msg = document.getElementById('msg-jg-up');
        
        if(!name || !email || !p1) { msg.innerText = "Preencha os campos obrigatórios."; return; }
        if(p1 !== p2) { msg.innerText = "As senhas não coincidem."; return; }
        
        launchGame();
      } else {
        const nif = document.getElementById('pr-reg-nif').value;
        const p1 = document.getElementById('pr-reg-pass1').value;
        const p2 = document.getElementById('pr-reg-pass2').value;
        const msg = document.getElementById('msg-pr-up');

        if(!nif || !p1) { msg.innerText = "Preencha todos os campos obrigatórios (*)."; return; }
        if(p1 !== p2) { msg.innerText = "As senhas não coincidem."; return; }

        alert("Empresa Registada com Sucesso! Dashboard em breve.");
      }
    }

    function validateAndEnter(type) {
      const msg = document.getElementById(type === 'JG' ? 'msg-jg' : 'msg-pr');
      const email = document.getElementById(type === 'JG' ? 'jg-email' : 'pr-email').value;
      const pass = document.getElementById(type === 'JG' ? 'jg-pass' : 'pr-pass').value;

      if(!email || !pass) { msg.innerText = "Preencha o e-mail e a senha."; return; }

      if (type === 'JG') launchGame();
      else alert("Bem-vindo à área de Empresa! (Dashboard de Faturação em desenvolvimento)");
    }

    function launchGame() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      initWorld();
      requestAnimationFrame(gameLoop);
    }

    // ================= MOTOR DO JOGO (AVATAR LIFE) =================
    const worldSize = 2500;
    let avatarX = 1250, avatarY = 1250;
    const speed = 5;
    
    let energy = 100, hunger = 100, mood = 100, coins = 150;
    let isExhausted = false;

    const keys = { Up: false, Down: false, Left: false, Right: false };
    let stepCount = 0;

    function initWorld() {
      const world = document.getElementById('world');
      const emojis = ['🌳', '🏡', '🌸', '🪨', '🌻', '🍄', '⛲', '🌲'];
      for (let i = 0; i < 150; i++) {
        let el = document.createElement('div');
        el.className = 'decor';
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * worldSize + 'px';
        el.style.top = Math.random() * worldSize + 'px';
        world.appendChild(el);
      }
    }

    // Teclado do PC
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowUp' || e.key === 'w') keys.Up = true;
      if(e.key === 'ArrowDown' || e.key === 's') keys.Down = true;
      if(e.key === 'ArrowLeft' || e.key === 'a') keys.Left = true;
      if(e.key === 'ArrowRight' || e.key === 'd') keys.Right = true;
    });
    window.addEventListener('keyup', (e) => {
      if(e.key === 'ArrowUp' || e.key === 'w') keys.Up = false;
      if(e.key === 'ArrowDown' || e.key === 's') keys.Down = false;
      if(e.key === 'ArrowLeft' || e.key === 'a') keys.Left = false;
      if(e.key === 'ArrowRight' || e.key === 'd') keys.Right = false;
    });

    // Mobile D-PAD
    function press(dir) { keys[dir] = true; }
    function release(dir) { keys[dir] = false; }

    function gameLoop() {
      if (isExhausted) return;

      let isMoving = false;
      let moveX = 0, moveY = 0;

      if (keys.Up) { moveY -= speed; isMoving = true; }
      if (keys.Down) { moveY += speed; isMoving = true; }
      if (keys.Left) { moveX -= speed; isMoving = true; }
      if (keys.Right) { moveX += speed; isMoving = true; }

      if (avatarX + moveX > 30 && avatarX + moveX < worldSize - 30) avatarX += moveX;
      if (avatarY + moveY > 30 && avatarY + moveY < worldSize - 30) avatarY += moveY;

      // Animar Pernas e Corpo
      const legL = document.getElementById('leg-l');
      const legR = document.getElementById('leg-r');
      const body = document.getElementById('avatar-body');

      if (isMoving) {
        stepCount += 0.4;
        legL.style.transform = `translateY(${Math.sin(stepCount) * 8}px)`;
        legR.style.transform = `translateY(${Math.cos(stepCount) * 8}px)`;
        body.innerText = '🚶';
        
        if (keys.Left) body.style.transform = "rotate(-15deg)";
        else if (keys.Right) body.style.transform = "rotate(15deg)";
        else body.style.transform = "rotate(0deg)";

        if (Math.random() < 0.015) drainStats();
      } else {
        legL.style.transform = 'translateY(0px)';
        legR.style.transform = 'translateY(0px)';
        body.innerText = '😊';
        body.style.transform = "rotate(0deg)";
      }

      // Mover a câmara
      const world = document.getElementById('world');
      world.style.transform = `translate(${window.innerWidth/2 - avatarX}px, ${window.innerHeight/2 - avatarY}px)`;

      requestAnimationFrame(gameLoop);
    }

    function drainStats() {
      if (energy > 0) energy -= 1;
      if (hunger > 0) hunger -= 0.5;
      updateBars();
      
      if (energy <= 0) {
        isExhausted = true;
        document.getElementById('sleep-warning').style.display = 'block';
        setTimeout(() => {
          energy = 100;
          isExhausted = false;
          document.getElementById('sleep-warning').style.display = 'none';
          updateBars();
          gameLoop(); 
        }, 5000); 
      }
    }

    function updateBars() {
      document.getElementById('v-ener').innerText = Math.floor(energy);
      document.getElementById('b-ener').style.width = energy + '%';
      document.getElementById('v-fome').innerText = Math.floor(hunger);
      document.getElementById('b-fome').style.width = hunger + '%';
      document.getElementById('v-humo').innerText = Math.floor(mood);
      document.getElementById('b-humo').style.width = mood + '%';
    }
  </script>
</body>
</html>
