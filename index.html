<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZAP FLAGS - Avatar</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;}

/* MAPA ocupa tudo */
#mapa{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  /* desactivar eventos de toque no mapa — só via joystick */
}

/* OVERLAY ESCURO (fog of war) */
#fog{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}

/* AVATAR — move-se pelo ecrã */
#avatar-wrap{
  position:fixed;z-index:10;
  pointer-events:none;
  transition:left .08s linear, top .08s linear;
}

/* CÍRCULO DE VISÃO à volta do avatar */
#circulo{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(0,255,0,.6);
  transform:translate(-50%,-50%);
  top:50%;left:50%;
  pointer-events:none;
  transition:width .6s ease,height .6s ease;
  box-shadow:0 0 0 4000px rgba(0,0,0,.72),
             0 0 20px rgba(0,255,0,.3);
}

/* SVG AVATAR */
#avt{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:52px;height:64px;
  z-index:11;
  filter:drop-shadow(0 0 8px #0f0);
}

/* ===== JOYSTICK / CAIXA DE CONTROLO ===== */
#caixa-controlo{
  position:fixed;z-index:100;
  background:rgba(0,0,0,.82);
  border:2px solid #0f0;
  border-radius:12px;
  padding:10px;
  cursor:move;
  user-select:none;
  box-shadow:0 0 15px rgba(0,255,0,.3);
  /* posição inicial */
  bottom:20px;right:20px;
  width:auto;
}
#caixa-titulo{
  font-size:.7rem;color:#0aa;text-align:center;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
}
#btns-dir{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}
.btn-dir{
  background:#0a1a0a;border:1px solid #0f0;color:#0f0;
  border-radius:6px;font-size:1.1rem;font-weight:bold;
  cursor:pointer;user-select:none;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;
  /* tamanho dinâmico */
  width:var(--tam-btn,44px);height:var(--tam-btn,44px);
}
.btn-dir:active,.btn-dir.ativo{background:#0f3a0f;border-color:#0ff;color:#0ff;
  box-shadow:0 0 8px #0ff;}
#btn-tamanho-mais,.btn-tam{
  background:#001a1a;border:1px solid #0aa;color:#0aa;
  border-radius:6px;font-size:.8rem;font-weight:bold;
  cursor:pointer;padding:3px 8px;
}
.btn-tam:hover{background:#003a3a;border-color:#0ff;color:#0ff;}

/* LINHA DE TAMANHO A+/A- */
#linha-tam{display:flex;gap:4px;margin-top:6px;justify-content:center;align-items:center;}

/* HUD TOPO */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(0,0,0,.88);border-bottom:2px solid #0f0;
  padding:6px 12px;display:flex;justify-content:space-between;align-items:center;
}
.hud-stat{font-size:.72rem;color:#0aa;text-align:center;}
.hud-val{font-size:.9rem;color:#0ff;font-weight:bold;display:block;}

/* PAINEL SKILL (lateral) */
#painel-skill{
  position:fixed;left:10px;top:50%;transform:translateY(-50%);
  z-index:50;background:rgba(0,0,0,.88);border:1px solid #0f0;
  border-radius:8px;padding:10px;font-size:.72rem;min-width:120px;
}
.ps-linha{display:flex;justify-content:space-between;
  padding:3px 0;border-bottom:1px solid #0a1a0a;}
.ps-linha:last-child{border-bottom:none;}
.ps-l{color:#0aa;}.ps-v{color:#0ff;font-weight:bold;}

/* BARRA PROGRESSO SKILL */
#barra-sk{height:8px;background:#111;border-radius:4px;border:1px solid #0f0;
  overflow:hidden;margin-top:6px;}
#barra-sk-fill{height:100%;background:linear-gradient(90deg,#0f0,#0ff);
  border-radius:4px;transition:width .4s;}
#barra-sk-label{font-size:.62rem;color:#555;margin-top:3px;text-align:center;}

/* NOTIFICAÇÃO */
#notif{
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  z-index:200;background:#000;border:2px solid #0ff;border-radius:10px;
  padding:10px 20px;text-align:center;display:none;pointer-events:none;
}

/* GPS */
#gps-info{
  position:fixed;bottom:5px;left:50%;transform:translateX(-50%);
  z-index:50;font-size:.65rem;color:#555;
  background:rgba(0,0,0,.7);border-radius:12px;padding:2px 8px;
}

/* SKILL LEVEL TAG */
#skill-tag{
  position:fixed;bottom:5px;left:10px;z-index:50;
  background:rgba(0,0,0,.8);border:1px solid #0f0;border-radius:8px;
  padding:4px 10px;font-size:.72rem;color:#0f0;
}

/* MAPA não deve capturar eventos de teclado */
.leaflet-container{outline:none;}
</style>
</head>
<body>

<!-- MAPA -->
<div id="mapa"></div>

<!-- FOG OF WAR -->
<canvas id="fog"></canvas>

<!-- AVATAR (move-se no ecrã) -->
<div id="avatar-wrap">
  <!-- CÍRCULO DE VISÃO -->
  <div id="circulo"></div>

  <!-- AVATAR SVG -->
  <svg id="avt" viewBox="0 0 52 64" xmlns="http://www.w3.org/2000/svg">
    <!-- SOMBRA -->
    <ellipse cx="26" cy="61" rx="11" ry="3" fill="rgba(0,0,0,.5)"/>

    <!-- CORPO GRUPO -->
    <g id="g-corpo">
      <!-- PERNAS -->
      <g id="g-perna-e" style="transform-origin:23px 42px">
        <rect x="19" y="40" width="7" height="16" rx="3.5" fill="#0a4a0a"/>
        <ellipse cx="22" cy="55" rx="6" ry="3" fill="#083a08"/>
      </g>
      <g id="g-perna-d" style="transform-origin:29px 42px">
        <rect x="26" y="40" width="7" height="16" rx="3.5" fill="#0a4a0a"/>
        <ellipse cx="30" cy="55" rx="6" ry="3" fill="#083a08"/>
      </g>
      <!-- TORSO -->
      <rect x="17" y="26" width="18" height="16" rx="5" fill="#0d6a0d"/>
      <rect x="21" y="29" width="10" height="2" rx="1" fill="#0ff" opacity=".5"/>
      <rect x="21" y="33" width="10" height="1.5" rx=".75" fill="#0ff" opacity=".3"/>
      <!-- BRAÇOS -->
      <g id="g-braco-e" style="transform-origin:17px 28px">
        <rect x="9" y="26" width="8" height="12" rx="4" fill="#0b5a0b"/>
        <circle cx="13" cy="39" r="3.5" fill="#094a09"/>
      </g>
      <g id="g-braco-d" style="transform-origin:35px 28px">
        <rect x="35" y="26" width="8" height="12" rx="4" fill="#0b5a0b"/>
        <circle cx="39" cy="39" r="3.5" fill="#094a09"/>
      </g>
      <!-- PESCOÇO -->
      <rect x="23" y="22" width="6" height="6" rx="3" fill="#0b5a0b"/>
      <!-- CABEÇA -->
      <g id="g-cabeca" style="transform-origin:26px 15px">
        <!-- Base -->
        <circle cx="26" cy="15" r="11" fill="#0d6a0d"/>
        <!-- Capacete -->
        <ellipse cx="26" cy="5.5" rx="10" ry="4.5" fill="#050"/>
        <rect x="16" y="5" width="20" height="5" rx="2" fill="#050"/>
        <!-- Viseira -->
        <rect x="18" y="10" width="16" height="3.5" rx="1.75" fill="#0ff" opacity=".55"/>
        <!-- Olhos -->
        <circle cx="21" cy="16" r="3" fill="#000"/>
        <circle cx="31" cy="16" r="3" fill="#000"/>
        <circle cx="21" cy="16" r="1.8" fill="#0ff" id="olho-e"/>
        <circle cx="31" cy="16" r="1.8" fill="#0ff" id="olho-d"/>
        <circle cx="21.8" cy="15.2" r=".7" fill="#fff"/>
        <circle cx="31.8" cy="15.2" r=".7" fill="#fff"/>
        <!-- Boca -->
        <path d="M 22 20 Q 26 22.5 30 20" stroke="#0ff" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".6"/>
        <!-- Antena -->
        <line x1="26" y1="4" x2="26" y2="0" stroke="#0f0" stroke-width="1.5"/>
        <circle cx="26" cy="0" r="2.5" fill="#0ff">
          <animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite"/>
          <animate attributeName="r" values="2.5;3.5;2.5" dur="1.4s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </svg>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-stat">👤 <span class="hud-val" id="hud-nome">Jogador</span></div>
  <div class="hud-stat">🏴 <span class="hud-val" id="hud-flags">0</span></div>
  <div class="hud-stat">⚡ <span class="hud-val" id="hud-en">100%</span></div>
  <div class="hud-stat">🎯 Skill <span class="hud-val" id="hud-skill">0</span></div>
  <div class="hud-stat">👁️ <span class="hud-val" id="hud-visao">5m</span></div>
</div>

<!-- PAINEL SKILL -->
<div id="painel-skill">
  <div style="color:#0f0;font-weight:bold;text-align:center;margin-bottom:6px;font-size:.78rem;">📊 PROGRESSO</div>
  <div class="ps-linha"><span class="ps-l">Nível</span><span class="ps-v" id="ps-nivel">1</span></div>
  <div class="ps-linha"><span class="ps-l">Skill</span><span class="ps-v" id="ps-skill">0</span></div>
  <div class="ps-linha"><span class="ps-l">Visão</span><span class="ps-v" id="ps-visao">5m</span></div>
  <div class="ps-linha"><span class="ps-l">Flags</span><span class="ps-v" id="ps-flags">0</span></div>
  <div class="ps-linha"><span class="ps-l">Prox. Skill</span><span class="ps-v" id="ps-prox">500</span></div>
  <div id="barra-sk"><div id="barra-sk-fill" style="width:0%"></div></div>
  <div id="barra-sk-label">0 / 500 flags</div>
</div>

<!-- CAIXA DE CONTROLO (arrastável) -->
<div id="caixa-controlo">
  <div id="caixa-titulo">
    <span>🕹️ MOVIMENTO</span>
    <span style="cursor:move;color:#555;" title="Arrasta para mover">⠿</span>
  </div>
  <div id="btns-dir">
    <div></div>
    <div class="btn-dir" id="btn-cima"    data-dir="cima"    onpointerdown="pressDir('cima')"    onpointerup="soltarDir('cima')"   ontouchstart="pressDir('cima')" ontouchend="soltarDir('cima')">▲</div>
    <div></div>
    <div class="btn-dir" id="btn-esq"     data-dir="esq"     onpointerdown="pressDir('esq')"     onpointerup="soltarDir('esq')"    ontouchstart="pressDir('esq')"  ontouchend="soltarDir('esq')">◄</div>
    <div class="btn-dir" id="btn-centro"  style="font-size:.65rem;color:#555;">STOP</div>
    <div class="btn-dir" id="btn-dir"     data-dir="dir"     onpointerdown="pressDir('dir')"     onpointerup="soltarDir('dir')"    ontouchstart="pressDir('dir')"  ontouchend="soltarDir('dir')">►</div>
    <div></div>
    <div class="btn-dir" id="btn-baixo"   data-dir="baixo"   onpointerdown="pressDir('baixo')"   onpointerup="soltarDir('baixo')"  ontouchstart="pressDir('baixo')" ontouchend="soltarDir('baixo')">▼</div>
    <div></div>
  </div>
  <div id="linha-tam">
    <button class="btn-tam" onclick="mudarTamBtn(-1)" title="Diminuir botões">A−</button>
    <span style="font-size:.65rem;color:#555;" id="tam-label">44px</span>
    <button class="btn-tam" onclick="mudarTamBtn(+1)" title="Aumentar botões">A+</button>
  </div>
</div>

<!-- NOTIFICAÇÃO -->
<div id="notif">
  <div style="font-size:1.1rem;" id="notif-ico">🎯</div>
  <div style="color:#0ff;font-weight:bold;" id="notif-txt">---</div>
  <div style="color:#0aa;font-size:.75rem;" id="notif-sub">---</div>
</div>

<!-- GPS -->
<div id="gps-info">📡 GPS: a iniciar...</div>
<div id="skill-tag">👁️ 5m visão · Skill 0</div>

<script>
'use strict';

// ============================================================
// SISTEMA DE SKILL / VISÃO
// ============================================================
/*
  REGRAS DO SKILL:
  - Cada nível de skill requer o dobro de bandeiras com energia do anterior
  - Nível 1:  500 bandeiras → +1 skill
  - Nível 2: 1000 bandeiras → +1 skill
  - Nível 3: 2000 bandeiras → +1 skill
  - Nível 4: 4000 bandeiras → +1 skill
  - ...sempre a dobrar

  VISÃO:
  - 10 skill = 1 metro de visão
  - Começa em 5 metros (0 skill)
  - Máximo 100 metros (950 skill)
*/

const VISAO_MIN = 5;
const VISAO_MAX = 100;
const SKILL_POR_METRO = 10; // 10 skill = 1 metro

// Limites de flags por nível de skill (500, 1000, 2000, 4000...)
function flagsParaProxSkill(skillAtual){
  // Primeiro nível = 500, depois dobra sempre
  return 500 * Math.pow(2, skillAtual);
}

function calcularVisao(skill){
  const metros = VISAO_MIN + Math.floor(skill / SKILL_POR_METRO);
  return Math.min(VISAO_MAX, metros);
}

// ============================================================
// ESTADO
// ============================================================
const G = id => document.getElementById(id);

let av = {
  // Posição no ECRÃ (px)
  x: window.innerWidth  / 2,
  y: window.innerHeight / 2,
  // Posição no MUNDO (lat/lng)
  lat: 39.5,
  lng: -8.0,
  // Stats
  nome:       'Jogador',
  flags:      0,          // total de flags apanhadas
  flagsEnerg: 0,          // flags com energia (para skill)
  skill:      0,
  energia:    100,
  visao:      VISAO_MIN,
  nivel:      1,
  // Movimento
  vx: 0, vy: 0,
  velocidade: 2,          // px por frame
  andando: false,
  dir: 1,                 // 1=dir, -1=esq
};

// Threshold de flags para o próximo skill
let flagsLimiteSkill = flagsParaProxSkill(0); // 500

// ============================================================
// MAPA LEAFLET
// ============================================================
let mapaL    = null;
let watchGPS = null;
let gpsFunciona = false;

function iniciarMapa(){
  mapaL = L.map('mapa',{
    center:[av.lat, av.lng],
    zoom:18,
    zoomControl:true,
    attributionControl:false,
    // IMPORTANTE: desactivar interacções de toque/rato no mapa
    // O avatar move-se → o mapa segue o avatar
    dragging:false,
    touchZoom:true,
    scrollWheelZoom:true,
    doubleClickZoom:false,
    keyboard:false,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap', maxZoom:20
  }).addTo(mapaL);

  // Colocar algumas bandeiras no mapa para apanhar
  colocarBandeirasDemo();

  // GPS
  iniciarGPS();
}

// ============================================================
// GPS (posição inicial)
// ============================================================
function iniciarGPS(){
  if(!navigator.geolocation){
    G('gps-info').innerText='❌ GPS não suportado — demo';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      gpsFunciona=true;
      av.lat=pos.coords.latitude;
      av.lng=pos.coords.longitude;
      mapaL.setView([av.lat,av.lng],18);
      G('gps-info').innerText=`✅ GPS: ${av.lat.toFixed(5)}, ${av.lng.toFixed(5)}`;
      // Recolocar bandeiras na posição real
      mapaL.eachLayer(l=>{if(l._icone_bandeira) mapaL.removeLayer(l);});
      colocarBandeirasDemo();
    },
    ()=>{ G('gps-info').innerText='⚠️ GPS indisponível — modo demo'; },
    {enableHighAccuracy:true,timeout:8000}
  );
}

// ============================================================
// BANDEIRAS DEMO NO MAPA
// ============================================================
const bandeirasNoMapa = [];

function colocarBandeirasDemo(){
  // Colocar 20 bandeiras em volta do ponto inicial
  for(let i=0;i<20;i++){
    const ang  = Math.random()*2*Math.PI;
    const dist = 30+Math.random()*120; // metros
    const dLat = (dist/111000)*Math.cos(ang);
    const dLng = (dist/(111000*Math.cos(av.lat*Math.PI/180)))*Math.sin(ang);
    const lat2 = av.lat+dLat;
    const lng2 = av.lng+dLng;
    const temEnergia = Math.random()>0.4;

    criarBandeira(lat2,lng2,temEnergia);
  }
}

function criarBandeira(lat,lng,temEnergia){
  const cor  = temEnergia?'#0ff':'#f00';
  const emj  = temEnergia?'⚡':'🏴';
  const ic   = L.divIcon({className:'',
    html:`<div style="background:${cor};color:#000;width:22px;height:22px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:.8rem;
      border:2px solid #fff;box-shadow:0 0 8px ${cor};cursor:pointer;">${emj}</div>`,
    iconSize:[22,22],iconAnchor:[11,11]
  });
  const m = L.marker([lat,lng],{icon:ic}).addTo(mapaL);
  m._icone_bandeira = true;
  m._temEnergia = temEnergia;
  bandeirasNoMapa.push({marker:m,lat,lng,energia:temEnergia,apanhada:false});
}

// VERIFICAR SE O AVATAR APANHOU ALGUMA BANDEIRA
function verificarApanharBandeiras(){
  const raioApanhar = 15; // metros — avatar apanha bandeiras neste raio
  bandeirasNoMapa.forEach(b=>{
    if(b.apanhada) return;
    const dx = (av.lng-b.lng)*111000*Math.cos(av.lat*Math.PI/180);
    const dy = (av.lat-b.lat)*111000;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist<raioApanhar){
      b.apanhada=true;
      mapaL.removeLayer(b.marker);
      av.flags++;
      if(b.energia){
        av.flagsEnerg++;
        av.energia=Math.min(100,av.energia+5);
        verificarSkill();
      }
      actualizarHUD();
      // Repor nova bandeira após 5s
      setTimeout(()=>{
        const ang=Math.random()*2*Math.PI;
        const d=40+Math.random()*100;
        const la=av.lat+(d/111000)*Math.cos(ang);
        const lo=av.lng+(d/(111000*Math.cos(av.lat*Math.PI/180)))*Math.sin(ang);
        b.lat=la; b.lng=lo; b.apanhada=false; b.energia=Math.random()>0.4;
        criarBandeiraNova(b);
      },5000);
    }
  });
}

function criarBandeiraNova(b){
  const cor=b.energia?'#0ff':'#f00';
  const emj=b.energia?'⚡':'🏴';
  const ic=L.divIcon({className:'',
    html:`<div style="background:${cor};color:#000;width:22px;height:22px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:.8rem;
      border:2px solid #fff;box-shadow:0 0 8px ${cor};">${emj}</div>`,
    iconSize:[22,22],iconAnchor:[11,11]
  });
  b.marker=L.marker([b.lat,b.lng],{icon:ic}).addTo(mapaL);
  b.marker._icone_bandeira=true;
  b.marker._temEnergia=b.energia;
}

// ============================================================
// SISTEMA DE SKILL (verificar progresso)
// ============================================================
function verificarSkill(){
  if(av.flagsEnerg >= flagsLimiteSkill){
    // Ganhar 1 ponto de skill
    av.flagsEnerg -= flagsLimiteSkill;
    av.skill++;
    flagsLimiteSkill = flagsParaProxSkill(av.skill);
    const novaVisao = calcularVisao(av.skill);
    const visaoAnt  = av.visao;
    av.visao = novaVisao;
    av.nivel = Math.floor(av.skill/10)+1;

    // Notificação
    let txt = `🎯 Skill ${av.skill} alcançado!`;
    let sub = `Próximo: ${flagsLimiteSkill.toLocaleString('pt-PT')} bandeiras`;
    if(novaVisao > visaoAnt){
      txt = `👁️ Visão aumentou para ${novaVisao}m!`;
      sub = `Skill ${av.skill} · Próxima visão com mais ${SKILL_POR_METRO} skill`;
    }
    mostrarNotif('🎯',txt,sub);
    actualizarCirculo();
    actualizarFog();
    G('skill-tag').innerText=`👁️ ${novaVisao}m visão · Skill ${av.skill}`;
  }
  actualizarPainel();
}

// ============================================================
// MOVIMENTO DO AVATAR
// ============================================================
const teclasPremidas = new Set();
const dirAtiva = {cima:false,baixo:false,esq:false,dir:false};

// Teclado
document.addEventListener('keydown', e=>{
  const m = {ArrowUp:'cima',ArrowDown:'baixo',ArrowLeft:'esq',ArrowRight:'dir',
              'w':'cima','s':'baixo','a':'esq','d':'dir'};
  if(m[e.key]){ dirAtiva[m[e.key]]=true; e.preventDefault(); }
});
document.addEventListener('keyup', e=>{
  const m = {ArrowUp:'cima',ArrowDown:'baixo',ArrowLeft:'esq',ArrowRight:'dir',
              'w':'cima','s':'baixo','a':'esq','d':'dir'};
  if(m[e.key]){ dirAtiva[m[e.key]]=false; }
});

// Botões tácteis / rato
function pressDir(d){ dirAtiva[d]=true;  G('btn-'+d)?.classList.add('ativo'); }
function soltarDir(d){ dirAtiva[d]=false; G('btn-'+d)?.classList.remove('ativo'); }

// Tamanho dos botões
let tamBtn = 44;
function mudarTamBtn(delta){
  tamBtn = Math.max(32, Math.min(80, tamBtn+delta*6));
  document.documentElement.style.setProperty('--tam-btn', tamBtn+'px');
  G('tam-label').innerText = tamBtn+'px';
  document.querySelectorAll('.btn-dir').forEach(b=>{ b.style.width=tamBtn+'px'; b.style.height=tamBtn+'px'; });
}

// ============================================================
// LOOP PRINCIPAL
// ============================================================
let animT = 0;
let ultimoFrame = 0;

function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min(ts-ultimoFrame, 50);
  ultimoFrame = ts;
  animT += dt * 0.001;

  // Calcular velocidade
  const vel = av.velocidade * (dt/16);
  let mx=0, my=0;

  if(dirAtiva.cima)  my -= vel;
  if(dirAtiva.baixo) my += vel;
  if(dirAtiva.esq)   mx -= vel;
  if(dirAtiva.dir)   mx += vel;

  // Diagonal normalizada
  if(mx!==0 && my!==0){ mx*=0.707; my*=0.707; }

  const andando = mx!==0||my!==0;
  av.andando=andando;
  if(mx>0) av.dir=1;
  else if(mx<0) av.dir=-1;

  if(andando){
    // Mover avatar no ECRÃ
    av.x = Math.max(30, Math.min(window.innerWidth-30,  av.x+mx));
    av.y = Math.max(60, Math.min(window.innerHeight-30, av.y+my));

    // Converter movimento px → lat/lng e mover o mapa
    const zoom   = mapaL.getZoom();
    const lat    = av.lat;
    const escala = 156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,zoom);
    // mx px → metros → graus
    const dLng = (mx * escala) / 111319.9;
    const dLat = (-my * escala) / 111319.9;
    av.lat += dLat;
    av.lng += dLng;

    // MAPA segue o avatar
    mapaL.panBy([-mx,-my],{animate:false});

    verificarApanharBandeiras();
  }

  // Posicionar avatar-wrap no ecrã
  const wrap = G('avatar-wrap');
  wrap.style.left = av.x+'px';
  wrap.style.top  = av.y+'px';

  // Animação do avatar
  animarAvatar(animT, andando);

  // Fog of war
  actualizarFogFrame();
}

// ============================================================
// ANIMAÇÃO DO AVATAR
// ============================================================
function animarAvatar(t, andando){
  const svg = G('avt');

  if(andando){
    // Andar: braços e pernas alternam
    const ang = Math.sin(t*8)*22;
    G('g-braco-e').style.transform = `rotate(${ang}deg)`;
    G('g-braco-d').style.transform = `rotate(${-ang}deg)`;
    G('g-perna-e').style.transform = `rotate(${-ang}deg)`;
    G('g-perna-d').style.transform = `rotate(${ang}deg)`;
    G('g-cabeca').style.transform  = `translateY(${Math.abs(Math.sin(t*8))*-1.5}px)`;
    G('g-corpo').style.transform   = `rotate(${Math.sin(t*8)*1.5}deg)`;
    // Espelhar se for para a esquerda
    svg.style.transform = `translate(-50%,-50%) scaleX(${av.dir})`;
    svg.style.filter    = 'drop-shadow(0 0 10px #0f0)';
  } else {
    // Respiração suave
    const resp = Math.sin(t*1.5)*1.5;
    G('g-braco-e').style.transform = `rotate(${resp}deg)`;
    G('g-braco-d').style.transform = `rotate(${-resp}deg)`;
    G('g-perna-e').style.transform = 'rotate(0deg)';
    G('g-perna-d').style.transform = 'rotate(0deg)';
    G('g-cabeca').style.transform  = `translateY(${resp*.4}px)`;
    G('g-corpo').style.transform   = 'rotate(0deg)';
    // Pulsar
    const s = 1+Math.sin(t*1.2)*.025;
    svg.style.transform = `translate(-50%,-50%) scale(${s})`;
    svg.style.filter    = `drop-shadow(0 0 ${8+Math.sin(t*1.2)*4}px #0f0)`;
  }
}

// ============================================================
// CÍRCULO DE VISÃO
// ============================================================
function actualizarCirculo(){
  const visaoM = av.visao;
  const ppm    = calcPPM();
  const raio   = Math.max(50, visaoM*ppm);
  const diam   = raio*2;
  const c = G('circulo');
  c.style.width  = diam+'px';
  c.style.height = diam+'px';
  // Cor varia
  const p = (visaoM-VISAO_MIN)/(VISAO_MAX-VISAO_MIN);
  const g2 = 255;
  const b2 = Math.round(p*255);
  const cor = `rgb(0,${g2},${b2})`;
  c.style.borderColor = cor;
  c.style.boxShadow   = `0 0 0 4000px rgba(0,0,0,.72),0 0 ${20+p*30}px ${cor}`;
}

function calcPPM(){
  if(!mapaL) return 5;
  const z   = mapaL.getZoom();
  const lat = av.lat;
  const esc = 156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,z);
  return 1/esc;
}

// ============================================================
// FOG OF WAR (Canvas)
// ============================================================
let fogCtx=null;
function iniciarFog(){
  const c=G('fog');
  fogCtx=c.getContext('2d');
  redimensionarFog();
  window.addEventListener('resize',redimensionarFog);
}
function redimensionarFog(){
  G('fog').width=window.innerWidth;
  G('fog').height=window.innerHeight;
}
function actualizarFog(){actualizarFogFrame();}
function actualizarFogFrame(){
  if(!fogCtx) return;
  const W=window.innerWidth,H=window.innerHeight;
  const cx=av.x,cy=av.y;
  const raio=Math.max(50,av.visao*calcPPM());
  fogCtx.clearRect(0,0,W,H);
  // Escurecer tudo
  fogCtx.fillStyle='rgba(0,0,0,.72)';
  fogCtx.fillRect(0,0,W,H);
  // Recortar círculo
  fogCtx.save();
  fogCtx.globalCompositeOperation='destination-out';
  fogCtx.beginPath();
  fogCtx.arc(cx,cy,raio,0,Math.PI*2);
  fogCtx.fillStyle='rgba(0,0,0,1)';
  fogCtx.fill();
  fogCtx.restore();
  // Borda suave
  fogCtx.save();
  fogCtx.globalCompositeOperation='source-over';
  const gr=fogCtx.createRadialGradient(cx,cy,raio*.7,cx,cy,raio*1.15);
  gr.addColorStop(0,'rgba(0,0,0,0)');
  gr.addColorStop(1,'rgba(0,0,0,.72)');
  fogCtx.beginPath();
  fogCtx.arc(cx,cy,raio*1.15,0,Math.PI*2);
  fogCtx.fillStyle=gr;
  fogCtx.fill();
  fogCtx.restore();
}

// ============================================================
// HUD / PAINEL
// ============================================================
function actualizarHUD(){
  G('hud-nome').innerText  = av.nome;
  G('hud-flags').innerText = av.flags.toLocaleString('pt-PT');
  G('hud-en').innerText    = Math.round(av.energia)+'%';
  G('hud-skill').innerText = av.skill;
  G('hud-visao').innerText = av.visao+'m';
}

function actualizarPainel(){
  G('ps-nivel').innerText = av.nivel;
  G('ps-skill').innerText = av.skill;
  G('ps-visao').innerText = av.visao+'m';
  G('ps-flags').innerText = av.flags.toLocaleString('pt-PT');
  G('ps-prox').innerText  = flagsLimiteSkill.toLocaleString('pt-PT');
  // Barra
  const pct = Math.min(100,(av.flagsEnerg/flagsLimiteSkill)*100);
  G('barra-sk-fill').style.width = pct+'%';
  G('barra-sk-label').innerText  = av.flagsEnerg.toLocaleString('pt-PT')+' / '+flagsLimiteSkill.toLocaleString('pt-PT')+' flags';
  actualizarHUD();
  G('skill-tag').innerText=`👁️ ${av.visao}m visão · Skill ${av.skill}`;
}

// ============================================================
// NOTIFICAÇÃO
// ============================================================
let notifTmr=null;
function mostrarNotif(ico,txt,sub){
  G('notif-ico').innerText=ico;
  G('notif-txt').innerText=txt;
  G('notif-sub').innerText=sub||'';
  G('notif').style.display='flex';
  G('notif').style.flexDirection='column';
  G('notif').style.gap='4px';
  if(notifTmr) clearTimeout(notifTmr);
  notifTmr=setTimeout(()=>G('notif').style.display='none',3500);
}

// ============================================================
// ARRASTAR A CAIXA DE CONTROLO
// ============================================================
(function arrastarCaixa(){
  const caixa=G('caixa-controlo');
  let arrastando=false,ox=0,oy=0;

  caixa.addEventListener('pointerdown',e=>{
    // Só arrastar se clicar no titulo/borda, não nos botões
    if(e.target.classList.contains('btn-dir')||e.target.classList.contains('btn-tam')) return;
    arrastando=true;
    ox=e.clientX-caixa.getBoundingClientRect().left;
    oy=e.clientY-caixa.getBoundingClientRect().top;
    caixa.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  caixa.addEventListener('pointermove',e=>{
    if(!arrastando) return;
    caixa.style.left  =(e.clientX-ox)+'px';
    caixa.style.top   =(e.clientY-oy)+'px';
    caixa.style.right ='auto';
    caixa.style.bottom='auto';
  });
  caixa.addEventListener('pointerup',()=>arrastando=false);
})();

// ============================================================
// TESTE RÁPIDO (botão para ganhar skill)
// ============================================================
window.simularFlags=function(n){
  av.flagsEnerg+=(n||500);
  av.flags+=(n||500);
  verificarSkill();
  actualizarPainel();
};

// Atalho de teclado para teste: S+K = +500 flags com energia
let keyBuf='';
document.addEventListener('keypress',e=>{
  keyBuf+=e.key;
  if(keyBuf.endsWith('sk')){simularFlags(500);keyBuf='';}
  if(keyBuf.length>10) keyBuf=keyBuf.slice(-10);
});

// ============================================================
// INICIALIZAR
// ============================================================
window.addEventListener('load',()=>{
  // Posição inicial do avatar: centro do ecrã
  av.x=window.innerWidth/2;
  av.y=window.innerHeight/2;

  // Carregar dados do jogador
  try{
    const sj=JSON.parse(localStorage.getItem('zap_sj')||'null');
    if(sj){
      av.nome  =sj.nm||'Jogador';
      av.flags =sj.fl||0;
      av.energia=sj.en||100;
      av.skill  =sj.skillPts||0;
      flagsLimiteSkill=flagsParaProxSkill(av.skill);
      av.visao =calcularVisao(av.skill);
      av.nivel =Math.floor(av.skill/10)+1;
    }
  }catch(e){}

  iniciarMapa();
  iniciarFog();

  // Posicionar avatar no centro
  const w=G('avatar-wrap');
  w.style.left=av.x+'px';
  w.style.top =av.y+'px';

  actualizarCirculo();
  actualizarPainel();

  // Iniciar loop
  requestAnimationFrame(loop);

  // Actualizar círculo e fog regularmente
  setInterval(()=>{
    actualizarCirculo();
  },500);

  // Info para o utilizador
  setTimeout(()=>{
    mostrarNotif('🕹️','Usa as setas/WASD para andar!','Apanha bandeiras ⚡ para ganhar Skill');
  },1000);
});
</script>
