<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAP FLAGS - Bandeira BINGO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Courier New',monospace;background:#000;color:#0f0;min-height:100vh;padding:15px;}
.box{max-width:580px;margin:0 auto;}

h1{font-size:1.8rem;color:#ff0;text-shadow:0 0 15px #ff0;margin-bottom:5px;}
h2{font-size:1.1rem;margin-bottom:10px;border-bottom:1px solid #ff0;padding-bottom:6px;color:#ff0;}
h3{font-size:.88rem;color:#0ff;margin:10px 0 6px;}

input,select,textarea{width:100%;background:#0a0a0a;color:#0f0;border:1px solid #0f0;
  padding:10px;margin:4px 0;font-size:.9rem;font-family:'Courier New',monospace;border-radius:4px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0ff;box-shadow:0 0 5px #0ff;}
select option{background:#0a0a0a;}
textarea{resize:vertical;min-height:65px;}
input[type=range]{border:none;background:transparent;padding:6px 0;cursor:pointer;}

.btn{display:inline-block;padding:10px 16px;margin:3px 2px;font-size:.85rem;font-weight:bold;
  cursor:pointer;font-family:'Courier New',monospace;border:none;border-radius:4px;transition:all .2s;}
.bb{display:block;width:100%;margin:5px 0;padding:12px;text-align:center;}
.bv{background:#0f0;color:#000;}.bv:hover{background:#0ff;}
.bc{background:#111;color:#0f0;border:1px solid #0f0;}.bc:hover{background:#1a1a1a;}
.bo{background:linear-gradient(45deg,#f80,#ff0);color:#000;}.bo:hover{background:#ff0;}
.br{background:#1a0000;color:#f00;border:1px solid #f00;}.br:hover{background:#300;}
.bvol{background:#000;color:#0aa;border:1px solid #0aa;}.bvol:hover{background:#0aa;color:#000;}
.bbingo{background:linear-gradient(45deg,#600,#f00,#ff0);color:#fff;border:2px solid #ff0;
  animation:bingoPulse 2s ease-in-out infinite;}
@keyframes bingoPulse{0%,100%{box-shadow:0 0 5px #ff0}50%{box-shadow:0 0 20px #ff0,0 0 40px #f00}}
.bdesativ{background:#1a0000;color:#f00;border:2px solid #f00;}.bdesativ:hover{background:#300;}
.bpurple{background:linear-gradient(45deg,#606,#90f);color:#fff;}.bpurple:hover{background:#90f;}

.msg{padding:10px;margin:6px 0;border-radius:4px;display:none;font-size:.83rem;}
.msg.e{background:#200;border:1px solid #f00;color:#f00;display:block;}
.msg.s{background:#020;border:1px solid #0f0;color:#0f0;display:block;}
.msg.i{background:#002;border:1px solid #0ff;color:#0ff;display:block;}
.msg.a{background:#220;border:1px solid #ff0;color:#ff0;display:block;}

.card{background:#080808;border:1px solid #222;border-radius:8px;padding:14px;margin:8px 0;}
.card-y{border-color:#ff0;background:#0a0800;}
.card-v{border-color:#0f0;background:#050f05;}
.card-b{border-color:#0ff;background:#00080a;}
.card-r{border-color:#f00;background:#0f0000;}
.card-p{border-color:#90f;background:#08000f;}
.card-bingo{border-color:#ff0;background:linear-gradient(135deg,#1a0000,#1a0800);}

.row{padding:5px 0;border-bottom:1px solid #111;font-size:.82rem;display:flex;
  justify-content:space-between;align-items:flex-start;gap:8px;}
.row:last-child{border-bottom:none;}
.rl{color:#0aa;font-size:.7rem;white-space:nowrap;padding-top:2px;}
.rv{text-align:right;font-size:.82rem;word-break:break-word;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0;}
.stat{background:#080808;border:1px solid #0f0;border-radius:8px;padding:10px;text-align:center;}
.stat-n{font-size:1.4rem;color:#0ff;font-weight:bold;}
.stat-t{font-size:.7rem;color:#0aa;margin-top:3px;}

/* BINGO CARD */
.bfc{border-radius:10px;padding:14px;margin:12px 0;position:relative;}
.bfc.inativa{background:#0a0500;border:2px solid #333;}
.bfc.ativa{background:#1a0800;border:2px solid #ff0;box-shadow:0 0 12px rgba(255,200,0,.3);}
.bfc.encontrada{background:#001a00;border:2px solid #0f0;}
.bfc.expirada{background:#0a0000;border:2px solid #333;opacity:.6;}

/* TIMER GRANDE */
.timer-grande{display:flex;flex-direction:column;align-items:center;background:#000;
  border:3px solid #ff0;border-radius:12px;padding:14px;margin:10px 0;text-align:center;}
.timer-display{font-size:2.8rem;color:#ff0;font-weight:bold;font-family:'Courier New',monospace;
  text-shadow:0 0 15px #ff0;letter-spacing:4px;line-height:1;}
.timer-label{font-size:.72rem;color:#0aa;margin-top:4px;}
.timer-ico-anim{font-size:2rem;animation:tick 1s ease-in-out infinite alternate;display:inline-block;}
@keyframes tick{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}

/* SLIDER TEMPO */
.slider-wrapper{background:#0a0a0a;border:1px solid #ff0;border-radius:8px;padding:12px;margin:8px 0;}
.slider-val{font-size:1.6rem;color:#ff0;font-weight:bold;text-align:center;margin:6px 0;}
.slider-sub{font-size:.72rem;color:#0aa;text-align:center;}

/* FOTO */
.foto-area{border:2px dashed #ff0;border-radius:8px;padding:20px;text-align:center;
  cursor:pointer;background:#0a0800;transition:all .2s;margin:6px 0;}
.foto-area:hover{background:#1a1000;border-color:#0ff;}
.foto-prev-img{width:100%;max-height:220px;object-fit:cover;border-radius:8px;
  border:2px solid #ff0;margin:8px 0;display:none;}

/* BADGES */
.badge-ativa   {background:#1a0800;color:#ff0;border:1px solid #ff0;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:bold;}
.badge-inativa {background:#111;color:#555;border:1px solid #333;padding:3px 10px;border-radius:12px;font-size:.72rem;}
.badge-enc     {background:#001a00;color:#0f0;border:1px solid #0f0;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:bold;}
.badge-exp     {background:#1a0000;color:#f00;border:1px solid #f00;padding:3px 10px;border-radius:12px;font-size:.72rem;}

/* QR */
.qr-wrap{background:#fff;padding:16px;border-radius:8px;text-align:center;margin:12px auto;max-width:240px;}
.qr-info{background:#0a0a0a;border:1px solid #0f0;border-radius:8px;padding:12px;margin:10px 0;}
.qr-info .row{border-color:#111;}
.qr-premio-box{background:#1a0800;border:3px solid #ff0;border-radius:10px;padding:16px;
  text-align:center;margin:10px 0;}

/* MODAL */
#movl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9000;display:none;}
#mdl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;
  border:3px solid #ff0;border-radius:12px;padding:20px;z-index:9001;
  width:95%;max-width:520px;max-height:92vh;overflow-y:auto;display:none;}

/* SEPARADOR */
.sep{border:none;border-top:1px solid #222;margin:12px 0;}

.pb{width:100%;height:10px;background:#222;border-radius:5px;margin:6px 0;overflow:hidden;}
.pf{height:100%;border-radius:5px;transition:width .5s;}
.scroll{max-height:65vh;overflow-y:auto;padding-right:3px;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:#ff0;}
.lnk{color:#0ff;cursor:pointer;text-decoration:underline;font-size:.85rem;}

/* MAPA MINI */
.mapa-mini{width:100%;height:200px;border-radius:8px;border:2px solid #ff0;margin:6px 0;}

/* EDIT INLINE */
.edit-section{background:#080808;border:1px solid #ff0;border-radius:8px;padding:12px;margin:8px 0;}
.edit-section h3{color:#ff0;margin-bottom:8px;}
</style>
</head>
<body>
<div class="box">

<!-- CABEÇALHO -->
<div style="text-align:center;margin-bottom:15px;">
  <h1>🎰 BANDEIRAS BINGO</h1>
  <p style="color:#0aa;font-size:.82rem;">Painel completo de gestão</p>
</div>

<!-- STATS -->
<div class="grid3" style="margin-bottom:12px;">
  <div class="stat" style="border-color:#ff0;"><div class="stat-n" id="st-total" style="color:#ff0;">0</div><div class="stat-t">🎰 Total</div></div>
  <div class="stat" style="border-color:#0f0;"><div class="stat-n" id="st-ativas" style="color:#0f0;">0</div><div class="stat-t">⚡ Ativas</div></div>
  <div class="stat" style="border-color:#0ff;"><div class="stat-n" id="st-enc" style="color:#0ff;">0</div><div class="stat-t">✅ Encontradas</div></div>
</div>

<!-- LISTA BANDEIRAS -->
<div id="lista-bingo"></div>

</div><!-- fim .box -->

<!-- MODAL PRINCIPAL -->
<div id="movl" onclick="fecharMdl()"></div>
<div id="mdl">
  <h2 id="mdl-tit" style="color:#ff0;border-color:#ff0;margin-bottom:12px;">---</h2>
  <div id="mdl-corpo"></div>
  <div id="mdl-m" class="msg"></div>
  <button class="btn bvol bb" onclick="fecharMdl()" style="margin-top:8px;">← FECHAR</button>
</div>

<script>
'use strict';
// ============================================================
// CONFIG
// ============================================================
const BINGO_RAIO = 250;

// ============================================================
// DB
// ============================================================
function getFlags(){try{return JSON.parse(localStorage.getItem('zap_bingo')||'[]')}catch{return[]}}
function saveFlags(l){localStorage.setItem('zap_bingo',JSON.stringify(l));}

// Empresa base (editável pelo PR na bandeira)
const empresaBase = {
  ne:'Café Central', morada:'Rua das Flores 10, 4000-100 Porto',
  lat:'41.1496', lng:'-8.6109', tel:'220 000 000',
  email:'cafe@email.pt', website:'https://cafecentral.pt',
  resp:'João Silva', respTel:'912 000 000',
};

// ============================================================
// INICIALIZAR
// ============================================================
function iniciar(){
  if(getFlags().length===0){
    const f=[];
    for(let i=0;i<10;i++){
      f.push({
        id:Date.now()+i, num:i+1, estado:'inativa',
        // PRÉMIO
        premio:'🎁 Prémio Surpresa', descricao:'', foto:null,
        // EMPRESA (cada bandeira pode ter dados próprios)
        empNome:empresaBase.ne, empMorada:empresaBase.morada,
        empLat:empresaBase.lat, empLng:empresaBase.lng,
        empTel:empresaBase.tel, empEmail:empresaBase.email,
        empWeb:empresaBase.website,
        empResp:empresaBase.resp, empRespTel:empresaBase.respTel,
        usarGPS:false,
        // TEMPO
        ativadoEm:null, duracaoMs:3600000, // 1h default
        expiracaoAtivacao:null,
        // RESULTADO
        encontradaEm:null, encontradaPor:null, qrData:null,
        packFim:Date.now()+90*24*60*60*1000,
      });
    }
    saveFlags(f);
  }
}

// ============================================================
// UTILS
// ============================================================
const $=id=>document.getElementById(id);
const val=id=>$(id)?.value?.trim()||'';
function pad(n){return String(Math.floor(n)).padStart(2,'0');}
function fmt(ts){return ts?new Date(ts).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'---';}
function msParaHMS(ms){const tot=Math.max(0,ms);return{h:Math.floor(tot/3600000),m:Math.floor((tot%3600000)/60000),s:Math.floor((tot%60000)/1000)};}
function fmtTimer(ms){const{h,m,s}=msParaHMS(ms);return`${pad(h)}:${pad(m)}:${pad(s)}`;}
function msgMdl(t,tp){const e=$('mdl-m');if(!e)return;e.className='msg '+tp;e.innerText=t;setTimeout(()=>{if(e){e.className='msg';e.innerText='';}},4000);}
function fecharMdl(){$('movl').style.display='none';$('mdl').style.display='none';}
function abrirMdl(tit,corpo){$('mdl-tit').innerText=tit;$('mdl-corpo').innerHTML=corpo;$('movl').style.display='block';$('mdl').style.display='block';}

// TIMERS VIVOS
const TIMERS={};
function pararTimer(id){if(TIMERS[id]){clearInterval(TIMERS[id]);delete TIMERS[id];}}
function iniciarTimerEl(elId,expiracaoTs,onExpire){
  pararTimer(elId);
  TIMERS[elId]=setInterval(()=>{
    const el=$(elId);if(!el){pararTimer(elId);return;}
    const r=expiracaoTs-Date.now();
    el.innerText=fmtTimer(r);
    if(r<=0){pararTimer(elId);if(onExpire)onExpire();}
  },1000);
}

// ============================================================
// VERIFICAR EXPIRAÇÕES
// ============================================================
function verificarExp(){
  const flags=getFlags();let alt=false;
  flags.forEach(bf=>{
    if(bf.estado==='ativa'&&bf.expiracaoAtivacao&&bf.expiracaoAtivacao<Date.now()){
      bf.estado='inativa';bf.ativadoEm=null;bf.expiracaoAtivacao=null;alt=true;
    }
    if((bf.estado==='inativa'||bf.estado==='ativa')&&bf.packFim<Date.now()){
      bf.estado='expirada';alt=true;
    }
  });
  if(alt){saveFlags(flags);renderLista();}
  atualizarStats();
}

function atualizarStats(){
  const f=getFlags();
  $('st-total').innerText=f.length;
  $('st-ativas').innerText=f.filter(b=>b.estado==='ativa').length;
  $('st-enc').innerText=f.filter(b=>b.estado==='encontrada').length;
}

// ============================================================
// RENDER LISTA
// ============================================================
function renderLista(){
  verificarExp();
  const flags=getFlags();
  $('lista-bingo').innerHTML=flags.map((bf,i)=>renderCard(bf,i)).join('');
  // Iniciar timers
  flags.forEach((bf,i)=>{
    if(bf.estado==='ativa'&&bf.expiracaoAtivacao){
      iniciarTimerEl(`t-${bf.id}`,bf.expiracaoAtivacao,()=>{verificarExp();renderLista();});
    }
  });
}

function renderCard(bf,i){
  const est=bf.estado;
  const cls=est;
  const badges={
    inativa:'<span class="badge-inativa">💤 INATIVA</span>',
    ativa:  '<span class="badge-ativa">⚡ ATIVA</span>',
    encontrada:'<span class="badge-enc">✅ ENCONTRADA</span>',
    expirada:'<span class="badge-exp">❌ EXPIRADA</span>',
  };

  // Timer (se ativa)
  let timerHtml='';
  if(est==='ativa'&&bf.expiracaoAtivacao){
    const r=Math.max(0,bf.expiracaoAtivacao-Date.now());
    timerHtml=`
      <div class="timer-grande">
        <span class="timer-ico-anim">⏱️</span>
        <div class="timer-display" id="t-${bf.id}">${fmtTimer(r)}</div>
        <div class="timer-label">Tempo restante ativo</div>
        <div style="font-size:.72rem;color:#555;margin-top:3px;">
          Ativado: ${fmt(bf.ativadoEm)} · Expira: ${fmt(bf.expiracaoAtivacao)}
        </div>
      </div>`;
  }

  // Foto
  const fotoHtml=bf.foto
    ?`<img src="${bf.foto}" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:2px solid #ff0;margin:8px 0;">`
    :'';

  // Info encontrada
  let encHtml='';
  if(est==='encontrada'){
    encHtml=`<div class="card card-v" style="margin-top:8px;padding:10px;">
      <div class="row"><div class="rl">Encontrada por</div><div class="rv" style="color:#0f0;font-weight:bold;">${bf.encontradaPor||'---'}</div></div>
      <div class="row"><div class="rl">Data/Hora</div><div class="rv" style="color:#0aa;">${fmt(bf.encontradaEm)}</div></div>
      <button class="btn bv" style="width:100%;margin-top:8px;padding:8px;" onclick="verQR(${i})">🎫 VER QR CODE GERADO</button>
    </div>`;
  }

  // Botões
  let btns='';
  if(est==='inativa'){
    btns=`<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn bbingo" style="flex:2;padding:10px;" onclick="abrirPainelAtivar(${i})">🎰 CONFIGURAR E ATIVAR</button>
    </div>`;
  }
  if(est==='ativa'){
    btns=`<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn bdesativ" style="flex:1;padding:8px;" onclick="desativar(${i})">⏹️ DESATIVAR</button>
      <button class="btn bo" style="flex:1;padding:8px;" onclick="abrirEditarAtiva(${i})">✏️ EDITAR</button>
      <button class="btn bpurple" style="flex:1;padding:8px;" onclick="abrirAlterarTempo(${i})">⏱️ TEMPO</button>
    </div>
    <div style="margin-top:8px;">
      <button class="btn bc bb" style="padding:7px;" onclick="simularEncontrar(${i})">🧪 SIMULAR ENCONTRAR</button>
    </div>`;
  }
  if(est==='encontrada'){
    btns=`<button class="btn bv bb" style="margin-top:10px;" onclick="verQR(${i})">🎫 VER / IMPRIMIR QR CODE</button>`;
  }

  return `<div class="bfc ${cls}" id="bfc-${i}">
    <!-- CABEÇALHO -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div><span style="font-size:1.4rem;">🎰</span> <b style="font-size:.95rem;">Bandeira BINGO #${bf.num}</b></div>
      ${badges[est]||''}
    </div>

    <!-- PRÉMIO -->
    <div class="row"><div class="rl">🎁 Prémio</div><div class="rv" style="color:#ff0;font-weight:bold;">${bf.premio}</div></div>
    ${bf.descricao?`<div class="row"><div class="rl">📝 Descrição</div><div class="rv" style="color:#0aa;font-size:.78rem;">${bf.descricao}</div></div>`:''}

    <!-- EMPRESA -->
    <div class="row"><div class="rl">🏢 Empresa</div><div class="rv" style="color:#ff0;">${bf.empNome}</div></div>
    <div class="row"><div class="rl">📍 ${bf.usarGPS?'GPS':'Morada'}</div><div class="rv" style="color:#0aa;font-size:.78rem;">${bf.usarGPS?`${bf.empLat}, ${bf.empLng}`:bf.empMorada}</div></div>
    <div class="row"><div class="rl">📞 Contacto</div><div class="rv">${bf.empTel}</div></div>
    <div class="row"><div class="rl">👤 Responsável</div><div class="rv" style="color:#0f0;">${bf.empResp}</div></div>

    <div class="row"><div class="rl">📍 Raio BINGO</div><div class="rv">${BINGO_RAIO}m</div></div>
    <div class="row"><div class="rl">⏱️ Duração configurada</div><div class="rv" style="color:#0ff;">${(bf.duracaoMs/3600000).toFixed(1)}h</div></div>

    ${fotoHtml}
    ${timerHtml}
    ${encHtml}
    ${btns}
  </div>`;
}

// ============================================================
// PAINEL PRINCIPAL: CONFIGURAR E ATIVAR
// ============================================================
let imgB64=null;
let duracaoSlider=1; // horas
let usarGPSLocal=false;

function abrirPainelAtivar(i){
  const bf=getFlags()[i];
  imgB64=bf.foto||null;
  duracaoSlider=bf.duracaoMs/3600000||1;
  usarGPSLocal=bf.usarGPS||false;

  abrirMdl(`🎰 Configurar Bandeira BINGO #${bf.num}`,`
    <p style="color:#0aa;font-size:.78rem;margin-bottom:12px;">
      Configura todos os dados antes de ativar. Podes alterar depois.
    </p>

    <!-- ===== PRÉMIO ===== -->
    <div class="edit-section">
      <h3>🎁 PRÉMIO</h3>
      <label style="font-size:.8rem;color:#0aa;">Nome do prémio: <span style="color:#f00;">*</span></label>
      <input type="text" id="ap-premio" value="${bf.premio}" placeholder="Ex: Café Grátis, Jantar para 2...">

      <label style="font-size:.8rem;color:#0aa;display:block;margin-top:8px;">Descrição detalhada:</label>
      <textarea id="ap-desc" placeholder="Ex: Um café expresso à escolha, válido de seg a sex, até às 18h...">${bf.descricao||''}</textarea>

      <label style="font-size:.8rem;color:#0aa;display:block;margin-top:8px;">📸 Foto do prémio:</label>
      <div id="ap-foto-placeholder" class="foto-area" onclick="$('ap-foto-input').click()" ${imgB64?'style="display:none;"':''}>
        <div style="font-size:2rem;">📸</div>
        <p style="color:#ff0;font-size:.82rem;margin-top:5px;">Clica para adicionar foto</p>
        <p style="color:#555;font-size:.7rem;">JPG, PNG — máx. 5MB</p>
      </div>
      <img id="ap-foto-prev" src="${imgB64||''}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;border:2px solid #ff0;margin:6px 0;display:${imgB64?'block':'none'};">
      <input type="file" id="ap-foto-input" accept="image/*" style="display:none;" onchange="carregarFotoAtivar(this)">
      ${imgB64?`<button class="btn br" style="width:auto;padding:4px 12px;font-size:.75rem;" onclick="removerFotoAtivar()">🗑️ Remover foto</button>`:'<span id="ap-rem-wrap"></span>'}
    </div>

    <hr class="sep">

    <!-- ===== DADOS DA EMPRESA ===== -->
    <div class="edit-section">
      <h3>🏢 DADOS DA EMPRESA (no QR Code)</h3>
      <p style="color:#0aa;font-size:.75rem;margin-bottom:8px;">Estes dados aparecem no QR Code que o jogador recebe.</p>

      <label style="font-size:.8rem;color:#0aa;">🏢 Nome da empresa: <span style="color:#f00;">*</span></label>
      <input type="text" id="ap-ne" value="${bf.empNome}" placeholder="Nome da empresa">

      <!-- SWITCH: MORADA OU GPS -->
      <label style="font-size:.8rem;color:#0aa;display:block;margin-top:8px;">📍 Localização:</label>
      <div style="display:flex;gap:6px;margin:6px 0;">
        <button id="btn-morada" class="btn ${!bf.usarGPS?'bv':'bc'}" style="flex:1;padding:7px;font-size:.8rem;" onclick="swLoc('morada')">📍 Morada</button>
        <button id="btn-gps"    class="btn ${bf.usarGPS?'bv':'bc'}"  style="flex:1;padding:7px;font-size:.8rem;" onclick="swLoc('gps')">🛰️ GPS / Coordenadas</button>
      </div>

function atualizarSlider(v){
  duracaoSlider=parseFloat(v);

}

function swLoc(tipo){
  usarGPSLocal=tipo==='gps';
  $('ap-morada-wrap').style.display=tipo==='morada'?'block':'none';
  $('ap-gps-wrap').style.display=tipo==='gps'?'block':'none';
  $('btn-morada').className=`btn ${tipo==='morada'?'bv':'bc'}`;
  $('btn-gps').className=`btn ${tipo==='gps'?'bv':'bc'}`;
}

function obterGPSAtual(){
  const st=$('ap-gps-status');if(st) st.innerText='📡 A obter localização...';
  if(!navigator.geolocation){if(st) st.innerText='❌ GPS não suportado.';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lng=pos.coords.longitude.toFixed(6);
    const elLat=$('ap-lat');const elLng=$('ap-lng');
    if(elLat) elLat.value=lat;if(elLng) elLng.value=lng;
    if(st) st.innerText=`✅ GPS: ${lat}, ${lng}`;
  },err=>{if(st) st.innerText='❌ Não foi possível obter o GPS.';});
}

function confirmarAtivar(i){
  const premio=val('ap-premio');
  const desc=val('ap-desc');
  const ne=val('ap-ne');
  const tel=val('ap-tel');
  const resp=val('ap-resp');
  const morada=val('ap-morada');
  const lat=val('ap-lat');const lng=val('ap-lng');

  if(!premio)           {msgMdl('❌ Define o prémio!','e');return;}
  if(!ne)               {msgMdl('❌ Insere o nome da empresa!','e');return;}
  if(!tel)              {msgMdl('❌ Insere o telefone de contacto!','e');return;}
  if(!resp)             {msgMdl('❌ Insere o nome do responsável!','e');return;}
  if(!usarGPSLocal&&!morada){msgMdl('❌ Insere a morada!','e');return;}
  if(usarGPSLocal&&(!lat||!lng)){msgMdl('❌ Insere as coordenadas GPS!','e');return;}

  const flags=getFlags();const bf=flags[i];
  const expiracaoTs=Date.now()+duracaoSlider*3600000;

  // ACTUALIZAR TUDO
  bf.estado='ativa';
  bf.premio=premio; bf.descricao=desc; bf.foto=imgB64||null;
  bf.empNome=ne; bf.empMorada=morada||bf.empMorada;
  bf.empLat=lat||bf.empLat; bf.empLng=lng||bf.empLng;

  bf.empWeb=val('ap-web')||bf.empWeb;
  bf.empResp=resp; bf.empRespTel=val('ap-resp-tel')||bf.empRespTel;
  bf.ativadoEm=Date.now(); bf.duracaoMs=duracaoSlider*3600000;
  bf.expiracaoAtivacao=expiracaoTs;
  bf.encontradaEm=null; bf.encontradaPor=null; bf.qrData=null;

  saveFlags(flags);fecharMdl();renderLista();
  alert(`✅ Bandeira BINGO #${bf.num} ATIVADA!\n🎁 ${premio}\n⏱️ ${duracaoSlider}h\n📍 Raio: ${BINGO_RAIO}m\nExpira: ${fmt(expiracaoTs)}`);

function atualizarSlider2(v){
  const el=$('sl2-val');if(el) el.innerText=v<1?Math.round(v*60)+'min':v+'h';
  const ep=$('sl2-expira');if(ep) ep.innerText=fmt(Date.now()+parseFloat(v)*3600000);
}

function adicionarTempo(i,t){
  const flags=getFlags();const bf=flags[i];
  let ms=0;
  if(t==='+30min') ms=30*60*1000;
  else if(t==='+1h')  ms=3600000;
  else if(t==='+2h')  ms=2*3600000;
  else if(t==='+4h')  ms=4*3600000;
  else if(t==='+6h')  ms=6*3600000;
  else if(t==='+12h') ms=12*3600000;
  else if(t==='+24h') ms=24*3600000;
  else if(t==='-1h')  ms=-3600000;

  const novaExp=Math.max(Date.now()+60000,bf.expiracaoAtivacao+ms); // mín. 1min restante
  bf.expiracaoAtivacao=novaExp;
  bf.duracaoMs=Math.max(3600000,bf.duracaoMs+ms);
  saveFlags(flags);

  // Actualizar timer no modal
  const el=$(`t-mdl-${bf.id}`);
  if(el) iniciarTimerEl(`t-mdl-${bf.id}`,novaExp,()=>{});
  // Actualizar timer na lista
  iniciarTimerEl(`t-${bf.id}`,novaExp,()=>{verificarExp();renderLista();});

  const expEl=$('sl2-expira');if(expEl) expEl.innerText=fmt(novaExp);
  msgMdl(`✅ Tempo ${t} — Expira às ${fmt(novaExp)}`,'s');
}

function reiniciarTempo(i){
  const v=parseFloat($('sl2-tempo')?.value||1);
  const flags=getFlags();const bf=flags[i];
  const novaExp=Date.now()+v*3600000;
  bf.expiracaoAtivacao=novaExp;bf.duracaoMs=v*3600000;
  saveFlags(flags);
  iniciarTimerEl(`t-mdl-${bf.id}`,novaExp,()=>{});
  iniciarTimerEl(`t-${bf.id}`,novaExp,()=>{verificarExp();renderLista();});
  msgMdl(`✅ Timer reiniciado: ${v}h — Expira às ${fmt(novaExp)}`,'s');
}

  const nomes=['Maria Silva','João Santos','Ana Costa','Pedro Lima','Carla Pereira'];
  const jogador=nomes[Math.floor(Math.random()*nomes.length)];
  const flags=getFlags();const bf=flags[i];
  if(bf.estado!=='ativa'){alert('Esta bandeira não está ativa!');return;}
  bf.estado='encontrada';bf.encontradaEm=Date.now();
  bf.encontradaPor=jogador;bf.qrData=gerarQRData(bf,jogador);
  pararTimer(`t-${bf.id}`);
  saveFlags(flags);renderLista();atualizarStats();
  setTimeout(()=>verQR(i),400);
}

// ============================================================
// GERAR DADOS QR
// ============================================================
function gerarQRData(bf,jogador){
  return {
    id:      `BINGO-${bf.id}-${Date.now()}`,
    tipo:    'BINGO ESPECIAL ZAP FLAGS',
    jogador,
    // PRÉMIO
    premio:   bf.premio,
    descricao:bf.descricao||'',
    temFoto:  !!bf.foto,
    // EMPRESA
    empresa:  bf.empNome,
    morada:   bf.usarGPS?`GPS: ${bf.empLat}, ${bf.empLng}`:bf.empMorada,
    lat:      bf.usarGPS?bf.empLat:null,
    lng:      bf.usarGPS?bf.empLng:null,
    tel:      bf.empTel,
    email:    bf.empEmail||'',
    web:      bf.empWeb||'',
    resp:     bf.empResp,
    respTel:  bf.empRespTel||'',
    // DATAS
    encontradoEm: fmt(bf.encontradaEm),
    validade:     fmt(bf.encontradaEm+30*24*60*60*1000),
    bandeira:     `#${bf.num}`,
    raio:         `${BINGO_RAIO}m`,
  };
}

// ============================================================
// VER QR CODE
// ============================================================
function verQR(i){
  const bf=getFlags()[i];
  if(!bf.qrData){alert('QR ainda não gerado.');return;}
  const q=bf.qrData;

  abrirMdl(`🎫 QR CODE — ${q.premio}`,`
    <!-- FOTO -->
    ${bf.foto?`<img src="${bf.foto}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;border:2px solid #ff0;margin-bottom:12px;">`:''}

    <!-- TOPO -->
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:2rem;margin-bottom:5px;">🎰</div>
      <h3 style="color:#ff0;font-size:1rem;">BINGO ESPECIAL!</h3>
      <p style="color:#0ff;font-weight:bold;font-size:.95rem;">${q.jogador}</p>
      <p style="color:#0aa;font-size:.78rem;">encontrou a bandeira!</p>
    </div>

    <!-- QR CODE REAL -->
    <div style="text-align:center;margin:12px 0;">
      <p style="color:#0aa;font-size:.75rem;margin-bottom:8px;">Apresenta este QR na loja:</p>
      <div class="qr-wrap" id="qr-div"></div>
    </div>

    <!-- PRÉMIO -->
    <div class="qr-premio-box">
      <p style="color:#0aa;font-size:.75rem;margin-bottom:5px;">🎁 PRÉMIO:</p>
      <p style="color:#ff0;font-size:1.3rem;font-weight:bold;text-shadow:0 0 8px #ff0;">${q.premio}</p>
      ${q.descricao?`<p style="color:#0aa;font-size:.8rem;margin-top:8px;line-height:1.6;">${q.descricao}</p>`:''}
      ${q.temFoto?`<p style="color:#555;font-size:.72rem;margin-top:6px;font-style:italic;">(ver foto acima)</p>`:''}
    </div>

    <!-- DADOS DA EMPRESA -->
    <div class="qr-info" style="border-color:#ff0;margin-top:10px;">
      <p style="color:#ff0;font-size:.85rem;font-weight:bold;margin-bottom:8px;">🏢 DADOS DA EMPRESA</p>
      <div class="row"><div class="rl">Empresa</div><div class="rv" style="color:#ff0;font-weight:bold;">${q.empresa}</div></div>
      <div class="row"><div class="rl">📍 ${q.lat?'GPS':'Morada'}</div><div class="rv" style="color:#0aa;font-size:.78rem;">${q.morada}</div></div>
      ${q.lat?`<div class="row"><div class="rl">🗺️ Coordenadas</div><div class="rv" style="color:#0ff;font-size:.75rem;">${q.lat}, ${q.lng}</div></div>`:''}
      <div class="row"><div class="rl">📞 Telefone</div><div class="rv" style="color:#0ff;font-weight:bold;">${q.tel}</div></div>
      ${q.email?`<div class="row"><div class="rl">📧 Email</div><div class="rv" style="color:#0ff;font-size:.78rem;">${q.email}</div></div>`:''}
      ${q.web?`<div class="row"><div class="rl">🌐 Website</div><div class="rv" style="color:#0ff;font-size:.78rem;">${q.web}</div></div>`:''}
      <div class="row"><div class="rl">👤 Responsável</div><div class="rv" style="color:#0f0;font-weight:bold;">${q.resp}</div></div>
      ${q.respTel?`<div class="row"><div class="rl">📱 Tel. Resp.</div><div class="rv">${q.respTel}</div></div>`:''}
    </div>

    <!-- DETALHES QR -->
    <div class="qr-info" style="border-color:#333;margin-top:8px;">
      <p style="color:#555;font-size:.75rem;font-weight:bold;margin-bottom:6px;">ℹ️ DETALHES</p>
      <div class="row"><div class="rl">ID</div><div class="rv" style="color:#555;font-size:.7rem;">${q.id}</div></div>
      <div class="row"><div class="rl">Bandeira</div><div class="rv">${q.bandeira} · ${q.raio}</div></div>
      <div class="row"><div class="rl">Encontrado em</div><div class="rv" style="font-size:.78rem;">${q.encontradoEm}</div></div>
      <div class="row"><div class="rl">⏰ Válido até</div><div class="rv" style="color:#f80;font-weight:bold;">${q.validade}</div></div>
    </div>

    <!-- BOTÕES -->
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="btn bv" style="flex:1;padding:10px;font-size:.82rem;" onclick="imprimirQR()">🖨️ IMPRIMIR</button>
      <button class="btn bc" style="flex:1;padding:10px;font-size:.82rem;" onclick="copiarQRInfo('${q.id}')">📋 COPIAR ID</button>
    </div>
  `);

  // Gerar QR real
  setTimeout(()=>{
    const div=$('qr-div');
    if(div&&typeof QRCode!=='undefined'){
      div.innerHTML='';
      const txt=[
        'ZAP FLAGS BINGO',q.id,
        q.empresa,q.morada,q.tel,
        `Premio: ${q.premio}`,
        q.descricao||'',
        `Jogador: ${q.jogador}`,
        `Valido ate: ${q.validade}`
      ].filter(Boolean).join('\n');
      new QRCode(div,{text:txt,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    }
  },250);
}

function imprimirQR(){window.print();}
function copiarQRInfo(id){
  navigator.clipboard?.writeText(id).then(()=>alert('✅ ID copiado!'));
}

// ============================================================
// INICIALIZAR
// ============================================================
iniciar();
renderLista();
setInterval(()=>{verificarExp();atualizarStats();},5000);
</script>
</body>
</html>
