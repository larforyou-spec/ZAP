<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZAP FLAGS</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:Arial, sans-serif; }

    #street-view { width:100%; height:100%; position:relative; }
    #avatar { position:absolute; bottom:22%; left:50%; transform:translateX(-50%); font-size:70px; z-index:10; }

    .bingo-flag { 
      position:absolute; font-size:60px; cursor:pointer; 
      text-shadow: 0 0 20px gold; animation: pulse 1.8s infinite; 
      z-index: 30; 
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }
  </style>
</head>
<body>

  <div id="street-view"></div>
  <div id="avatar">🧍</div>

  <div id="bingo-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(#001a00,#000); border:6px solid gold; border-radius:24px; padding:40px 25px; width:92%; max-width:520px; text-align:center; z-index:2000; box-shadow:0 0 70px gold;">
    <h1 style="color:gold; font-size:38px;">🎉 BINGO GANHO! 🎉</h1>
    <p id="bingo-winner" style="color:#0f0; font-size:20px;"></p>
    <div style="background:rgba(255,215,0,0.12); border:3px solid gold; border-radius:14px; padding:20px; margin:25px 0;">
      <strong style="color:gold;">PRÉMIO:</strong><br><br>
      <span id="bingo-prize" style="font-size:21px; color:white;"></span>
    </div>
    <button onclick="closeBingoModal()" style="padding:16px 60px; font-size:18px; background:gold; color:black; border:none; border-radius:12px;">FECHAR</button>
  </div>

  <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); padding:12px; border-radius:15px; display:flex; gap:12px;">
    <button onclick="turnLeft()">←</button>
    <button onclick="moveBackward()">↓</button>
    <button onclick="moveForward()" style="width:80px;">↑ FRENTE</button>
    <button onclick="turnRight()">→</button>
  </div>

  <script>
    let panorama;
    let playerName = "João Silva";

    function initStreetView() {
      panorama = new google.maps.StreetViewPanorama(document.getElementById('street-view'), {
        position: { lat: 38.7223, lng: -9.1393 },
        pov: { heading: 0, pitch: 0 },
        zoom: 1
      });
      setTimeout(generateFlags, 1500);
    }

    function generateFlags() {
      document.querySelectorAll('.bingo-flag').forEach(el => el.remove());
      const bingo = document.createElement('div');
      bingo.className = 'bingo-flag';
      bingo.innerHTML = '⭐';
      bingo.style.left = '48%';
      bingo.style.top = '42%';
      bingo.onclick = () => {
        const prize = prompt("Escreve o prémio da bandeira de Bingo:");
        if (prize) triggerBingoWin(prize);
      };
      document.getElementById('street-view').appendChild(bingo);
    }

    function triggerBingoWin(prize) {
      document.getElementById('bingo-winner').innerHTML = `<b>${playerName}</b> ganhou um Bingo!`;
      document.getElementById('bingo-prize').innerText = prize;
      document.getElementById('bingo-modal').style.display = 'block';
      
      const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
      audio.volume = 0.5;
      audio.play();
      setTimeout(() => audio.pause(), 10000); // 10 segundos
    }

    function closeBingoModal() {
      document.getElementById('bingo-modal').style.display = 'none';
    }

    function moveForward() { const links = panorama.getLinks(); if (links?.length) panorama.setPosition(links[0].pano); }
    function moveBackward() { const links = panorama.getLinks(); if (links?.length > 1) panorama.setPosition(links[links.length-1].pano); }
    function turnLeft() { let pov = panorama.getPov(); pov.heading -= 45; panorama.setPov(pov); }
    function turnRight() { let pov = panorama.getPov(); pov.heading += 45; panorama.setPov(pov); }

    window.onload = initStreetView;
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASmp2FNAUWNxNiDzEWRx30cRysdKBkvCQ&callback=initStreetView"></script>

</body>
</html>
