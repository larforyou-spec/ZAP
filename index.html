 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ================= CONFIGURAÇÕES REAIS (SEM TESTE) =================
    const isTestMode = false; // MODO PRODUÇÃO
    const moveDist = isTestMode ? 4 : 0.5;   // 0.50 metros
    const energyCost = isTestMode ? 4 : 0.5; // Gasta 0.50 de energia
    const idleTime = isTestMode ? 15000 : 900000; // Descanso aos 15 minutos (900000ms)
    const delayCampanha = isTestMode ? 60000 : 3600000; // 60 Minutos Reais para carência

    let player = { name: "", energy: 1000, maxEnergy: 1000, skill: 1, vision: 5, flags: 0, lat: 41.1496, lng: -8.6109, progressPR: {}, qrs: [] };
    let map = null, prMap = null, playerMarker = null, visionCircle = null, catchCircle = null, allFlags = [];
    let activeCompany = null; 
    let allCompaniesDB = {}; 
    let allPlayersDB = [];
    let playerFriends = {}; 
    let currentChatFriend = ""; 
    let currentTrade = { myQR: null, friendQR: null };
    
    let lastMoveTime = Date.now();
    let nextSkillTarget = 100;
    let dashInterval = null;
    let gpsWatchId = null;
    let isOfflineMode = true;
    
    // ================= INICIALIZAÇÃO =================
    window.onload = () => {
      const savedName = localStorage.getItem("zap_player_name"); if (savedName) document.getElementById("jg-log-nome").value = savedName;
      const db = localStorage.getItem("zap_all_companies"); if (db) allCompaniesDB = JSON.parse(db);
      const playersDb = localStorage.getItem("zap_all_players"); if (playersDb) allPlayersDB = JSON.parse(playersDb);
      const friendsDb = localStorage.getItem("zap_player_friends"); if (friendsDb) playerFriends = JSON.parse(friendsDb);
    };

    // ================= BACKOFFICE E GERADOR =================
    function openAdminLogin() { document.getElementById('bo-login-screen').classList.remove('hidden'); }
    function closeAdminLogin() { document.getElementById('bo-login-screen').classList.add('hidden'); }
    
    function doLoginBO() {
      if(document.getElementById('bo-pass').value === '123123') {
        document.getElementById('bo-login-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('backoffice-screen').classList.remove('hidden');
        renderBackoffice();
      } else alert("Acesso Negado!");
    }

    function generateSimulation() {
      const pCount = parseInt(document.getElementById('sim-players').value || 0);
      const cCount = parseInt(document.getElementById('sim-comps').value || 0);

      if(pCount > 0) {
        for(let i=0; i<pCount; i++) { allPlayersDB.push("Jogador_" + Math.random().toString(36).substr(2,4).toUpperCase()); }
        localStorage.setItem("zap_all_players", JSON.stringify(allPlayersDB));
      }

      if(cCount > 0) {
        for(let i=0; i<cCount; i++) {
          let id = "COMP-SIM-" + Math.random().toString(36).substr(2,6).toUpperCase();
          allCompaniesDB[id] = {
            id: id, type: "SEDE", name: "Empresa Sim " + i,
            nif: "999000" + String(i).padStart(3, '0'),
            email: "sim"+i+"@teste.com", pass: "123123", morada: "Rua Virtual " + i, codeSede: "", isLocked: false,
            lat: 41.1496 + (Math.random()-0.5)*0.1, lng: -8.6109 + (Math.random()-0.5)*0.1,
            atividade: "Simulação", pacotesDisponiveis: [], stockLivre: 0, stockPago: 0, validade: Date.now() + 864000000,
            campanhas: [{
               id: "CAMP-SIM-" + i, nome: "Campanha Sim", premio: "Prémio Fictício", lotesIniciais: 5, flagsTotais: 100, flagsRestantes: 100,
               flagsPremioRestantes: 100, flagsEnergiaRestantes: 0, diasLevantamento: 30, raioKm: 15, status: "active",
               activationTime: Date.now(), expiraEm: Date.now() + 864000000, vencedores: []
            }]
          };
        }
        localStorage.setItem("zap_all_companies", JSON.stringify(allCompaniesDB));
      }
      alert(`Simulação de Carga concluída!\nForam gerados ${pCount} Jogadores e ${cCount} Empresas ativas!`);
      renderBackoffice();
    }

    function renderBackoffice() {
      document.getElementById("bo-total-players").innerText = allPlayersDB.length;
      document.getElementById("bo-total-comps").innerText = Object.keys(allCompaniesDB).length;

      // PREVENÇÃO DE DESEMPENHO: Renderiza apenas os primeiros 50
      const pList = document.getElementById("bo-players-list"); pList.innerHTML = "";
      allPlayersDB.slice(0, 50).forEach(p => { pList.innerHTML += `<tr><td>${p}</td><td><button class="btn-danger" style="padding:5px;" onclick="deletePlayer('${p}')">Apagar</button></td></tr>`; });
      if(allPlayersDB.length > 50) pList.innerHTML += `<tr><td colspan='2' style='text-align:center; color:#aaa;'>... e mais ${allPlayersDB.length - 50} ocultos por performance.</td></tr>`;
      if(allPlayersDB.length === 0) pList.innerHTML = "<tr><td colspan='2'>Sem jogadores registados.</td></tr>";

      const cList = document.getElementById("bo-comps-list"); cList.innerHTML = "";
      const compKeys = Object.keys(allCompaniesDB);
      compKeys.slice(0, 50).forEach(key => {
        let c = allCompaniesDB[key];
        cList.innerHTML += `<tr><td>${c.name}</td><td>${c.nif}</td><td>${c.type.replace('_',' ')}</td><td><button class="btn-danger" style="padding:5px;" onclick="deleteCompany('${key}')">Apagar</button></td></tr>`;
      });
      if(compKeys.length > 50) cList.innerHTML += `<tr><td colspan='4' style='text-align:center; color:#aaa;'>... e mais ${compKeys.length - 50} ocultas.</td></tr>`;
      if(compKeys.length === 0) cList.innerHTML = "<tr><td colspan='4'>Sem empresas registadas.</td></tr>";
    }

    function deletePlayer(name) {
      if(confirm("Tem a certeza que quer apagar o jogador " + name + "?")) {
        allPlayersDB = allPlayersDB.filter(p => p !== name);
        localStorage.setItem("zap_all_players", JSON.stringify(allPlayersDB));
        localStorage.removeItem("zap_reg_" + name.toLowerCase());
        if(localStorage.getItem("zap_player_name") === name) localStorage.removeItem("zap_player_name");
        renderBackoffice();
      }
    }

    function deleteCompany(id) {
      if(confirm("Tem a certeza que quer apagar a empresa e todas as suas campanhas?")) {
        delete allCompaniesDB[id];
        localStorage.setItem("zap_all_companies", JSON.stringify(allCompaniesDB));
        renderBackoffice();
      }
    }

    function factoryReset() {
      if(confirm("ATENÇÃO: Vai formatar TODO o sistema! Deseja prosseguir?")) {
        localStorage.clear();
        alert("Sistema limpo com sucesso. A recarregar plataforma...");
        location.reload();
      }
    }

    // ================= TABS E UI GERAIS =================
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
    function recoverPass() { const val = prompt("Insira E-mail ou Telemóvel:"); if(val) alert("Foi enviado um link de recuperação da sua senha."); }

    function switchMainTab(mode) {
      document.getElementById('area-jg').classList.toggle('hidden', mode !== 'JG'); document.getElementById('area-pr').classList.toggle('hidden', mode !== 'PR');
      document.getElementById('btn-tab-jg').className = mode === 'JG' ? 'tab-btn active' : 'tab-btn btn-dark'; document.getElementById('btn-tab-pr').className = mode === 'PR' ? 'tab-btn active' : 'tab-btn btn-dark';
      if(mode === 'JG') switchJGView('LOG'); if(mode === 'PR') switchPRView('LOG');
    }
    
    function switchJGView(view) { document.getElementById('jg-login-view').classList.toggle('hidden', view !== 'LOG'); document.getElementById('jg-reg-view').classList.toggle('hidden', view !== 'REG'); }
    function switchPRView(view) { document.getElementById('pr-login-view').classList.toggle('hidden', view !== 'LOG'); document.getElementById('pr-reg-view').classList.toggle('hidden', view !== 'REG'); }
    function toggleFilialFields() { document.getElementById("filial-extras").classList.toggle("hidden", !document.getElementById("pr-is-filial").checked); }

    // ================= FASE 1: JOGADOR =================
    function doLoginJG() {
      const name = document.getElementById("jg-log-nome").value.trim();
      const pass = document.getElementById("jg-log-senha").value;
      if (!name || pass.length < 5) return alert("Preencha o Nome e a Senha (>4 letras)!");
      const isReg = localStorage.getItem("zap_reg_" + name.toLowerCase());
      if (!isReg) { alert("Jogador não encontrado. Reencaminhado para registo!"); switchJGView('REG'); document.getElementById("jg-reg-name").value = name; return; }
      
      localStorage.setItem("zap_player_name", name); player.name = name;
      const pData = localStorage.getItem("zap_player_data");
      if(pData) { const parsed = JSON.parse(pData); if(parsed.name === name) player = parsed; }
      
      const lastNif = localStorage.getItem("zap_pr_nif");
      if(lastNif) activeCompany = JSON.parse(localStorage.getItem("zap_pr_data_" + lastNif));

      preStartGame();
    }

    function doRegisterJG() {
      const name = document.getElementById("jg-reg-name").value.trim();
      const email = document.getElementById("jg-reg-email").value.trim();
      const p1 = document.getElementById("jg-reg-pass1").value;
      const p2 = document.getElementById("jg-reg-pass2").value;

      if (!name || !validateEmail(email)) return alert("E-mail inválido ou Nome vazio.");
      if (p1.length < 5 || p1 !== p2) return alert("A senha deve ter mais de 4 caracteres e coincidir.");

      localStorage.setItem("zap_reg_" + name.toLowerCase(), "true");
      localStorage.setItem("zap_player_name", name);
      player.name = name; 
      
      // Injeta QRs falsos só para ter o que trocar na Fase 1 para efeitos de demonstração
      player.qrs = [
        { id: "QR-" + Math.random().toString(36).substr(2,4).toUpperCase(), brand: "ZARA", offer: "50% Desconto", expires: Date.now() + 864000000 },
        { id: "QR-" + Math.random().toString(36).substr(2,4).toUpperCase(), brand: "FNAC", offer: "Vale 10€", expires: Date.now() + 864000000 }
      ];
      
      if(!allPlayersDB.includes(name)) allPlayersDB.push(name);
      localStorage.setItem("zap_all_players", JSON.stringify(allPlayersDB));
      
      savePlayer(); alert(`Registo concluído! Bem-vindo(a) ${name}!`); preStartGame();
    }

    function savePlayer() { localStorage.setItem("zap_player_data", JSON.stringify(player)); }

    function preStartGame() {
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("mode-modal").classList.remove("hidden");
    }

    // ================= MODOS DE JOGO (GPS E OFFLINE) =================
    function requestGPSMode() {
      document.getElementById("mode-modal").classList.add("hidden"); document.getElementById("game-screen").classList.remove("hidden");
      isOfflineMode = false; initMap();

      if (!navigator.geolocation) { alert("O seu telemóvel não suporta GPS. A iniciar Modo Casa."); activateOfflineMode(); return; }
      if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);

      navigator.geolocation.getCurrentPosition(
        pos => { player.lat = pos.coords.latitude; player.lng = pos.coords.longitude; renderAvatar(); },
        err => { alert("Erro de GPS. A usar Modo Offline."); activateOfflineMode(); },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
      );

      gpsWatchId = navigator.geolocation.watchPosition(
        p => {
          const m = getDist(player.lat, player.lng, p.coords.latitude, p.coords.longitude);
          if (m > moveDist) { player.energy -= energyCost; updateUI(); }
          player.lat = p.coords.latitude; player.lng = p.coords.longitude; renderAvatar();
        },
        e => { console.warn("GPS fraco."); }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
      );
      
      spawnRandomFlags(15); updateQRWallet(); populateSocialList();
    }

    function activateOfflineMode() {
      document.getElementById("mode-modal").classList.add("hidden"); document.getElementById("game-screen").classList.remove("hidden"); document.getElementById("offline-controls").classList.remove("hidden");
      isOfflineMode = true; initMap(); spawnRandomFlags(15); renderAvatar(); populateSocialList(); updateQRWallet();
    }

    // MAPA GOOGLE SATELLITE 
    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: false }).setView([player.lat, player.lng], 19);
      L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
      setTimeout(() => { map.invalidateSize(); }, 500); 
    }

    function renderAvatar() {
      if (!playerMarker) {
        const avatarHTML = `<div id="avatar-anim" class="avatar-wrapper"><div class="ava-head"></div><div class="ava-arm-l"></div><div class="ava-arm-r" id="ava-arm-right"></div><div class="ava-body"></div><div class="ava-leg-l"></div><div class="ava-leg-r"></div></div>`;
        const icon = L.divIcon({ className: '', html: avatarHTML, iconSize: [40, 50], iconAnchor: [20, 50] });
        playerMarker = L.marker([player.lat, player.lng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
      } else { playerMarker.setLatLng([player.lat, player.lng]); }

      if (!visionCircle) visionCircle = L.circle([player.lat, player.lng], { radius: player.vision, color: "#0066ff", fillOpacity: 0.1, weight: 1 }).addTo(map);
      else { visionCircle.setLatLng([player.lat, player.lng]); visionCircle.setRadius(player.vision); }

      if (!catchCircle) catchCircle = L.circle([player.lat, player.lng], { radius: 2.5, color: "#00ff00", className: "catch-circle", fillOpacity: 0.2, weight: 2 }).addTo(map);
      else catchCircle.setLatLng([player.lat, player.lng]);

      map.setView([player.lat, player.lng], 19); checkVisibleFlags();
    }

    function centerPlayer() { map.setView([player.lat, player.lng], 19); }

    function movePlayer(dx, dy) {
      if (!isOfflineMode) { alert("Modo GPS Ativo! Caminha na vida real."); return; }
      if (player.energy < energyCost) { alert("Estás sem energia! Aguarda o descanso."); return; }
      player.energy -= energyCost; lastMoveTime = Date.now(); 
      
      const ava = document.getElementById("avatar-anim");
      if (ava) {
        ava.classList.add("walking");
        if (dx > 0) ava.style.transform = "scaleX(1)";
        if (dx < 0) ava.style.transform = "scaleX(-1)";
        setTimeout(() => ava.classList.remove("walking"), 250);
      }

      player.lat += (dy * moveDist) / 111320;
      player.lng += (dx * moveDist) / (111320 * Math.cos(player.lat * Math.PI / 180));
      
      renderAvatar(); updateUI();
    }

    setInterval(() => {
      const timeIdle = Date.now() - lastMoveTime;
      if (timeIdle >= idleTime && player.energy < player.maxEnergy) {
        player.energy = Math.min(player.maxEnergy, player.energy + (player.maxEnergy * 0.10));
        updateUI(); lastMoveTime = Date.now(); 
      }
    }, 1000);

    // ================= LÓGICA DE BANDEIRAS =================
    function getDist(lat1, lng1, lat2, lng2) {
      const R = 6371e3; const dPhi = (lat2 - lat1) * Math.PI / 180; const dLam = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dPhi/2)*Math.sin(dPhi/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLam/2)*Math.sin(dLam/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function spawnRandomFlags(amount) {
      for(let i=0; i<amount; i++) {
        let rLat = player.lat + ((Math.random() - 0.5) * 0.0001);
        let rLng = player.lng + ((Math.random() - 0.5) * 0.0001);
        let icon = L.divIcon({ className: '', html: `<div class="flag-marker"></div>`, iconSize: [24,24] });
        allFlags.push({ lat: rLat, lng: rLng, marker: L.marker([rLat, rLng], { icon: icon }), isVisible: false });
      }
    }

    function checkVisibleFlags() {
      allFlags.forEach(f => {
        let dist = getDist(player.lat, player.lng, f.lat, f.lng);
        if (dist <= player.vision && !f.isVisible) { f.marker.addTo(map); f.isVisible = true; }
        else if (dist > player.vision && f.isVisible) { map.removeLayer(f.marker); f.isVisible = false; }
      });
    }

    function catchFlag() {
      let closest = null; let minDist = Infinity;
      allFlags.forEach(f => { let d = getDist(player.lat, player.lng, f.lat, f.lng); if(d < minDist) { minDist = d; closest = f; } });
      if (!closest) { alert("Não vês bandeiras!"); return; }
      if (minDist > 2.5) { alert(`Aproxima-te! Bandeira a ${Math.floor(minDist)}m. (Círculo Tracejado)`); return; }

      const ava = document.getElementById("avatar-anim");
      if (ava) { ava.classList.add("catching"); setTimeout(() => ava.classList.remove("catching"), 400); }

      player.flags += 1; map.removeLayer(closest.marker); allFlags = allFlags.filter(f => f !== closest); 
      spawnRandomFlags(1); processCaughtFlag(); 
    }

    function processCaughtFlag() {
      document.getElementById('modal-overlay').classList.remove('hidden');
      let mockName = activeCompany ? activeCompany.name : "ZAP Central";
      let mockAtiv = activeCompany ? activeCompany.atividade : "Oferta Livre";
      document.getElementById('modal-comp-name').innerText = mockName; document.getElementById('modal-comp-activity').innerText = mockAtiv;

      const resBox = document.getElementById('modal-result-box');
      
      let empresaSorteada = null; let campSorteada = null; let globaisAtivas = [];
      for(let key in allCompaniesDB) {
        let c = allCompaniesDB[key];
        if(c.campanhas && c.campanhas.length > 0) {
          c.campanhas.filter(cmp => cmp.status === 'active' && cmp.flagsRestantes > 0).forEach(cmp => { globaisAtivas.push({ empresa: c, campanha: cmp }); });
        }
      }

      if (globaisAtivas.length === 0) {
        resBox.innerHTML = `<span style="color:#0f0; font-weight:bold;">Bandeira Livre ZAP</span><br><span style="font-size:12px; color:#fff;">Ganhaste +Skill e 5% de Energia.</span>`;
        player.energy = Math.min(player.maxEnergy, player.energy + 50); updateUI(); savePlayer(); return;
      }

      let totalSaco = globaisAtivas.reduce((sum, item) => sum + item.campanha.flagsRestantes, 0);
      let sorteio = Math.random() * totalSaco;

      for (let item of globaisAtivas) { 
        if (sorteio < item.campanha.flagsRestantes) { empresaSorteada = item.empresa; campSorteada = item.campanha; break; } 
        sorteio -= item.campanha.flagsRestantes; 
      }

      campSorteada.flagsRestantes--;

      if (campSorteada.lotesIniciais > 0) {
        let isPremio = Math.random() < (campSorteada.flagsPremioRestantes / (campSorteada.flagsPremioRestantes + campSorteada.flagsEnergiaRestantes));
        
        if (isPremio && campSorteada.flagsPremioRestantes > 0) {
          campSorteada.flagsPremioRestantes--;
          if (!player.progressPR[campSorteada.id]) player.progressPR[campSorteada.id] = 0;
          player.progressPR[campSorteada.id]++;
          
          if (player.progressPR[campSorteada.id] >= 20) {
            const qrCode = "ZAP-" + Math.random().toString(36).substring(2,6).toUpperCase();
            const expTime = Date.now() + (campSorteada.diasLevantamento * 24 * 60 * 60 * 1000);
            
            campSorteada.vencedores.push({ jogador: player.name || "Tu", codigo: qrCode, expiraEm: expTime });
            allCompaniesDB[empresaSorteada.id] = empresaSorteada; localStorage.setItem("zap_all_companies", JSON.stringify(allCompaniesDB));

            player.qrs.push({ id: qrCode, brand: empresaSorteada.name, offer: campSorteada.premio, expires: expTime });
            
            resBox.style.borderColor = "#ff0000";
            resBox.innerHTML = `<span style="color:#ff0000; font-weight:bold; font-size:18px;">🎉 PARABÉNS! GANHASTE! 🎉</span><br><span style="font-size:13px; color:#fff;">Prémio: <b style="color:#ff9800;">${campSorteada.premio}</b> da empresa ${empresaSorteada.name}<br>QR na tua carteira.</span>`;
            player.progressPR[campSorteada.id] = 0; updateQRWallet();
          } else {
            resBox.style.borderColor = "#ff9800";
            resBox.innerHTML = `<span style="color:#ff9800; font-weight:bold;">Bandeira de Lote (${campSorteada.premio})!</span><br><span style="font-size:12px; color:#fff;">Faltam: <b>${20 - player.progressPR[campSorteada.id]}</b></span>`;
          }
        } else {
          campSorteada.flagsEnergiaRestantes--;
          let randEnergy = Math.random() * 100;
          let gain = 0; let msg = "";
          if (randEnergy < 1) { gain = 1000; msg = "JACKPOT! Energia Cheia (+100%)!"; }
          else if (randEnergy < 6) { gain = 500; msg = "Sorte! +50% Energia!"; }
          else if (randEnergy < 46) { gain = 100; msg = "Muito Bom! +10% Energia!"; }
          else { gain = 50; msg = "Bom! +5% Energia."; }
          player.energy = Math.min(player.maxEnergy, player.energy + gain);
          resBox.style.borderColor = "#00f0ff";
          resBox.innerHTML = `<span style="color:#00f0ff; font-weight:bold;">Bandeira de Energia</span><br><span style="font-size:12px; color:#fff;">${msg}</span>`;
        }
      } else {
        campSorteada.flagsEnergiaRestantes--;
        player.energy = Math.min(player.maxEnergy, player.energy + 50);
        resBox.innerHTML = `<span style="color:#0f0; font-weight:bold;">Bandeira de Publicidade</span><br><span style="font-size:12px; color:#fff;">Ganhaste +Skill e Energia.</span>`;
      }

      allCompaniesDB[empresaSorteada.id] = empresaSorteada; localStorage.setItem("zap_all_companies", JSON.stringify(allCompaniesDB));
      savePlayer(); recalcSkill(); updateUI();
    }

    function closeFlagModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
    function recalcSkill() { nextSkillTarget = 100 * Math.pow(2, player.skill - 1); if (player.flags >= nextSkillTarget) { player.skill++; player.vision = Math.min(50, 5 + (player.skill - 1) * 0.25); nextSkillTarget = 100 * Math.pow(2, player.skill - 1); } }
    function updateUI() { document.getElementById('val-ener').innerText = Math.floor(player.energy); document.getElementById('bar-ener').style.width = (player.energy / player.maxEnergy) * 100 + "%"; }

    function updateQRWallet() {
      const list = document.getElementById("qr-wallet-list");
      if(!list) return; list.innerHTML = "";
      if (!player.qrs || player.qrs.length === 0) { list.innerHTML = "Não tens prémios ganhos."; return; }
      player.qrs.forEach(qr => {
        let dias = Math.ceil((qr.expires - Date.now()) / (24*60*60*1000));
        list.innerHTML += `<div style="background:#111; padding:10px; margin-bottom:5px; border:1px dashed #0f0; border-radius:5px;"><b>${qr.brand}</b><br><span style="color:#ff9800;">${qr.offer}</span><br>Código: <b>${qr.id}</b><br><span style="color:${dias<0?'red':'#a7fca7'}; font-size:10px;">${dias<0?'Expirou':'Válido: '+dias+' dias'}</span></div>`;
      });
    }

    // ================= LÓGICA DA ABA SOCIAL (CHATS E TROCAS) =================
    function openWindow(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeWindow(id) { document.getElementById(id).classList.add('hidden'); }

    function switchSoc(tab) {
      document.getElementById('tab-global').classList.remove('active'); document.getElementById('tab-amigos').classList.remove('active');
      document.getElementById('view-global').classList.add('hidden'); document.getElementById('view-amigos').classList.add('hidden'); 
      document.getElementById('tab-' + tab).classList.add('active');
      
      if(tab === 'global') { document.getElementById('view-global').classList.remove('hidden'); populateSocialList(); }
      if(tab === 'amigos') { document.getElementById('view-amigos').classList.remove('hidden'); document.getElementById('friends-list-view').classList.remove('hidden'); document.getElementById('chat-view').classList.add('hidden'); populateSocialList(); }
    }

    function populateSocialList() {
      // PROCURAR MUNDO
      const globalList = document.getElementById("global-players-list"); globalList.innerHTML = "";
      allPlayersDB.slice(0,50).forEach(pName => {
        if(pName === player.name) return; 
        let status = playerFriends[pName] || 'none';

      window.addEventListener('touchmove', e => { if (!isDragging) return; el.style.left = (startLeft + e.touches[0].clientX - startX) + 'px'; el.style.top = (startTop + e.touches[0].clientY - startY) + 'px'; e.preventDefault(); }, {passive: false});

    function buyPackage(nome, bandeiras, preco, dias) {

    function renderAvailablePackages() {
      const sel = document.getElementById("agenda-pack-select"); sel.innerHTML = "";

    function scheduleCampaign() {
      const packId = document.getElementById("agenda-pack-select").value; if (!packId) return alert("Sem pacotes.");
      const lotesPedidos = parseInt(document.getElementById("agenda-lots").value || "0"); const diasPremio = parseInt(document.getElementById("agenda-days").value || "5"); const premioTxt = document.getElementById("agenda-prize").value.trim();

      const packIdx = activeCompany.pacotesDisponiveis.findIndex(p => p.id === packId); const chosenPack = activeCompany.pacotesDisponiveis[packIdx]; const maxLotes = Math.floor(chosenPack.flagsTotal / 20);

      if(lotesPedidos > 0 && !premioTxt) return alert("Tem de descrever o prémio.");
      if(lotesPedidos > maxLotes) return alert(`Matemática Inválida: Este pacote suporta no máximo ${maxLotes} lotes.`);
      if(lotesPedidos > 0 && diasPremio > chosenPack.validadeDias) return alert(`Erro: Prazo excede a validade do pacote (${chosenPack.validadeDias} dias).`);

      activeCompany.pacotesDisponiveis.splice(packIdx, 1);
      
      const novaCampanha = {
        id: "CAMP-" + Math.random().toString(36).substr(2, 6).toUpperCase(),
        nome: chosenPack.nome, premio: lotesPedidos > 0 ? premioTxt : "Bandeiras de Publicidade",
        lotesIniciais: lotesPedidos, flagsTotais: chosenPack.flagsTotal, flagsRestantes: chosenPack.flagsTotal,
        flagsPremioRestantes: lotesPedidos * 20, flagsEnergiaRestantes: chosenPack.flagsTotal - (lotesPedidos * 20),
        diasLevantamento: lotesPedidos > 0 ? diasPremio : 0, raioKm: chosenPack.raioKm,
        status: "pending", activationTime: Date.now() + delayCampanha, expiraEm: Date.now() + (chosenPack.validadeDias * 24 * 60 * 60 * 1000), vencedores: []
      };

      activeCompany.campanhas.push(novaCampanha);
      saveCompanyDB(); renderAvailablePackages(); updateCompanyDashboard(); alert(`Campanha agendada. Proteção de ${delayCampanha/60000} minutos ativada.`);
    }

    function updateCompanyDashboard() {
      if(!activeCompany.campanhas) activeCompany.campanhas = []; const listaDiv = document.getElementById("campanhas-ativas-lista"); if(!listaDiv) return; listaDiv.innerHTML = ""; const now = Date.now();

      activeCompany.campanhas.forEach(camp => {
        if (camp.status === 'pending' && now >= camp.activationTime) { camp.status = 'active'; }
        let pacoteExpirado = false; let diasVal = Math.ceil((camp.expiraEm - now) / (24*60*60*1000));
        if (diasVal <= 0 && camp.status === 'active') { pacoteExpirado = true; camp.status = 'expired'; }

        let cardHtml = `<div class="camp-card ${camp.status === 'pending' ? 'camp-pending' : ''} ${pacoteExpirado ? 'camp-expired' : ''}">`;
        cardHtml += `<div class="pack-title">${camp.nome} ${pacoteExpirado ? '(EXPIROU)' : ''}</div>`;
        
        if (camp.status === 'pending') {
          const diff = Math.max(0, camp.activationTime - now); const m = Math.floor((diff/1000)/60).toString().padStart(2, '0'); const s = Math.floor((diff/1000)%60).toString().padStart(2, '0');
          cardHtml += `<p style="font-size:12px; color:#aaa; margin:5px 0;">Em carência de 60m.</p><div class="camp-timer">⏱️ Arranque: ${m}:${s}</div>`;
        } else {
          const consumido = camp.flagsTotais - camp.flagsRestantes; const pct = (consumido / camp.flagsTotais) * 100;
          let statusTxt = camp.status === 'active' ? `<span style="color:#0f0;">🟢 ATIVA NO MAPA</span>` : `<span style="color:red;">🔴 TERMINADA</span>`;

          cardHtml += `
            <div style="display:flex; justify-content:space-between; align-items:center;">${statusTxt}</div>
            <div style="font-size:12px; color:#a7fca7; margin-top:5px;"><b>Raio:</b> ${camp.raioKm}km | <b>Prémio:</b> ${camp.premio} | <b>Validade:</b> ${pacoteExpirado ? 'Terminou' : diasVal + ' dias'}</div>
            <div class="stat-bar" style="width:100%; height:8px; border-radius:4px; margin-top:5px;"><div class="stat-fill" style="width:${pct}%; background:${pacoteExpirado ? 'red' : '#0f0'};"></div></div>
          `;
          if (camp.vencedores.length > 0) { cardHtml += `<h4 style="margin:10px 0 5px 0; color:#4CAF50;">🏆 QRs Gerados</h4>`; camp.vencedores.forEach(v => { const dFaltam = Math.ceil((v.expiraEm - Date.now()) / (24*60*60*1000)); cardHtml += `<div class="winner-item"><span>🎫 <b>${v.codigo}</b></span><span>Detentor: <b style="color:#0f0;">${v.jogador}</b></span><span style="color:${dFaltam<0 ? '#ff0000' : '#0f0'}">${dFaltam<0 ? 'Expirou' : dFaltam+'d'}</span></div>`; }); }
        }
        cardHtml += `</div>`; listaDiv.innerHTML += cardHtml;
      });
      saveCompanyDB();
    }

      const list = document.getElementById("filiais-lista"); list.innerHTML = ""; if (activeCompany.type !== "SEDE") { list.innerHTML = "<span style='color:#888; font-size:12px;'>Apenas a Sede acede à rede global.</span>"; return; }

    // MAPA EMPRESA
    function openCompanyMap() {

    // ================= MODOS DE JOGO (GPS / OFFLINE) =================
    function preStartGame() { document.getElementById("login-screen").classList.add("hidden"); document.getElementById("mode-modal").classList.remove("hidden"); }

    function requestGPSMode() {
      document.getElementById("mode-modal").classList.add("hidden"); document.getElementById("game-screen").classList.remove("hidden");
      isOfflineMode = false; initMap();
      if (!navigator.geolocation) { alert("Sem GPS. A usar Offline."); activateOfflineMode(); return; }
      if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
      navigator.geolocation.watchPosition(
        p => { const m = getDist(player.lat, player.lng, p.coords.latitude, p.coords.longitude); if (m > moveDist) { player.energy -= energyCost; updateUI(); } player.lat = p.coords.latitude; player.lng = p.coords.longitude; renderAvatar(); }, 
        e => {}, { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
      );
      spawnRandomFlags(15); updateQRWallet(); populateSocialList();
    }

    function activateOfflineMode() {
      document.getElementById("mode-modal").classList.add("hidden"); document.getElementById("game-screen").classList.remove("hidden"); document.getElementById("offline-controls").classList.remove("hidden");
      isOfflineMode = true; initMap(); spawnRandomFlags(15); renderAvatar(); populateSocialList(); updateQRWallet();
    }

    // ================= MAPA DO JOGADOR =================
    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: false }).setView([player.lat, player.lng], 19);
      L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
      setTimeout(() => { map.invalidateSize(); }, 500); 
    }

    function renderAvatar() {
      if (!playerMarker) {
        const avatarHTML = `<div id="avatar-anim" class="avatar-wrapper"><div class="ava-head"></div><div class="ava-arm-l"></div><div class="ava-arm-r" id="ava-arm-right"></div><div class="ava-body"></div><div class="ava-leg-l"></div><div class="ava-leg-r"></div></div>`;
        const icon = L.divIcon({ className: '', html: avatarHTML, iconSize: [40, 50], iconAnchor: [20, 50] });
        playerMarker = L.marker([player.lat, player.lng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
      } else { playerMarker.setLatLng([player.lat, player.lng]); }

      if (!visionCircle) visionCircle = L.circle([player.lat, player.lng], { radius: player.vision, color: "#0066ff", fillOpacity: 0.1, weight: 1 }).addTo(map);
      else { visionCircle.setLatLng([player.lat, player.lng]); visionCircle.setRadius(player.vision); }

      if (!catchCircle) catchCircle = L.circle([player.lat, player.lng], { radius: 2.5, color: "#00ff00", className: "catch-circle", fillOpacity: 0.2, weight: 2 }).addTo(map);
      else catchCircle.setLatLng([player.lat, player.lng]);

      map.setView([player.lat, player.lng], 19); checkVisibleFlags();
    }

    function centerPlayer() { map.setView([player.lat, player.lng], 19); }

    function movePlayer(dx, dy) {
      if (!isOfflineMode) { alert("Modo GPS Ativo! Caminha na vida real."); return; }
      if (player.energy < energyCost) { alert("Estás sem energia!"); return; }
      player.energy -= energyCost; lastMoveTime = Date.now(); 
      const ava = document.getElementById("avatar-anim");
      if (ava) { ava.classList.add("walking"); if (dx > 0) ava.style.transform = "scaleX(1)"; if (dx < 0) ava.style.transform = "scaleX(-1)"; setTimeout(() => ava.classList.remove("walking"), 250); }

      player.lat += (dy * moveDist) / 111320; player.lng += (dx * moveDist) / (111320 * Math.cos(player.lat * Math.PI / 180));
      renderAvatar(); updateUI();
    }

    setInterval(() => { const timeIdle = Date.now() - lastMoveTime; if (timeIdle >= idleTime && player.energy < player.maxEnergy) { player.energy = Math.min(player.maxEnergy, player.energy + (player.maxEnergy * 0.10)); updateUI(); lastMoveTime = Date.now(); } }, 1000);

    // ================= BANDEIRAS =================
    function getDist(lat1, lng1, lat2, lng2) { const R = 6371e3; const dPhi = (lat2 - lat1) * Math.PI / 180; const dLam = (lng2 - lng1) * Math.PI / 180; const a = Math.sin(dPhi/2)*Math.sin(dPhi/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLam/2)*Math.sin(dLam/2); return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)); }
    function spawnRandomFlags(amount) { for(let i=0; i<amount; i++) { let rLat = player.lat + ((Math.random() - 0.5) * 0.0001); let rLng = player.lng + ((Math.random() - 0.5) * 0.0001); let icon = L.divIcon({ className: '', html: `<div class="flag-marker"></div>`, iconSize: [24,24] }); allFlags.push({ lat: rLat, lng: rLng, marker: L.marker([rLat, rLng], { icon: icon }), isVisible: false }); } }
    function checkVisibleFlags() { allFlags.forEach(f => { let dist = getDist(player.lat, player.lng, f.lat, f.lng); if (dist <= player.vision && !f.isVisible) { f.marker.addTo(map); f.isVisible = true; } else if (dist > player.vision && f.isVisible) { map.removeLayer(f.marker); f.isVisible = false; } }); }

    function catchFlag() {
      let closest = null; let minDist = Infinity;
      allFlags.forEach(f => { let d = getDist(player.lat, player.lng, f.lat, f.lng); if(d < minDist) { minDist = d; closest = f; } });
      if (!closest) { alert("Não vês bandeiras!"); return; }
      if (minDist > 2.5) { alert(`Aproxima-te! Bandeira a ${Math.floor(minDist)}m. (Círculo Tracejado)`); return; }

      const ava = document.getElementById("avatar-anim");
      if (ava) { ava.classList.add("catching"); setTimeout(() => ava.classList.remove("catching"), 400); }

      player.flags += 1; map.removeLayer(closest.marker); allFlags = allFlags.filter(f => f !== closest); 
      spawnRandomFlags(1); processCaughtFlag(); 
    }

    function processCaughtFlag() {
      document.getElementById('modal-overlay').classList.remove('hidden');
      let mockName = activeCompany ? activeCompany.name : "ZAP Central";
      let mockAtiv = activeCompany ? activeCompany.atividade : "Oferta Livre";
      document.getElementById('modal-comp-name').innerText = mockName; document.getElementById('modal-comp-activity').innerText = mockAtiv;

      const resBox = document.getElementById('modal-result-box');
      
      let empresaSorteada = null; let campSorteada = null; let globaisAtivas = [];
      for(let key in allCompaniesDB) {
        let c = allCompaniesDB[key];
        if(c.campanhas && c.campanhas.length > 0) { c.campanhas.filter(cmp => cmp.status === 'active' && cmp.flagsRestantes > 0).forEach(cmp => { globaisAtivas.push({ empresa: c, campanha: cmp }); }); }
      }

      if (globaisAtivas.length === 0) {
        resBox.innerHTML = `<span style="color:#0f0; font-weight:bold;">Bandeira Livre ZAP</span><br><span style="font-size:12px; color:#fff;">Ganhaste +Skill e 5% de Energia.</span>`;
        player.energy = Math.min(player.maxEnergy, player.energy + 50); updateUI(); savePlayer(); return;
      }

      let totalSaco = globaisAtivas.reduce((sum, item) => sum + item.campanha.flagsRestantes, 0);
      let sorteio = Math.random() * totalSaco;

      for (let item of globaisAtivas) { 
        if (sorteio < item.campanha.flagsRestantes) { empresaSorteada = item.empresa; campSorteada = item.campanha; break; } 
        sorteio -= item.campanha.flagsRestantes; 
      }

      campSorteada.flagsRestantes--;

      if (campSorteada.lotesIniciais > 0) {
        let isPremio = Math.random() < (campSorteada.flagsPremioRestantes / (campSorteada.flagsPremioRestantes + campSorteada.flagsEnergiaRestantes));
        
        if (isPremio && campSorteada.flagsPremioRestantes > 0) {
          campSorteada.flagsPremioRestantes--;
          if (!player.progressPR[campSorteada.id]) player.progressPR[campSorteada.id] = 0;
          player.progressPR[campSorteada.id]++;
          
          if (player.progressPR[campSorteada.id] >= 20) {
            const qrCode = "ZAP-" + Math.random().toString(36).substring(2,6).toUpperCase();
            const expTime = Date.now() + (campSorteada.diasLevantamento * 24 * 60 * 60 * 1000);
            campSorteada.vencedores.push({ jogador: player.name || "Tu", codigo: qrCode, expiraEm: expTime });
            
            if(!player.qrs) player.qrs = [];
            player.qrs.push({ id: qrCode, brand: empresaSorteada.name, offer: campSorteada.premio, expires: expTime });
            
            resBox.style.borderColor = "#ff0000";
            resBox.innerHTML = `<span style="color:#ff0000; font-weight:bold; font-size:18px;">🎉 PARABÉNS! GANHASTE! 🎉</span><br><span style="font-size:13px; color:#fff;">Prémio: <b style="color:#ff9800;">${campSorteada.premio}</b> da empresa ${empresaSorteada.name}<br>QR na tua carteira.</span>`;
            player.progressPR[campSorteada.id] = 0; updateQRWallet();
          } else {
            resBox.style.borderColor = "#ff9800";
            resBox.innerHTML = `<span style="color:#ff9800; font-weight:bold;">Bandeira de Lote (${campSorteada.premio})!</span><br><span style="font-size:12px; color:#fff;">Faltam: <b>${20 - player.progressPR[campSorteada.id]}</b></span>`;
          }
        } else {
          campSorteada.flagsEnergiaRestantes--;
          let randEnergy = Math.random() * 100; let gain = 0; let msg = "";
          if (randEnergy < 1) { gain = 1000; msg = "JACKPOT! Energia Cheia (+100%)!"; } else if (randEnergy < 6) { gain = 500; msg = "Sorte! +50% Energia!"; } else if (randEnergy < 46) { gain = 100; msg = "Muito Bom! +10% Energia!"; } else { gain = 50; msg = "Bom! +5% Energia."; }
          player.energy = Math.min(player.maxEnergy, player.energy + gain);
          resBox.style.borderColor = "#00f0ff"; resBox.innerHTML = `<span style="color:#00f0ff; font-weight:bold;">Bandeira de Energia</span><br><span style="font-size:12px; color:#fff;">${msg}</span>`;
        }
      } else {
        campSorteada.flagsEnergiaRestantes--;
        player.energy = Math.min(player.maxEnergy, player.energy + 50);
        resBox.innerHTML = `<span style="color:#0f0; font-weight:bold;">Bandeira de Publicidade</span><br><span style="font-size:12px; color:#fff;">Ganhaste +Skill e Energia.</span>`;
      }

      allCompaniesDB[empresaSorteada.id] = empresaSorteada; localStorage.setItem("zap_all_companies", JSON.stringify(allCompaniesDB));
      savePlayer(); recalcSkill(); updateUI();
    }

    function closeFlagModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
    function recalcSkill() { nextSkillTarget = 100 * Math.pow(2, player.skill - 1); if (player.flags >= nextSkillTarget) { player.skill++; player.vision = Math.min(50, 5 + (player.skill - 1) * 0.25); nextSkillTarget = 100 * Math.pow(2, player.skill - 1); } }
    function updateUI() { document.getElementById('val-ener').innerText = Math.floor(player.energy); document.getElementById('bar-ener').style.width = (player.energy / player.maxEnergy) * 100 + "%"; document.getElementById('val-skill').innerText = player.skill; document.getElementById('val-visao').innerText = player.vision.toFixed(2); document.getElementById('val-flags').innerText = player.flags; }

    function updateQRWallet() {
      const list = document.getElementById("qr-wallet-list");
      if(!list) return; list.innerHTML = "";
      if (!player.qrs || player.qrs.length === 0) { list.innerHTML = "Não tens prémios ganhos."; return; }
      player.qrs.forEach(qr => {
        let dias = Math.ceil((qr.expires - Date.now()) / (24*60*60*1000));
        list.innerHTML += `<div style="background:#111; padding:10px; margin-bottom:5px; border:1px dashed #0f0; border-radius:5px;"><b>${qr.brand}</b><br><span style="color:#ff9800;">${qr.offer}</span><br>Código: <b>${qr.id}</b><br><span style="color:${dias<0?'red':'#a7fca7'}; font-size:10px;">${dias<0?'Expirou':'Válido: '+dias+' dias'}</span></div>`;
      });
    }

    // ================= LÓGICA DA ABA SOCIAL E TROCAS =================
    function openWindow(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeWindow(id) { document.getElementById(id).classList.add('hidden'); }

    function switchSoc(tab) {
      document.getElementById('tab-global').classList.remove('active'); document.getElementById('tab-amigos').classList.remove('active');
      document.getElementById('view-global').classList.add('hidden'); document.getElementById('view-amigos').classList.add('hidden'); 
      document.getElementById('tab-' + tab).classList.add('active');
      if(tab === 'global') { document.getElementById('view-global').classList.remove('hidden'); populateSocialList(); }
      if(tab === 'amigos') { document.getElementById('view-amigos').classList.remove('hidden'); document.getElementById('friends-list-view').classList.remove('hidden'); document.getElementById('chat-view').classList.add('hidden'); populateSocialList(); }
    }

    function populateSocialList() {
      const globalList = document.getElementById("global-players-list"); globalList.innerHTML = "";
      allPlayersDB.slice(0,50).forEach(pName => {
        if(pName === player.name) return; 
        let status = playerFriends[pName] || 'none';
        if (status === 'none') { globalList.innerHTML += `<div class="player-list-item"><span><span class="status-dot"></span> <b>${pName}</b></span><button class="btn-dark" style="padding:4px; font-size:10px;" onclick="addFriend('${pName}')">Pedir Amizade</button></div>`; }
      });
      if(globalList.innerHTML === "") globalList.innerHTML = "<div style='font-size:12px; color:#aaa; text-align:center; padding:10px;'>Sem jogadores na zona. Usa o Simulador no Backoffice!</div>";

      const friendsList = document.getElementById("accepted-friends-list"); friendsList.innerHTML = "";
      for (const [fName, fStatus] of Object.entries(playerFriends)) {
        if (fStatus === 'pending') { friendsList.innerHTML += `<div class="player-list-item"><span><span class="status-dot pending"></span> <b>${fName}</b></span><button class="btn-warning" style="padding:4px; font-size:10px;" onclick="acceptFriend('${fName}')">Aceitar</button></div>`; } 
        else if (fStatus === 'accepted') { friendsList.innerHTML += `<div class="player-list-item"><span><span class="status-dot"></span> <b>${fName}</b></span><button style="padding:4px; font-size:10px;" onclick="openChatWith('${fName}')">💬 CHAT</button></div>`; }
      }
      if(friendsList.innerHTML === "") friendsList.innerHTML = "<div style='font-size:12px; color:#aaa; text-align:center; padding:10px;'>Ainda não tens amigos.</div>";
    }

    function addFriend(name) { playerFriends[name] = 'pending'; localStorage.setItem("zap_player_friends", JSON.stringify(playerFriends)); alert(`Pedido enviado para ${name}! (Simulado)`); populateSocialList(); }
    function acceptFriend(name) { playerFriends[name] = 'accepted'; localStorage.setItem("zap_player_friends", JSON.stringify(playerFriends)); alert(`${name} foi adicionado aos teus amigos!`); populateSocialList(); }

    function openChatWith(name) {
      currentChatFriend = name;
      document.getElementById('friends-list-view').classList.add('hidden'); document.getElementById('chat-view').classList.remove('hidden');
      document.getElementById("chat-active-friend").innerText = name;
      document.getElementById("chat-msgs-box").innerHTML = `<div style="font-size:11px; color:#888; text-align:center; margin-top:10px;">Início do chat privado com ${name}.</div>`;
      document.getElementById("trade-interface").classList.add("hidden"); document.getElementById("chat-msgs-box").style.height = "180px"; document.getElementById("chat-input-area").classList.remove("hidden");
      currentTrade = { myQR: null, friendQR: null };
    }

    function closeChat() { currentChatFriend = ""; document.getElementById('chat-view').classList.add('hidden'); document.getElementById('friends-list-view').classList.remove('hidden'); }

    function sendPlayerMsg() {
      const input = document.getElementById("chat-player-input"); const msg = input.value.trim();
      if(!msg || !currentChatFriend) return;
      const box = document.getElementById("chat-msgs-box");
      box.innerHTML += `<div class="chat-msg msg-mine"><b>Tu:</b> ${msg}</div>`;
      setTimeout(() => { box.innerHTML += `<div class="chat-msg msg-other"><b>${currentChatFriend}:</b> Recebido! Quando quiseres podes abrir a aba de Trocar!</div>`; box.scrollTop = box.scrollHeight; }, 1500);
      input.value = ""; box.scrollTop = box.scrollHeight;
    }

    // ================= TROCAS =================
    function startTrade() {
      const tradeInt = document.getElementById("trade-interface");
      if(!tradeInt.classList.contains("hidden")) { tradeInt.classList.add("hidden"); document.getElementById("chat-msgs-box").style.height = "180px"; document.getElementById("chat-input-area").classList.remove("hidden"); return; }
      
      tradeInt.classList.remove("hidden"); document.getElementById("chat-msgs-box").style.height = "80px"; document.getElementById("chat-input-area").classList.add("hidden"); 
      
      const inv = document.getElementById('trade-qr-inventory');
      inv.classList.add("hidden"); inv.innerHTML = "";
      if(!player.qrs || player.qrs.length === 0) {
        inv.innerHTML = "<span style='color:#aaa; font-size:10px;'>Sem QRs no Armazém.</span>";
      } else {
        player.qrs.forEach(qr => { inv.innerHTML += `<div id="drag-${qr.id}" class="draggable-qr" draggable="true" ondragstart="dragQR(event)" onclick="zoomQR('${qr.id}', '${qr.brand}', '${qr.offer}', true)">🎫 ${qr.brand}</div>`; });
      }

      document.getElementById('friend-trade-zone').innerHTML = '<span style="color:#00f0ff; font-size:10px;" id="friend-status-text">A aguardar oferta...</span>';
      
      setTimeout(() => {
        document.getElementById('friend-trade-zone').innerHTML = `<div id="friend-fake-qr" class="draggable-qr" onclick="zoomQR('ZAP-SIM', 'A Oferta do Amigo', '1 Prémio Oculto', false)">🎫 QR Oculto (Clica p/ ver)</div>`;
        currentTrade.friendQR = "McDonalds"; checkTradeStatus();
      }, 3000);
    }

    function toggleQRVault() { const inv = document.getElementById('trade-qr-inventory'); if (inv.classList.contains("hidden")) inv.classList.remove("hidden"); else inv.classList.add("hidden"); }
    function dragQR(ev) { ev.dataTransfer.setData("qr_id", ev.target.id); }
    function allowDrop(ev) { ev.preventDefault(); }
    
    function dropInTrade(ev) {
      ev.preventDefault(); var data = ev.dataTransfer.getData("qr_id"); const element = document.getElementById(data);
      if(element) {
        if(ev.target.id === "my-trade-zone") {
          document.getElementById("my-trade-zone").innerHTML = ""; document.getElementById("my-trade-zone").appendChild(element); 
          element.onclick = function() { zoomQR(this.id, "A Tua Oferta", "Prémio Oculto", true); }; currentTrade.myQR = data; checkTradeStatus();
        } else if(ev.target.id === "trade-qr-inventory") {
          document.getElementById("trade-qr-inventory").appendChild(element); currentTrade.myQR = null; checkTradeStatus();
        }
      }
    }

    function checkTradeStatus() {
      const btn = document.getElementById("btn-accept-trade");
      if (currentTrade.myQR && currentTrade.friendQR) { btn.disabled = false; btn.style.background = "#ff9800"; btn.innerText = "CONFIRMAR E ACEITAR TROCA"; } 
      else { btn.disabled = true; btn.style.background = "#555"; btn.innerText = "A AGUARDAR OFERTAS..."; }
    }

    function cancelTrade() { startTrade(); currentTrade = { myQR: null, friendQR: null }; }

    function acceptTrade() {
      document.getElementById("btn-accept-trade").innerText = "A aguardar o " + currentChatFriend + "..."; document.getElementById("btn-accept-trade").disabled = true;
      setTimeout(() => { alert(`A TUA TROCA FOI CONCLUÍDA!\nEntregaste o teu QR e recebeste o QR do ${currentChatFriend}! A Marca de Água de proteção foi retirada.`); closeChat(); }, 2000);
    }

    // ZOOM QR CODE (PROTEÇÃO)
    function zoomQR(id, brand, offer, isMyQR) {
      document.getElementById('zoom-qr-title').innerText = brand;
      document.getElementById('zoom-qr-desc').innerText = "Vais receber: " + offer;
      
      if (isMyQR) {
        document.getElementById('zoom-qr-code').innerText = id;
        document.getElementById('zoom-qr-img').innerHTML = `<img src="https://quickchart.io/qr?text=${id}&size=200" style="width:100%; border-radius:10px;" />`;
        document.querySelector('.qr-lock-icon').style.display = 'none';
        document.querySelector('.qr-safe-watermark').style.display = 'none';
      } else {
        document.getElementById('zoom-qr-code').innerText = "ZAP-****-**** (Protegido)";
        document.getElementById('zoom-qr-img').innerHTML = `<img src="https://quickchart.io/qr?text=Protegido&size=200" style="width:100%; filter:blur(8px); opacity:0.5; border-radius:10px;" />`;
        document.querySelector('.qr-lock-icon').style.display = 'block';
        document.querySelector('.qr-safe-watermark').style.display = 'block';
      }
      document.getElementById('qr-zoom-modal').classList.remove('hidden');
    }
    function closeQRZoom() { document.getElementById('qr-zoom-modal').classList.add('hidden'); }

    // ================= EVENTOS MOBILE E DRAG =================
    document.querySelectorAll('.drag-window').forEach(el => {
      const handle = el.querySelector('.drag-handle'); if(!handle) return;
      let isDragging = false, startX, startY, startLeft, startTop;
      handle.addEventListener('mousedown', e => { isDragging = true; startLeft = el.offsetLeft; startTop = el.offsetTop; startX = e.clientX; startY = e.clientY; });
      window.addEventListener('mousemove', e => { if (!isDragging) return; el.style.left = (startLeft + e.clientX - startX) + 'px'; el.style.top = (startTop + e.clientY - startY) + 'px'; });
      window.addEventListener('mouseup', () => isDragging = false);
      handle.addEventListener('touchstart', e => { isDragging = true; startLeft = el.offsetLeft; startTop = el.offsetTop; startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive: true});
      window.addEventListener('touchmove', e => { if (!isDragging) return; el.style.left = (startLeft + e.touches[0].clientX - startX) + 'px'; el.style.top = (startTop + e.touches[0].clientY - startY) + 'px'; e.preventDefault(); }, {passive: false});
      window.addEventListener('touchend', () => isDragging = false);
    });
  </script>
</body>
</html>
