<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>JG / PR / FIL — Jogo de Bandeiras v9</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#0a0e1a;--panel:#111827;--card:#1a2338;--text:#e4e8f7;--muted:#8b96b9;
  --accent:#38bdf8;--ok:#34d399;--warn:#fbbf24;--danger:#f87171;
  --radius:14px;--shadow:0 10px 35px rgba(0,0,0,.5);--flagRed:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;background:var(--bg);}
.screen.active{display:flex;}
.screen-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:20px;}
.form-box{width:100%;max-width:460px;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);}
.form-box h2{text-align:center;margin-bottom:8px;font-size:22px;}
.form-box .sub{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:20px;}
.form-box label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;}
.req{color:var(--danger);font-weight:700;}
.form-box input,.form-box select{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.35);color:var(--text);font-size:15px;outline:none;}
.form-box input:focus,.form-box select:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;}
.btn-primary{background:linear-gradient(135deg,#2563eb,#38bdf8);color:white;}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.15);}
.btn-danger{background:rgba(248,113,113,.15);color:var(--danger);border:1px solid rgba(248,113,113,.25);}
.msg{margin-top:12px;font-size:13.5px;min-height:20px;text-align:center;}
.link-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13.5px;margin-top:12px;}
.sm{font-size:12.5px;color:var(--muted);}

/* Game */
#gameScreen{flex-direction:column;}
#topBar{display:flex;align-items:center;gap:8px;padding:10px;background:rgba(17,24,39,.96);border-bottom:1px solid rgba(255,255,255,.08);z-index:500;}
.tbtn{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:var(--text);font-size:13px;cursor:pointer;}
.tbtn:active,.tbtn.active{background:rgba(56,189,248,.15);color:var(--accent);}
#mapArea{flex:1;position:relative;}
#map{position:absolute;inset:0;}
#playerAvatar{position:absolute;bottom:85px;left:50%;transform:translateX(-50%);font-size:92px;z-index:20;filter:drop-shadow(0 10px 20px rgba(0,0,0,.6));}
.hud-stats{position:absolute;top:12px;left:12px;right:12px;z-index:600;display:flex;gap:8px;flex-wrap:wrap;pointer-events:none;}
.hud-pill{pointer-events:auto;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);}
#dpad{position:absolute;bottom:70px;right:16px;z-index:600;display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px 52px;gap:6px;}
.dk{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:24px;font-weight:900;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;}
.dk:active{background:rgba(56,189,248,.4);}
#gpsBtn{position:absolute;bottom:75px;left:16px;z-index:600;width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:22px;display:grid;place-items:center;cursor:pointer;}
#ticker{padding:10px 14px;background:rgba(17,24,39,.95);border-top:1px solid rgba(255,255,255,.08);font-size:13px;color:var(--warn);white-space:nowrap;overflow:hidden;}
#ticker span{display:inline-block;animation:scroll 20s linear infinite;}
@keyframes scroll{from{transform:translateX(100%)}to{transform:translateX(-100%)}}

/* Reveal & Modals */
#revealOverlay{display:none;position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);align-items:center;justify-content:center;}
#revealOverlay.open{display:flex;}
#revealBox{background:var(--card);border-radius:20px;padding:30px 24px;width:90%;max-width:360px;text-align:center;box-shadow:var(--shadow);}
.reveal-flag{width:90px;height:110px;margin:0 auto 20px;background:var(--flagRed);border-radius:8px 18px 18px 8px;position:relative;animation:flagWave 1.4s ease-in-out infinite;}
@keyframes flagWave{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.reveal-suspense-text{font-size:17px;color:var(--muted);margin:10px 0 20px;animation:blink 1.2s infinite;}
.reveal-result{display:none;margin-top:10px;}
.reveal-result.show{display:block;}
.reveal-icon{font-size:68px;margin:10px 0;}
.reveal-title{font-size:24px;font-weight:800;margin:8px 0;}
.reveal-desc{font-size:15px;color:var(--muted);}
.modal-overlay{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.7);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--panel);border-radius:18px;width:90%;max-width:480px;max-height:85vh;overflow:hidden;box-shadow:var(--shadow);}
.modal-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;}
.modal-close{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);display:grid;place-items:center;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="welcomeScreen">
  <div class="screen-center">
    <div class="form-box" style="text-align:center;">
      <h2>🚩 Jogo de Bandeiras</h2>
      <p class="sub">Escolha como deseja entrar</p>
      <div style="display:flex;flex-direction:column;gap:12px;margin:25px 0;">
        <button class="btn btn-primary" onclick="showScreen('jgLoginScreen')">🎮 Jogador (JG)</button>
        <button class="btn btn-secondary" onclick="showScreen('prLoginScreen')">🏢 Empresa (PR)</button>
        <button class="btn btn-secondary" onclick="showScreen('filRegScreen')">🏬 Filial (FIL)</button>
      </div>
      <button class="link-btn" onclick="showScreen('welcomeScreen')" style="color:#f87171;margin-top:15px;">✕ Fechar</button>
    </div>
  </div>
</div>

<!-- JG LOGIN -->
<div class="screen" id="jgLoginScreen">
  <div class="screen-center">
    <div class="form-box">
      <h2>🎮 Entrada — Jogador</h2>
      <label>Nome memorizado</label><input id="l_name" disabled>
      <label>Telemóvel ou E-mail <span class="req">*</span></label><input id="l_contact" placeholder="9xxxxxxxx ou email@exemplo.com">
      <label>Senha <span class="req">*</span></label><input id="l_pass" type="password">
      <div style="margin-top:20px;"><button class="btn btn-primary" id="jgLoginBtn">Entrar</button></div>
      <div style="text-align:center;margin:16px 0;">
        <button class="link-btn" onclick="forgotPassword()">Esqueci a senha</button>
      </div>
      <div class="msg" id="jgLoginMsg"></div>
      <button class="link-btn" onclick="showScreen('jgRegScreen')">Criar nova conta</button>
      <button class="link-btn" onclick="showScreen('welcomeScreen')">✕ Fechar</button>
    </div>
  </div>
</div>

<!-- JG REGISTER -->
<div class="screen" id="jgRegScreen">
  <div class="screen-center">
    <div class="form-box">
      <h2>Registo — Jogador</h2>
      <p class="sub"><span class="req">*</span> obrigatório</p>
      <label>Nome <span class="req">*</span></label><input id="r_name">
      <label>Telemóvel ou E-mail <span class="req">*</span></label><input id="r_contact" placeholder="9xxxxxxxx ou email@exemplo.com">
      <div class="row2">
        <div><label>Senha <span class="req">*</span></label><input id="r_pass" type="password"></div>
        <div><label>Confirmar <span class="req">*</span></label><input id="r_pass2" type="password"></div>
      </div>
      <label>Localidade</label><input id="r_loc">
      <div style="margin-top:20px;"><button class="btn btn-primary" id="jgRegBtn">Registar</button></div>
      <div class="msg" id="jgRegMsg"></div>
      <button class="link-btn" onclick="showScreen('jgLoginScreen')">Já tenho conta</button>
      <button class="link-btn" onclick="showScreen('welcomeScreen')">✕ Fechar</button>
    </div>
  </div>
</div>

<!-- PR LOGIN -->
<div class="screen" id="prLoginScreen">
  <div class="screen-center">
    <div class="form-box">
      <h2>🏢 Entrada — Empresa</h2>
      <label>NIF ou E-mail <span class="req">*</span></label><input id="prl_nif">
      <label>Senha <span class="req">*</span></label><input id="prl_pass" type="password">
      <div style="margin-top:20px;"><button class="btn btn-primary" id="prLoginBtn">Entrar</button></div>
      <div style="text-align:center;margin:16px 0;">
        <button class="link-btn" onclick="forgotPassword()">Esqueci a senha</button>
      </div>
      <div class="msg" id="prLoginMsg"></div>
      <button class="link-btn" onclick="showScreen('prRegScreen')">Criar conta de empresa</button>
      <button class="link-btn" onclick="showScreen('welcomeScreen')">✕ Fechar</button>
    </div>
  </div>
</div>

<!-- FIL REG -->
<div class="screen" id="filRegScreen">
  <div class="screen-center">
    <div class="form-box">
      <h2>Registo — Filial</h2>
      <p class="sub"><span class="req">*</span> obrigatório</p>
      <div class="info-box">Registo sempre sem código. O código só será pedido quando quiser comprar pacotes.</div>
      <label>NIF da Empresa Mãe <span class="req">*</span></label><input id="fr_nifMae">
      <label>NIF da Filial <span class="req">*</span></label><input id="fr_nif">
      <div class="sm" id="fr_nifHint" style="min-height:22px;margin-top:4px;"></div>
      <label>Nome da Filial <span class="req">*</span></label><input id="fr_name">
      <label>Telemóvel ou E-mail <span class="req">*</span></label><input id="fr_contact">
      <div class="row2">
        <div><label>Morada <span class="req">*</span></label><input id="fr_morada"></div>
        <div><label>Morada Fiscal</label><input id="fr_moradaF"></div>
      </div>
      <label>GPS (opcional)</label><input id="fr_gps" placeholder="38.7223, -9.1393">
      <div class="row2">
        <div><label>Senha <span class="req">*</span></label><input id="fr_pass" type="password"></div>
        <div><label>Confirmar <span class="req">*</span></label><input id="fr_pass2" type="password"></div>
      </div>
      <label>Responsável <span class="req">*</span></label><input id="fr_resp">
      <label>Situação</label><select id="fr_sit"><option>Dono</option><option>Gerente</option><option>Empregado</option><option>Controlador</option></select>
      <div style="margin-top:20px;"><button class="btn btn-primary" id="filRegBtn">Registar Filial</button></div>
      <div class="msg" id="filRegMsg"></div>
      <button class="link-btn" onclick="showScreen('filLoginScreen')">Já tenho conta</button>
      <button class="link-btn" onclick="showScreen('welcomeScreen')">✕ Fechar</button>
    </div>
  </div>
</div>

<!-- FIL LOGIN -->
<div class="screen" id="filLoginScreen">
  <div class="screen-center">
    <div class="form-box">
      <h2>🏬 Entrada — Filial</h2>
      <label>NIF da Filial <span class="req">*</span></label><input id="fl_nif">
      <label>Senha <span class="req">*</span></label><input id="fl_pass" type="password">
      <div style="margin-top:20px;"><button class="btn btn-primary" id="filLoginBtn">Entrar</button></div>
      <div style="text-align:center;margin:16px 0;">
        <button class="link-btn" onclick="forgotPassword()">Esqueci a senha</button>
      </div>
      <div class="msg" id="filLoginMsg"></div>
      <button class="link-btn" onclick="showScreen('filRegScreen')">Criar conta</button>
      <button class="link-btn" onclick="showScreen('welcomeScreen')">✕ Fechar</button>
    </div>
  </div>
</div>
