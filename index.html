<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zap Flags – Jogo</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }
        #game-container { height: 100%; width: 100%; position: relative; }

        /* Painéis modais */
        .modal { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #16213e; border-radius: 1rem; padding: 2rem; max-width: 420px; width: 90%; color: #eee; box-shadow: 0 0 25px rgba(0,200,255,0.3); text-align: center; }
        .modal-content h2 { color: #00d4ff; margin-bottom: 1rem; }
        .modal-content input, .modal-content select { width: 100%; padding: 0.7rem; margin: 0.5rem 0; border-radius: 0.5rem; border: none; background: #0f3460; color: white; }
        .modal-content button { background: #e94560; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 0.5rem; }
        .modal-content button:hover { background: #ff6b7a; transform: scale(1.02); }
        .modal-content .link { color: #00d4ff; cursor: pointer; text-decoration: underline; }
        .modal-content .close-btn { background: none; border: none; color: #aaa; font-size: 2rem; position: absolute; top:0.5rem; right:1rem; cursor: pointer; }
        .modal-content .row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

        /* Interface no mapa */
        #map { height: 100%; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; z-index: 1000; pointer-events: none; }
        .ui-overlay > * { pointer-events: auto; }

        #hud {
            top: 1rem; left: 1rem;
            background: rgba(15, 52, 96, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1rem;
            color: white;
            min-width: 180px;
        }
        #hud .energy-bar { width: 100%; height: 8px; background: #555; border-radius: 4px; margin: 0.5rem 0; }
        #hud .energy-fill { height: 100%; background: #00d4ff; border-radius: 4px; transition: width 0.3s; }
        .hud-btn { background: #e94560; border: none; color: white; padding: 0.4rem 1rem; border-radius: 1rem; font-size: 0.8rem; margin-top: 0.3rem; cursor: pointer; }
        .hud-btn.small { padding: 0.2rem 0.8rem; font-size: 0.7rem; background: #0f3460; }

        #offline-dpad {
            bottom: 2rem; right: 1rem;
            display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px;
            gap: 5px;
        }
        .dpad-btn { background: #0f3460; border: none; color: white; font-size: 1.5rem; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .dpad-center { background: #e94560; grid-row: 2; grid-column: 2; }

        #pr-dashboard {
            top: 1rem; right: 1rem;
            background: rgba(22, 33, 62, 0.9);
            backdrop-filter: blur(8px);
            padding: 1rem;
            border-radius: 1rem;
            max-width: 250px;
        }

        /* Flag modal */
        .flag-popup { background: #16213e; border-radius: 1rem; padding: 1rem; text-align: center; color: white; }
        .flag-popup button { background: #e94560; border: none; color: white; padding: 0.5rem 1.5rem; border-radius: 2rem; margin-top: 0.5rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Mapa será inserido aqui -->
        <div id="map"></div>

        <!-- Painel de login / registo (inicial) -->
        <div id="auth-modal" class="modal">
            <div class="modal-content">
                <h2 id="auth-title">Zap Flags</h2>
                <div id="auth-form">
                    <select id="account-type"><option value="JG">Jogador</option><option value="PR">Empresa</option></select>
                    <input id="auth-name" placeholder="Nome / Empresa" />
                    <input id="auth-email" placeholder="Email" />
                    <input id="auth-phone" placeholder="Telefone (opcional)" />
                    <input id="auth-password" type="password" placeholder="Password" />
                    <input id="auth-confirm-password" type="password" placeholder="Confirmar password" class="hidden" />
                    <button id="auth-action-btn">Entrar / Registar</button>
                    <p class="link" id="switch-mode">Criar conta</p>
                    <p class="link" id="recover-pw">Recuperar password</p>
                </div>
            </div>
        </div>

        <!-- Modal de escolha de modo (GPS vs Casa) -->
        <div id="mode-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Escolhe o modo</h2>
                <div class="row">
                    <button id="gps-mode-btn"><i class="fa-solid fa-location-dot"></i> GPS real</button>
                    <button id="home-mode-btn"><i class="fa-solid fa-house"></i> Modo casa</button>
                </div>
            </div>
        </div>

        <!-- HUD do jogador -->
        <div id="hud" class="ui-overlay hidden">
            <strong id="hud-name"></strong> ⭐<span id="hud-points">0</span><br>
            Energia <div class="energy-bar"><div class="energy-fill" id="energy-fill" style="width:100%"></div></div>
            <button class="hud-btn small" id="refresh-flags-btn">🔄 Renovar bandeiras</button>
            <button class="hud-btn" id="logout-btn">Sair</button>
        </div>

        <!-- D-Pad offline -->
        <div id="offline-dpad" class="ui-overlay hidden">
            <button class="dpad-btn" data-dir="nw"><i class="fa-solid fa-arrow-up-left"></i></button>
            <button class="dpad-btn" data-dir="n"><i class="fa-solid fa-arrow-up"></i></button>
            <button class="dpad-btn" data-dir="ne"><i class="fa-solid fa-arrow-up-right"></i></button>
            <button class="dpad-btn" data-dir="w"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="dpad-center" id="center-btn"><i class="fa-solid fa-location-dot"></i></button>
            <button class="dpad-btn" data-dir="e"><i class="fa-solid fa-arrow-right"></i></button>
            <button class="dpad-btn" data-dir="sw"><i class="fa-solid fa-arrow-down-left"></i></button>
            <button class="dpad-btn" data-dir="s"><i class="fa-solid fa-arrow-down"></i></button>
            <button class="dpad-btn" data-dir="se"><i class="fa-solid fa-arrow-down-right"></i></button>
        </div>

        <!-- Painel da empresa (quando logada como PR) -->
        <div id="pr-dashboard" class="ui-overlay hidden">
            <h3><i class="fa-solid fa-building"></i> <span id="pr-name"></span></h3>
            <p>Pacotes: <span id="pr-packages-count">0</span></p>
            <button class="hud-btn small" id="pr-logout-btn">Sair</button>
        </div>

        <!-- Modal de resultado ao recolher bandeira -->
        <div id="result-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="result-title"></h2>
                <p id="result-message"></p>
                <button id="close-result-btn">OK</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
     <script>
    // ======================== 🏠 ARRANQUE (Boot) ========================
    const STORAGE_KEY = 'zapflags_state';
    let gameState = defaultState();

    function defaultState() {
        return {
            players: {},
            companies: {},
            currentUser: null,
            flags: [],
            settings: {
                maxFlags: 5,
                flagRadius: 0.005,
                viewRadius: 0.01,
            }
        };
    }

    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try { gameState = JSON.parse(raw); } catch(e) { gameState = defaultState(); }
        } else {
            gameState = defaultState();
        }
        gameState.flags = gameState.flags || [];
        gameState.players = gameState.players || {};
        gameState.companies = gameState.companies || {};
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
    }

    function normalizePlayer(p) {
        return { ...p, energy: p.energy ?? 100, points: p.points ?? 0, homeMode: p.homeMode ?? false };
    }
    function normalizeCompany(c) {
        return { ...c, budget: c.budget ?? 1000, packages: c.packages ?? [] };
    }

    // ======================== 🔐 LOGIN / REGISTO ========================
    let authMode = 'login'; // 'login' ou 'register'

    function showAuthModal() {
        document.getElementById('auth-modal').classList.remove('hidden');
        document.getElementById('mode-modal').classList.add('hidden');
        document.querySelector('#game-container #map').classList.add('hidden');
        updateAuthUI();
    }

    function updateAuthUI() {
        const type = document.getElementById('account-type').value;
        const title = document.getElementById('auth-title');
        title.innerText = type === 'JG' ? 'Zap Flags - Jogador' : 'Zap Flags - Empresa';
        const btn = document.getElementById('auth-action-btn');
        btn.innerText = authMode === 'login' ? 'Entrar' : 'Criar conta';
        document.getElementById('switch-mode').innerText = authMode === 'login' ? 'Não tem conta? Criar' : 'Já tem conta? Entrar';
        // Mostra/oculta o campo de confirmar password
        const confirmPw = document.getElementById('auth-confirm-password');
        if (authMode === 'register') {
            confirmPw.classList.remove('hidden');
        } else {
            confirmPw.classList.add('hidden');
            confirmPw.value = '';
        }
    }

    document.getElementById('account-type').addEventListener('change', updateAuthUI);
    document.getElementById('switch-mode').addEventListener('click', ()=>{
        authMode = authMode === 'login' ? 'register' : 'login';
        updateAuthUI();
    });

    document.getElementById('recover-pw').addEventListener('click', ()=>{
        const name = document.getElementById('auth-name').value.trim();
        const email = document.getElementById('auth-email').value.trim();
        if (!name || !email) { alert('Preencha nome e email para recuperar'); return; }
        const type = document.getElementById('account-type').value;
        const collection = type === 'JG' ? gameState.players : gameState.companies;
        const found = Object.values(collection).find(u => u.name === name && u.email === email);
        if (found) {
            alert(`Password (demo): ${found.password}`);
        } else {
            alert('Não encontrado');
        }
    });

    document.getElementById('auth-action-btn').addEventListener('click', ()=>{
        const type = document.getElementById('account-type').value;
        const name = document.getElementById('auth-name').value.trim();
        const email = document.getElementById('auth-email').value.trim();
        const phone = document.getElementById('auth-phone').value.trim();
        const pw = document.getElementById('auth-password').value.trim();
        const confirmPw = document.getElementById('auth-confirm-password').value.trim();
        if (!name || !email || !pw) { alert('Preencha os campos obrigatórios'); return; }
        if (authMode === 'register') {
            if (contactAlreadyExists(type, email, phone)) { alert('Email/telefone já existe'); return; }
            if (pw !== confirmPw) { alert('As passwords não coincidem'); return; }
            const id = Date.now().toString(36)+Math.random().toString(36).substr(2);
            if (type === 'JG') {
                gameState.players[id] = normalizePlayer({ id, name, email, phone, password: pw, points: 0, energy: 100, x: 38.7223, y: -9.1393, homeMode: false });
            } else {
                gameState.companies[id] = normalizeCompany({ id, name, email, phone, password: pw, packages: [] });
            }
            saveState();
            alert('Conta criada! Faça login.');
            authMode = 'login';
            updateAuthUI();
        } else {
            const collection = type === 'JG' ? gameState.players : gameState.companies;
            const found = Object.values(collection).find(u => u.name === name && u.email === email && u.password === pw);
            if (!found) { alert('Credenciais inválidas'); return; }
            gameState.currentUser = { type, id: found.id };
            saveState();
            document.getElementById('auth-modal').classList.add('hidden');
            if (type === 'JG') {
                startPlayerGame();
            } else {
                startPRGame();
            }
        }
    });

    function contactAlreadyExists(type, email, phone) {
        const col = type === 'JG' ? gameState.players : gameState.companies;
        return Object.values(col).some(u => u.email === email || (phone && u.phone === phone));
    }

    // ======================== 🗺️ MAPA E JOGO ========================
    let map, playerMarker, flagMarkers = {};
    let watchId = null;

    function startPlayerGame() {
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('pr-dashboard').classList.add('hidden');
        document.getElementById('offline-dpad').classList.add('hidden');
        document.getElementById('mode-modal').classList.remove('hidden');
        initMap();
        updateHUD();
        refreshFlags();
    }

    function startPRGame() {
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('pr-dashboard').classList.remove('hidden');
        document.getElementById('offline-dpad').classList.add('hidden');
        document.getElementById('mode-modal').classList.add('hidden');
        if (map) map.remove();
        map = null;
        document.getElementById('map').classList.add('hidden');
        updatePRDashboard();
    }

    document.getElementById('gps-mode-btn').addEventListener('click', ()=>{
        document.getElementById('mode-modal').classList.add('hidden');
        requestGPSMode();
    });
    document.getElementById('home-mode-btn').addEventListener('click', ()=>{
        document.getElementById('mode-modal').classList.add('hidden');
        activateHomeMode();
    });
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('pr-logout-btn').addEventListener('click', logout);
    function logout() {
        stopGPS();
        gameState.currentUser = null;
        saveState();
        if (map) { map.remove(); map = null; }
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('pr-dashboard').classList.add('hidden');
        document.getElementById('offline-dpad').classList.add('hidden');
        document.getElementById('map').classList.add('hidden');
        showAuthModal();
    }

    function initMap() {
        if (map) map.remove();
        document.getElementById('map').classList.remove('hidden');
        map = L.map('map', {
            center: [38.7223, -9.1393],
            zoom: 15,
            zoomControl: false
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        const playerIcon = L.divIcon({ className: 'player-icon', html: '<i class="fa-solid fa-circle" style="color:#e94560; font-size:24px; filter: drop-shadow(0 0 8px red);"></i>' });
        const player = gameState.players[gameState.currentUser.id];
        playerMarker = L.marker([player.x, player.y], { icon: playerIcon, zIndexOffset: 1000 }).addTo(map);
        updatePlayerLocation([player.x, player.y]);
        centerOnPlayer();
        refreshFlags();
    }

    function createFlagIcon(promo) {
        return L.divIcon({
            className: 'flag-icon',
            html: `<i class="fa-solid fa-flag" style="color:${promo?'gold':'#00d4ff'}; font-size:20px; filter: drop-shadow(0 0 6px ${promo?'orange':'cyan'});"></i>`,
            iconSize: [24, 24],
            iconAnchor: [12, 24]
        });
    }

    function updatePlayerLocation(latlng) {
        if (!playerMarker) return;
        playerMarker.setLatLng(latlng);
        const player = gameState.players[gameState.currentUser.id];
        player.x = latlng[0];
        player.y = latlng[1];
        saveState();
        updateVisibleFlags();
    }

    function updateHUD() {
        const player = gameState.players[gameState.currentUser.id];
        if (!player) return;
        document.getElementById('hud-name').innerText = player.name;
        document.getElementById('hud-points').innerText = player.points;
        document.getElementById('energy-fill').style.width = player.energy + '%';
    }

    function requestGPSMode() {
        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(updatePosition, handleGeoError, {
                enableHighAccuracy: true,
                maximumAge: 5000,
                timeout: 10000
            });
            document.getElementById('offline-dpad').classList.add('hidden');
        } else {
            alert('GPS não disponível. Modo casa ativado.');
            activateHomeMode();
        }
    }

    function activateHomeMode() {
        stopGPS();
        document.getElementById('offline-dpad').classList.remove('hidden');
        document.getElementById('offline-dpad').style.display = 'grid';
    }

    function stopGPS() {
        if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    }

    function updatePosition(position) {
        const latlng = [position.coords.latitude, position.coords.longitude];
        updatePlayerLocation(latlng);
        const player = gameState.players[gameState.currentUser.id];
        if (player.energy > 0) {
            player.energy = Math.max(0, player.energy - 0.1);
            if (player.energy <= 0) alert('Energia esgotada!');
        }
        updateHUD();
        saveState();
    }

    function handleGeoError(err) {
        console.warn(err);
        alert('Erro no GPS. Ativando modo casa.');
        activateHomeMode();
    }

    // Movimento manual (d-pad + setas)
    document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const dir = e.currentTarget.dataset.dir;
            moveHomePlayer(dir);
        });
    });
    document.getElementById('center-btn').addEventListener('click', centerOnPlayer);
    document.addEventListener('keydown', (e) => {
        if (gameState.currentUser?.type === 'JG' && !document.getElementById('offline-dpad').classList.contains('hidden')) {
            const dirMap = { ArrowUp:'n', ArrowDown:'s', ArrowLeft:'w', ArrowRight:'e' };
            if (dirMap[e.key]) moveHomePlayer(dirMap[e.key]);
        }
    });

    function moveHomePlayer(dir) {
        const step = 0.0003;
        const player = gameState.players[gameState.currentUser.id];
        let dx=0, dy=0;
        if (dir.includes('n')) dy = step;
        if (dir.includes('s')) dy = -step;
        if (dir.includes('e')) dx = step;
        if (dir.includes('w')) dx = -step;
        player.x += dx;
        player.y += dy;
        updatePlayerLocation([player.x, player.y]);
        if (player.energy > 0) {
            player.energy = Math.max(0, player.energy - 0.2);
        }
        updateHUD();
    }

    function centerOnPlayer() {
        const player = gameState.players[gameState.currentUser.id];
        if (map) map.setView([player.x, player.y], 16);
    }

    // ======================== 🔵 BANDEIRAS ========================
    function getAllActivePackages() {
        const packages = [];
        for (let cid in gameState.companies) {
            const comp = gameState.companies[cid];
            (comp.packages || []).forEach(pkg => {
                if (pkg.flagsRemaining > 0) packages.push({ ...pkg, companyId: cid });
            });
        }
        return packages;
    }

    function createFlagCandidate() {
        const player = gameState.players[gameState.currentUser.id];
        const baseLat = player.x;
        const baseLng = player.y;
        const r = gameState.settings.flagRadius;
        const angle = Math.random() * 2 * Math.PI;
        const dist = Math.random() * r;
        const lat = baseLat + (dist * Math.cos(angle));
        const lng = baseLng + (dist * Math.sin(angle));

        const active = getAllActivePackages();
        if (active.length === 0) return null;
        const chosen = active[Math.floor(Math.random() * active.length)];
        const promo = Math.random() < 0.2;
        const points = promo ? 20 : 10;

        return {
            id: 'f'+Date.now()+Math.random(),
            lat, lng,
            packageId: chosen.id,
            companyId: chosen.companyId,
            points,
            promo
        };
    }

    function refreshFlags() {
        clearFlags();
        const max = gameState.settings.maxFlags;
        for (let i = 0; i < max; i++) {
            const candidate = createFlagCandidate();
            if (candidate) gameState.flags.push(candidate);
        }
        drawFlagsOnMap();
        saveState();
    }

    function drawFlagsOnMap() {
        if (!map) return;
        Object.values(flagMarkers).forEach(m => map.removeLayer(m));
        flagMarkers = {};
        gameState.flags.forEach(flag => {
            const icon = createFlagIcon(flag.promo);
            const marker = L.marker([flag.lat, flag.lng], { icon }).addTo(map);
            marker.bindPopup(`
                <div class="flag-popup">
                    <strong>${flag.promo ? '🌟PROMO' : '🏁Bandeira'}</strong><br>
                    +${flag.points} pts<br>
                    <button onclick="collectFlag('${flag.id}')">Recolher</button>
                </div>
            `);
            flagMarkers[flag.id] = marker;
        });
    }

    window.collectFlag = function(flagId) {
        if (!gameState.currentUser || gameState.currentUser.type !== 'JG') return;
        const player = gameState.players[gameState.currentUser.id];
        const flag = gameState.flags.find(f => f.id === flagId);
        if (!flag) return;
        if (player.energy <= 0) { alert('Sem energia!'); return; }
        const dist = map.distance([player.x, player.y], [flag.lat, flag.lng]);
        if (dist > 50) { alert('Demasiado longe!'); return; }
        player.points += flag.points;
        player.energy = Math.min(100, player.energy + 5);
        const company = gameState.companies[flag.companyId];
        if (company) {
            const pkg = company.packages.find(p => p.id === flag.packageId);
            if (pkg) pkg.flagsRemaining = Math.max(0, (pkg.flagsRemaining||1) - 1);
        }
        removeFlag(flagId);
        updateHUD();
        saveState();
        document.getElementById('result-title').innerText = flag.promo ? '🌟 Promo!' : 'Bandeira recolhida';
        document.getElementById('result-message').innerText = `+${flag.points} pontos! Continua!`;
        document.getElementById('result-modal').classList.remove('hidden');
        if (gameState.flags.length < gameState.settings.maxFlags) {
            const cand = createFlagCandidate();
            if (cand) { gameState.flags.push(cand); drawFlagsOnMap(); }
        }
    };

    document.getElementById('close-result-btn').addEventListener('click', ()=>{
        document.getElementById('result-modal').classList.add('hidden');
    });

    function removeFlag(flagId) {
        gameState.flags = gameState.flags.filter(f => f.id !== flagId);
        if (flagMarkers[flagId]) { map.removeLayer(flagMarkers[flagId]); delete flagMarkers[flagId]; }
    }

    function clearFlags() {
        gameState.flags = [];
        Object.values(flagMarkers).forEach(m => map.removeLayer(m));
        flagMarkers = {};
    }

    document.getElementById('refresh-flags-btn').addEventListener('click', ()=>{
        refreshFlags();
    });

    function updateVisibleFlags() {
        const player = gameState.players[gameState.currentUser.id];
        const view = gameState.settings.viewRadius;
        gameState.flags.forEach(flag => {
            const marker = flagMarkers[flag.id];
            if (!marker) return;
            const dist = map.distance([player.x, player.y], [flag.lat, flag.lng]);
            if (dist < view * 111000) {
                if (!map.hasLayer(marker)) marker.addTo(map);
            } else {
                if (map.hasLayer(marker)) map.removeLayer(marker);
            }
        });
    }

    // ======================== PAINEL EMPRESA ========================
    function updatePRDashboard() {
        const comp = gameState.companies[gameState.currentUser.id];
        document.getElementById('pr-name').innerText = comp.name;
        document.getElementById('pr-packages-count').innerText = comp.packages.length;
        if (comp.packages.length === 0) {
            comp.packages.push({ id: 'p'+Date.now(), flagsRemaining: 3, budget: 50 });
            saveState();
        }
    }

    // ======================== INICIALIZAÇÃO ========================
    loadState();
    if (gameState.currentUser) {
        if (gameState.currentUser.type === 'JG') {
            startPlayerGame();
        } else {
            startPRGame();
        }
    } else {
        showAuthModal();
    }

    window.addEventListener('beforeunload', ()=>{ stopGPS(); saveState(); });
    </script>
</body>
</html>
